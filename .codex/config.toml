model = "gpt-5-codex"
model_reasoning_effort = "high"

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
web_search = true

[environment_policy]
inherit = "core"
exclude = ["OPENAI_API_KEY", "ANTHROPIC_API_KEY"]
include_only = [
  "PATH",
  "HOME",
  "SHELL",
  "LANG",
  "LC_ALL",
  "TERM"
]

[tools]
network_access = false

[workspace]
root = "/Users/artan/Documents/Neuroartan/website"

[instructions]
summary = "Operate only inside the Neuroartan website repository. Audit first. Preserve modular ownership. Edit the true owner file only. Keep HTML, CSS, JS, fragments, collections, and JSON responsibilities separate. No overlays, no hacks, no duplicate ownership, no hardcoded drift from structured data. Prefer root-cause corrections, minimal diffs, and reversible edits."