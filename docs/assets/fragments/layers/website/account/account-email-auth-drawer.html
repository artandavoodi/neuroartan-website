<!-- =============================================================================
00) FILE INDEX
01) INNER VIEW ROOT
02) EMAIL AUTH STATE
03) CONTENT STAGE
04) SEGMENT TITLE
05) EMAIL AUTH FORM
06) CANONICAL HIDDEN CONTEXT FIELDS
07) PRIMARY ACTIONS
08) SECONDARY ACTIONS
09) BACK CONTROL
10) END OF VIEW
============================================================================= -->

<!-- =============================================================================
01) INNER VIEW ROOT
============================================================================= -->
<section
  id="account-email-auth-drawer"
  class="account-email-auth-drawer account-drawer-inner-view"
  aria-label="Email authentication"
  data-account-email-auth-drawer="true"
  data-account-view="email-auth"
  hidden
>
  <!-- ==========================================================================
  02) EMAIL AUTH STATE
  ========================================================================== -->
  <section class="account-email-auth-drawer-state" data-account-email-auth-state="entry">

    <!-- ========================================================================
    03) CONTENT STAGE
    ======================================================================== -->
    <div class="account-email-auth-drawer-content-stage account-drawer-content-stage">

      <!-- ======================================================================
      04) SEGMENT TITLE
      ====================================================================== -->
      <div class="account-drawer-segment-header">
        <h2 class="account-drawer-segment-title" data-i18n-key="account_segment_title_email">Continue with Email</h2>
      </div>

      <!-- ======================================================================
      05) EMAIL AUTH FORM
      ====================================================================== -->
      <form id="account-email-auth-drawer-form" class="account-email-auth-drawer-form" data-account-email-auth-form="true" novalidate>
        <div class="account-email-auth-drawer-center-stage">

          <!-- ==================================================================
          06) CANONICAL HIDDEN CONTEXT FIELDS
          ================================================================== -->
          <input
            id="account-email-auth-method"
            name="method"
            type="hidden"
            value="email"
            data-account-email-auth-field="method"
          >
          <input
            id="account-email-auth-auth-provider"
            name="auth_provider"
            type="hidden"
            value="email"
            data-account-email-auth-field="auth-provider"
          >

          <div class="account-email-auth-drawer-field-group">
            <input
              id="account-email-auth-email"
              name="email"
              type="email"
              class="account-email-auth-drawer-input"
              autocomplete="email"
              inputmode="email"
              data-i18n-placeholder-key="account_email_auth_email_placeholder"
              placeholder="Email address"
            >
          </div>
        </div>
      </form>

      <!-- ======================================================================
      07) PRIMARY ACTIONS
      ====================================================================== -->
      <div class="account-email-auth-drawer-actions">
        <button type="submit" form="account-email-auth-drawer-form" class="account-email-auth-drawer-action account-email-auth-drawer-action--primary" data-account-email-auth-submit="true">
          <span class="account-email-auth-drawer-action-label" data-i18n-key="account_email_auth_submit">Continue with email</span>
        </button>
      </div>

      <!-- ======================================================================
      08) SECONDARY ACTIONS
      ====================================================================== -->
      <div class="account-email-auth-drawer-secondary-actions">

        <button type="button" class="account-email-auth-drawer-text-action" data-account-route="sign-in" data-account-email-auth-sign-in="true">
          <span data-i18n-key="account_email_auth_already_have_account">Already have an account? Sign in</span>
        </button>

        <!-- ====================================================================
        09) BACK CONTROL
        ==================================================================== -->
        <button type="button" class="account-email-auth-drawer-back-control" data-account-route="entry" data-account-email-auth-back="true" aria-label="Back">
          <img src="/registry/icons/public/assets/core/navigation/direction/back.svg" alt="" class="account-email-auth-drawer-back-icon ui-icon-theme-aware" aria-hidden="true">
        </button>
      </div>
    </div>
  </section>
</section>

<!-- =============================================================================
10) END OF VIEW
============================================================================= -->
