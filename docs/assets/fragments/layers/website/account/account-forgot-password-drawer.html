<!-- =============================================================================
00) FILE INDEX
01) INNER VIEW ROOT
02) FORGOT PASSWORD STATE
03) CONTENT STAGE
04) SEGMENT TITLE
05) FORGOT PASSWORD FORM
06) PRIMARY ACTIONS
07) SECONDARY ACTIONS
08) BACK CONTROL
09) END OF VIEW
============================================================================= -->

<!-- =============================================================================
01) INNER VIEW ROOT
============================================================================= -->
<section
  id="account-forgot-password-drawer"
  class="account-forgot-password-drawer account-drawer-inner-view"
  aria-label="Forgot password"
  data-account-forgot-password-drawer="true"
  data-account-view="forgot-password"
  hidden
>
  <!-- ==========================================================================
  02) FORGOT PASSWORD STATE
  ========================================================================== -->
  <section class="account-forgot-password-drawer-state" data-account-forgot-password-state="entry">

    <!-- ========================================================================
    03) CONTENT STAGE
    ======================================================================== -->
    <div class="account-forgot-password-drawer-content-stage account-drawer-content-stage">

      <!-- ======================================================================
      04) SEGMENT TITLE
      ====================================================================== -->
      <div class="account-drawer-segment-header">
        <h2 class="account-drawer-segment-title" data-i18n-key="account_segment_title_forgot_password">Forgot password</h2>
      </div>

      <!-- ======================================================================
      05) FORGOT PASSWORD FORM
      ====================================================================== -->
      <form id="account-forgot-password-drawer-form" class="account-forgot-password-drawer-form" data-account-forgot-password-form="true" novalidate>
        <div class="account-forgot-password-drawer-center-stage">
          <div class="account-forgot-password-drawer-field-group">
            <input
              id="account-forgot-password-email"
              name="email"
              type="email"
              class="account-forgot-password-drawer-input"
              autocomplete="email"
              inputmode="email"
              data-i18n-placeholder-key="account_forgot_password_email_placeholder"
              placeholder="Email address"
            >
          </div>
        </div>
      </form>

      <!-- ======================================================================
      06) PRIMARY ACTIONS
      ====================================================================== -->
      <div class="account-forgot-password-drawer-actions">
        <button type="submit" form="account-forgot-password-drawer-form" class="account-forgot-password-drawer-action account-forgot-password-drawer-action--primary" data-account-forgot-password-submit="true">
          <span class="account-forgot-password-drawer-action-label" data-i18n-key="account_forgot_password_submit">Send reset link</span>
        </button>
      </div>

      <!-- ======================================================================
      07) SECONDARY ACTIONS
      ====================================================================== -->
      <div class="account-forgot-password-drawer-secondary-actions">

        <!-- ====================================================================
        08) BACK CONTROL
        ==================================================================== -->
        <button type="button" class="account-forgot-password-drawer-back-control" data-account-route="sign-in" data-account-forgot-password-back="true" aria-label="Back">
          <img src="/assets/icons/core/navigation/unclassified/back.svg" alt="" class="account-forgot-password-drawer-back-icon ui-icon-theme-aware" aria-hidden="true">
        </button>
      </div>
    </div>
  </section>
</section>

<!-- =============================================================================
09) END OF VIEW
============================================================================= -->
