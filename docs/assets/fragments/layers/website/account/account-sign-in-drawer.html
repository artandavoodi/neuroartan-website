<!-- =============================================================================
01) DRAWER ROOT
============================================================================= -->
<aside id="account-sign-in-drawer" class="account-sign-in-drawer" aria-hidden="true" aria-label="Sign in drawer" data-account-sign-in-drawer="true">

  <!-- ==========================================================================
  02) BACKDROP
  ========================================================================== -->
  <div class="account-sign-in-drawer-backdrop" data-account-sign-in-drawer-close="true"></div>

  <!-- ==========================================================================
  03) DRAWER SHELL
  ========================================================================== -->
  <div class="account-sign-in-drawer-shell account-drawer-shell" role="dialog" aria-modal="true" aria-label="Sign in drawer">

    <!-- ========================================================================
    04) CLOSE CONTROL
    ======================================================================== -->
    <button type="button" class="account-sign-in-drawer-close" aria-label="Close sign in drawer" data-account-sign-in-drawer-close="true">
      <span class="account-sign-in-drawer-close-line account-sign-in-drawer-close-line--first" aria-hidden="true"></span>
      <span class="account-sign-in-drawer-close-line account-sign-in-drawer-close-line--second" aria-hidden="true"></span>
    </button>

    <!-- ========================================================================
    05) DRAWER BODY
    ======================================================================== -->
    <div class="account-sign-in-drawer-body account-drawer-body">

      <!-- ======================================================================
      06) SIGN-IN STATE
      ====================================================================== -->
      <section class="account-sign-in-drawer-state" data-account-sign-in-state="entry">

        <!-- ====================================================================
        07) CONTENT STAGE
        ==================================================================== -->
        <div class="account-sign-in-drawer-content-stage account-drawer-content-stage">


          <!-- ==================================================================
          08) SIGN-IN FORM
          ================================================================== -->
          <form id="account-sign-in-drawer-form" class="account-sign-in-drawer-form" data-account-sign-in-form="true" novalidate>
            <div class="account-sign-in-drawer-center-stage">
            <div class="account-sign-in-drawer-header-brand-mark" aria-hidden="true">
              <img src="assets/icons/core/identity/brand/neuroartan/logo-plain.svg" alt="" class="account-sign-in-drawer-header-brand-icon">
            </div>
            <div class="account-sign-in-drawer-field-group">
              <input
                id="account-sign-in-identity"
                name="identity"
                type="text"
                class="account-sign-in-drawer-input"
                autocomplete="username"
                inputmode="email"
                data-i18n-placeholder-key="account_sign_in_identity_placeholder"
                placeholder="Email, username, or phone number"
              >
            </div>

            <div class="account-sign-in-drawer-field-group">
              <input
                id="account-sign-in-password"
                name="password"
                type="password"
                class="account-sign-in-drawer-input"
                autocomplete="current-password"
                data-i18n-placeholder-key="account_sign_in_password_placeholder"
                placeholder="Password"
              >
            </div>
            </div>
          </form>

          <!-- ==================================================================
          09) PRIMARY ACTIONS
          ================================================================== -->
          <div class="account-sign-in-drawer-actions">
            <button type="submit" form="account-sign-in-drawer-form" class="account-sign-in-drawer-action account-sign-in-drawer-action--primary" data-account-sign-in-submit="true">
              <span class="account-sign-in-drawer-action-label" data-i18n-key="account_sign_in_submit">Continue</span>
            </button>
          </div>
          <!-- ==================================================================
          10) ACTION DIVIDER
          ================================================================== -->
          <div class="account-sign-in-drawer-divider" aria-hidden="true">
            <span class="account-sign-in-drawer-divider-line"></span>
            <span class="account-sign-in-drawer-divider-label" data-i18n-key="account_sign_in_divider_or">or</span>
            <span class="account-sign-in-drawer-divider-line"></span>
          </div>

          <!-- ==================================================================
          11) PROVIDER ACTIONS
          ================================================================== -->
          <div class="account-sign-in-drawer-actions">
            <a href="#" class="account-drawer-identity-option account-drawer-identity-option--apple" data-account-sign-in-apple="true">
              <span class="account-drawer-identity-content">
                <img src="assets/icons/layers/website/brand/signin/apple.svg" alt="" class="account-drawer-identity-icon account-drawer-identity-icon--theme-aware" aria-hidden="true">
                <span class="account-drawer-identity-label" data-i18n-key="account_sign_in_continue_with_apple">Continue with Apple</span>
              </span>
            </a>
            <a href="#" class="account-drawer-identity-option account-drawer-identity-option--google" data-account-sign-in-google="true">
              <span class="account-drawer-identity-content">
                <img src="assets/icons/layers/website/brand/signin/google-signin.svg" alt="" class="account-drawer-identity-icon account-drawer-identity-icon--brand" aria-hidden="true">
                <span class="account-drawer-identity-label" data-i18n-key="account_sign_in_continue_with_google">Continue with Google</span>
              </span>
            </a>
          </div>

          <!-- ==================================================================
          12) SECONDARY ACTIONS
          ================================================================== -->
          <div class="account-sign-in-drawer-secondary-actions">
            <a href="#" class="account-sign-in-drawer-text-action" data-account-sign-in-forgot-password="true" data-i18n-key="account_sign_in_forgot_password">Forgot password?</a>
            <!-- ================================================================
            13) BACK CONTROL
            ================================================================ -->
            <button type="button" class="account-sign-in-drawer-back-control" data-account-sign-in-back="true" aria-label="Back">
              <img src="assets/icons/core/interface/navigation/back.svg" alt="" class="account-sign-in-drawer-back-icon" aria-hidden="true">
            </button>
          </div>
        </div>
      </section>
    </div>
  </div>
</aside>

<!-- =============================================================================
14) END OF DRAWER
============================================================================= -->
