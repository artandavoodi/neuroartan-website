03) CONTENT STAGE
04) SEGMENT TITLE

06) CANONICAL HIDDEN CONTEXT FIELDS
07) PRIMARY ACTIONS
08) ACTION DIVIDER
09) PROVIDER ACTIONS
10) SECONDARY ACTIONS
11) BACK CONTROL
12) END OF VIEW
============================================================================= -->
<!-- =============================================================================
01) INNER VIEW ROOT
============================================================================= -->
<section
  id="account-sign-in-drawer"
  class="account-sign-in-drawer account-drawer-inner-view"
  aria-label="Sign in"
  data-account-sign-in-drawer="true"
  data-account-view="sign-in"
  hidden
>
  <!-- ==========================================================================
  02) SIGN-IN STATE
  ========================================================================== -->
  <section class="account-sign-in-drawer-state" data-account-sign-in-state="entry">

    <!-- ========================================================================
    03) CONTENT STAGE
    ======================================================================== -->
    <div class="account-sign-in-drawer-content-stage account-drawer-content-stage">

      <!-- ======================================================================
      04) SEGMENT TITLE
      ====================================================================== -->
      <div class="account-drawer-segment-header">
        <h2 class="account-drawer-segment-title" data-i18n-key="account_segment_title_sign_in">Sign in</h2>
      </div>

      <!-- ======================================================================
      05) SIGN-IN FORM
      ====================================================================== -->
      <form id="account-sign-in-drawer-form" class="account-sign-in-drawer-form" data-account-sign-in-form="true" novalidate>
        <div class="account-sign-in-drawer-center-stage">
          <!-- ==================================================================
          06) CANONICAL HIDDEN CONTEXT FIELDS
          ================================================================== -->
          <input
            id="account-sign-in-method"
            name="method"
            type="hidden"
            value="email"
            data-account-sign-in-field="method"
          >
          <input
            id="account-sign-in-auth-provider"
            name="auth_provider"
            type="hidden"
            value="email"
            data-account-sign-in-field="auth-provider"
          >
          <div class="account-sign-in-drawer-field-group">
            <input
              id="account-sign-in-identity"
              name="identity"
              type="text"
              class="account-sign-in-drawer-input"
              autocomplete="username"
              inputmode="email"
              data-i18n-placeholder-key="account_sign_in_identity_placeholder"
              placeholder="Email, username, or phone number"
            >
          </div>

          <div class="account-sign-in-drawer-field-group">
            <input
              id="account-sign-in-password"
              name="password"
              type="password"
              class="account-sign-in-drawer-input"
              autocomplete="current-password"
              data-i18n-placeholder-key="account_sign_in_password_placeholder"
              placeholder="Password"
            >
          </div>

          <p
            class="account-sign-in-drawer-submit-status"
            data-account-sign-in-submit-status="idle"
            aria-live="polite"
            hidden
          ></p>
        </div>
      </form>

      <!-- ======================================================================
      07) PRIMARY ACTIONS
      ====================================================================== -->
      <div class="account-sign-in-drawer-actions">
        <button type="submit" form="account-sign-in-drawer-form" class="account-sign-in-drawer-action account-sign-in-drawer-action--primary" data-account-sign-in-submit="true">
          <span class="account-sign-in-drawer-action-label" data-i18n-key="account_sign_in_submit">Continue</span>
        </button>
      </div>

      <!-- ======================================================================
      08) ACTION DIVIDER
      ====================================================================== -->
      <div class="account-sign-in-drawer-divider" aria-hidden="true">
        <span class="account-sign-in-drawer-divider-line"></span>
        <span class="account-sign-in-drawer-divider-label" data-i18n-key="account_sign_in_divider_or">or</span>
        <span class="account-sign-in-drawer-divider-line"></span>
      </div>

      <!-- ======================================================================
      09) PROVIDER ACTIONS
      ====================================================================== -->
      <div class="account-sign-in-drawer-actions">
        <button type="button" class="account-drawer-identity-option account-drawer-identity-option--apple" data-account-provider-apple-submit="true" data-account-sign-in-apple="true">
          <span class="account-drawer-identity-content">
            <img src="/registry/icons/public/assets/layers/website/auth/signin/apple.svg" alt="" class="account-drawer-identity-icon account-drawer-identity-icon--theme-aware ui-icon-theme-aware" aria-hidden="true">
            <span class="account-drawer-identity-label" data-i18n-key="account_sign_in_continue_with_apple">Continue with Apple</span>
          </span>
        </button>
        <button type="button" class="account-drawer-identity-option account-drawer-identity-option--google" data-account-provider-google-submit="true" data-account-sign-in-google="true">
          <span class="account-drawer-identity-content">
            <img src="/registry/icons/public/assets/layers/website/auth/signin/google-signin.svg" alt="" class="account-drawer-identity-icon account-drawer-identity-icon--brand" aria-hidden="true">
            <span class="account-drawer-identity-label" data-i18n-key="account_sign_in_continue_with_google">Continue with Google</span>
          </span>
        </button>
      </div>

      <!-- ======================================================================
      10) SECONDARY ACTIONS
      ====================================================================== -->
      <div class="account-sign-in-drawer-secondary-actions">
        <button type="button" class="account-sign-in-drawer-text-action" data-account-route="forgot-password" data-account-sign-in-forgot-password="true" data-i18n-key="account_sign_in_forgot_password">Forgot password?</button>
        <!-- ====================================================================
        11) BACK CONTROL
        ==================================================================== -->
        <button type="button" class="account-sign-in-drawer-back-control" data-account-route="entry" data-account-sign-in-back="true" aria-label="Back">
          <img src="/registry/icons/public/assets/core/navigation/direction/back.svg" alt="" class="account-sign-in-drawer-back-icon ui-icon-theme-aware" aria-hidden="true">
        </button>
      </div>
    </div>
  </section>
</section>

<!-- =============================================================================
12) END OF VIEW
============================================================================= -->
