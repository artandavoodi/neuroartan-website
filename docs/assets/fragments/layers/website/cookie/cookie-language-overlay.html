<!-- =============================================================================
     01) COOKIE LANGUAGE / REGION OVERLAY
     Purpose: sovereign language / region selector layer dedicated to cookie
     settings only.
     Scope boundary: this fragment must not replace, override, or conflict with
     the global footer country / region overlay.
============================================================================= -->
<div id="cookie-language-overlay" class="cookie-language-overlay" aria-hidden="true">

  <!-- =============================================================================
       01A) OVERLAY INNER
  ============================================================================= -->
  <div class="cookie-language-overlay-inner">

    <!-- =============================================================================
         01B) OVERLAY HEADER
    ============================================================================= -->
    <div class="cookie-language-overlay-header">
      <div class="cookie-language-overlay-header-copy">
        <!-- =============================================================================
             01CA) TRANSLATABLE UI LABELS
        ============================================================================= -->
        <!-- =============================================================================
             01BB) HEADER TITLE GROUP
        ============================================================================= -->
        <div class="cookie-language-overlay-title-group">
          <img src="assets/icons/layers/website/system/navigation/globe.svg" alt="" class="cookie-language-overlay-title-icon">
          <h2 class="cookie-language-overlay-title" data-i18n-key="cookieLanguageOverlay.title">Choose language and region</h2>
        </div>
      </div>

      <!-- =============================================================================
           01BA) BACK CONTROL
      ============================================================================= -->
      <button type="button" class="cookie-language-overlay-close" aria-label="Back to cookie settings" data-cookie-language-overlay-close="true">
        <img src="assets/icons/core/interface/navigation/back.svg" alt="" class="cookie-language-overlay-back-icon">
      </button>
    </div>

    <!-- =============================================================================
         01C) SEARCH BAR
    ============================================================================= -->
    <div class="cookie-language-overlay-toolbar">
      <div class="cookie-language-overlay-search-shell">
        <input
          type="search"
          class="cookie-language-overlay-search"
          data-cookie-language-overlay-search="true"
          data-i18n-placeholder-key="cookieLanguageOverlay.searchPlaceholder"
          data-i18n-aria-label-key="cookieLanguageOverlay.searchAriaLabel"
          placeholder="Search language or region"
          aria-label="Search language or region"
        >
      </div>
    </div>

    <!-- =============================================================================
         01D) REGIONS MOUNT
         Cookie language / region entries must be mounted here by the dedicated
         sovereign cookie-language overlay runtime.
    ============================================================================= -->
    <div class="cookie-language-overlay-regions" data-cookie-language-overlay-regions="true"></div>
  </div>
</div>
