<!-- =============================================================================
01) OVERLAY SHELL
Purpose: site-wide country/region selector for global website entry points such
as footer-level region access and other non-cookie global triggers.
Scope boundary: this fragment is not the dedicated cookie-settings language /
region selector layer. Cookie-settings language selection must use its own
sovereign overlay layer to avoid lifecycle conflict with cookie-consent state.
============================================================================= -->
<div id="country-overlay" class="country-overlay" aria-hidden="true">
    <!-- ========================================================================
    02) OVERLAY INNER
    ======================================================================== -->
    <div class="country-overlay-inner">
        <!-- ====================================================================
        03) OVERLAY HEADER
        ==================================================================== -->
        <div class="overlay-header-container">
            <h2 class="country-overlay-title" data-i18n-key="overlay.chooseRegion">Choose your country or region</h2>
            <button id="country-overlay-close" class="global-close-button" aria-label="Close country selector">
                <span></span>
                <span></span>
            </button>
        </div>
        <hr class="footer-separator">

        <!-- ====================================================================
        04) REGIONS MOUNT
        Country / region entries are dynamically injected here by countries.js.
        ==================================================================== -->
        <div id="country-regions"></div>
    </div>
</div>

<!-- =============================================================================
05) END OF OVERLAY
============================================================================= -->
