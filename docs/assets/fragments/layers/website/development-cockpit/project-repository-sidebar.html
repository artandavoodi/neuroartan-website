<article class="cockpit-module project-repository-sidebar" data-cockpit-module="project-repository-sidebar">
  <header class="cockpit-module__header">
    <p class="cockpit-module__eyebrow">Projects</p>
    <h3 class="cockpit-module__title">Repository selection</h3>
    <p class="cockpit-module__copy">
      Select the repository scope for a future coding-agent session. GitHub authorization is backend-only and currently locked.
    </p>
  </header>

  <div class="project-repository-sidebar__actions">
    <button class="cockpit-button" type="button" data-project-repository-discover>
      Discover authorized GitHub repositories
    </button>
  </div>

  <div class="project-repository-sidebar__list" data-project-repository-list></div>
  <pre class="cockpit-output cockpit-output--code" data-project-repository-output>No repository selected.</pre>
</article>
