<!-- =============================================================================
     01) HOMEPAGE DEVELOPER REVIEW / APPROVAL PANEL
============================================================================= -->
<section class="home-developer-mode-panel" data-home-developer-review-panel aria-label="Review and approval">
  <header class="home-developer-mode-panel__header">
    <p class="home-developer-mode-panel__eyebrow">Review</p>
    <h3 class="home-developer-mode-panel__title">Review patches, tests, commits, and pull requests</h3>
    <p class="home-developer-mode-panel__copy">Mutation is blocked until a backend patch artifact, approval attribution, and repository write route are implemented.</p>
  </header>

  <div class="home-developer-mode-actions">
    <button class="home-developer-mode-button" type="button" data-home-developer-locked-action="patch-proposal-request">Request patch proposal</button>
    <button class="home-developer-mode-button" type="button" data-home-developer-locked-action="test-request">Request tests</button>
    <button class="home-developer-mode-button" type="button" data-home-developer-locked-action="commit-pr-request">Prepare commit / PR</button>
  </div>
  <pre class="home-developer-mode-output" data-home-developer-output="review">No review artifact selected.</pre>
</section>
