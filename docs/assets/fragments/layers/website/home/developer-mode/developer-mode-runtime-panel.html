     01) HOMEPAGE DEVELOPER RUNTIME PANEL
============================================================================= -->
<section class="home-developer-mode-panel" data-home-developer-runtime-panel aria-label="Runtime status">
  <header class="home-developer-mode-panel__header">
    <p class="home-developer-mode-panel__eyebrow">Runtime</p>
    <h3 class="home-developer-mode-panel__title">Scan, sandbox, and runtime boundaries</h3>
    <p class="home-developer-mode-panel__copy">Read-only scans can run through the backend. Patch, test, commit, and PR actions stay approval-gated.</p>
  </header>

  <div class="home-developer-mode-actions">
    <button class="home-developer-mode-button home-developer-mode-button--primary" type="button" data-home-developer-runtime-scan>Scan selected repository</button>
  </div>
  <pre class="home-developer-mode-output" data-home-developer-output="runtime">Runtime status not loaded.</pre>
</section>
