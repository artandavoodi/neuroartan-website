<!-- =============================================================================
     01) HOMEPAGE DEVELOPER SETTINGS PANEL
============================================================================= -->
<section class="home-developer-mode-panel" data-home-developer-settings-panel aria-label="Developer settings">
  <header class="home-developer-mode-panel__header">
    <p class="home-developer-mode-panel__eyebrow">Settings</p>
    <h3 class="home-developer-mode-panel__title">Developer permissions and continuity</h3>
    <p class="home-developer-mode-panel__copy">Control Center remains the canonical settings surface. This panel links active project, repository, provider, and approval state back to that source.</p>
  </header>

  <div class="home-developer-mode-actions">
    <button class="home-developer-mode-button home-developer-mode-button--primary" type="button" data-home-developer-open-control-center>Open Developer Control Center</button>
    <button class="home-developer-mode-button" type="button" data-home-developer-state-refresh>Refresh developer state</button>
  </div>
  <pre class="home-developer-mode-output" data-home-developer-output="settings">Settings state not loaded.</pre>
</section>
