<!-- =============================================================================
     01) DEVELOPER MODE TOPBAR
============================================================================= -->
<header class="home-dashboard-topbar home-developer-mode-topbar" data-home-developer-topbar aria-label="Developer Mode topbar">
  <!-- =============================================================================
       02) DEVELOPER MODE TOPBAR INNER RAIL
  ============================================================================= -->
  <div class="home-dashboard-topbar__inner">
    <!-- =============================================================================
         03) DEVELOPER MODE BRAND
    ============================================================================= -->
    <a class="home-dashboard-topbar__brand" href="/" aria-label="Neuroartan developer home">
      <img
        class="home-dashboard-topbar__brand-mark"
        src="/registry/icons/public/assets/core/identity/brand/neuroartan/logo-plain.svg"
        alt="Neuroartan symbol">
    </a>
    <span class="home-dashboard-topbar__label" data-home-developer-topbar-title>Developer Mode</span>

    <!-- =============================================================================
         04) DEVELOPER MODE NAVIGATION
    ============================================================================= -->
    <div class="home-dashboard-topbar__nav-group">
      <nav class="home-dashboard-topbar__nav" data-home-developer-topbar-items aria-label="Developer workspace navigation">
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-workspace="code" aria-pressed="true">
          <span class="home-dashboard-topbar__label">Code</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-workspace="app" aria-pressed="false">
          <span class="home-dashboard-topbar__label">App</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-workspace="docs" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Docs</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--utility" type="button" data-home-developer-notifications aria-label="Notifications">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/system/notifications/bell.svg" alt="">
          </span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--utility" type="button" data-home-developer-settings data-home-developer-mode-settings-trigger aria-label="Developer settings">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/home/developer-mode/topbar/developer-mode-developer-settings.svg" alt="">
          </span>
        </button>
        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--utility home-dashboard-topbar__action--profile"
          type="button"
          data-home-developer-account
          data-home-topbar-profile-trigger
          data-home-topbar-profile-state="icon"
          aria-label="Open profile control">
          <span class="home-dashboard-topbar__profile-avatar" data-home-topbar-profile-avatar-shell aria-hidden="true" hidden>
            <img class="home-dashboard-topbar__profile-avatar-image" data-home-topbar-profile-avatar alt="" hidden>
            <span class="home-dashboard-topbar__profile-avatar-fallback" data-home-topbar-profile-avatar-fallback>N</span>
          </span>
          <span class="home-dashboard-topbar__icon home-dashboard-topbar__icon--profile" data-home-topbar-profile-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/identity/profile/profile.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label sr-only" data-home-topbar-profile-label>Profile</span>
        </button>
      </nav>
    </div>
  </div>
</header>

<!-- =============================================================================
     05) END OF FILE
============================================================================= -->
