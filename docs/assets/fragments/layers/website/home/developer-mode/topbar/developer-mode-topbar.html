<!-- =============================================================================
     01) DEVELOPER MODE TOPBAR
============================================================================= -->
<header class="home-dashboard-topbar home-developer-mode-topbar" data-home-developer-topbar aria-label="Developer Mode topbar">
  <!-- =============================================================================
       02) DEVELOPER MODE TOPBAR INNER RAIL
  ============================================================================= -->
  <div class="home-dashboard-topbar__inner">
    <!-- =============================================================================
         03) DEVELOPER MODE BRAND
    ============================================================================= -->
    <a class="home-dashboard-topbar__brand" href="/" aria-label="Neuroartan developer home">
      <img
        class="home-dashboard-topbar__brand-mark"
        src="/assets/icons/core/identity/brand/neuroartan/logo-plain.svg"
        alt="Neuroartan symbol">
    </a>
    <span class="home-dashboard-topbar__label" data-home-developer-topbar-title>Developer Mode</span>

    <!-- =============================================================================
         04) DEVELOPER MODE NAVIGATION
    ============================================================================= -->
    <div class="home-dashboard-topbar__nav-group">
      <nav class="home-dashboard-topbar__nav" data-home-developer-topbar-items aria-label="Developer workspace navigation">
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-panel-trigger="projects" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Project</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-panel-trigger="repositories" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Repository</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-panel-trigger="agents" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Agent</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-panel-trigger="command" aria-pressed="true">
          <span class="home-dashboard-topbar__label">Prompt</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-command-mode="scan" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Scan</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-command-mode="debug" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Debug</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-panel-trigger="review" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Review</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-command-mode="tests" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Tests</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-command-mode="pull-request" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Pull request</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-panel-trigger="runtime" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Runtime</span>
        </button>
        <button class="home-dashboard-topbar__action home-dashboard-topbar__action--nav" type="button" data-home-developer-panel-trigger="settings" aria-pressed="false">
          <span class="home-dashboard-topbar__label">Settings</span>
        </button>
      </nav>
    </div>

    <!-- =============================================================================
         05) DEVELOPER MODE STATUS
    ============================================================================= -->
    <div class="home-dashboard-topbar__utility" data-home-developer-topbar-status aria-live="polite">
      <span class="home-dashboard-topbar__icon home-dashboard-topbar__action home-dashboard-topbar__action--utility" aria-hidden="true"></span>
      <span class="home-dashboard-topbar__label">Local session</span>
    </div>
  </div>
</header>
