<!-- =============================================================================
     HOME FOOTER FRAGMENT
     Purpose: modular home-layer footer for dashboard/app surfaces.
     Notes:
     - distinct from the institutional footer
     - optimized for platform/dashboard surfaces
     - keeps platform actions, support, and state links compact
============================================================================= -->

<footer class="home-footer" id="home-footer" aria-label="Home footer">
  <div class="home-footer__inner">
    <div class="home-footer__left">
      <span class="home-footer__copy" data-home-footer-copy>© 2026 Neuroartan</span>

      <nav class="home-footer__nav" aria-label="Home footer navigation">
        <a class="home-footer__link" href="/pages/about/">About</a>
        <a class="home-footer__link" href="/platform/">Platform</a>
        <a class="home-footer__link" href="/knowledge-research/">Knowledge</a>
        <a class="home-footer__link" href="/updates/">Updates</a>
      </nav>
    </div>

    <div class="footer-locale home-footer__locale">
      <div class="locale-item">
        <button
          class="locale-button"
          type="button"
          aria-label="Select language"
          aria-haspopup="listbox"
          aria-expanded="false"
          data-home-footer-language-toggle="true">
          <span data-home-footer-language-value="true">EN</span>
        </button>
        <div class="language-dropdown" data-home-footer-language-dropdown="true" aria-hidden="true"></div>
      </div>

      <span class="footer-separator-dot">•</span>

      <div class="locale-item">
        <button
          class="locale-button"
          type="button"
          aria-label="Select country and region"
          data-home-footer-country-selector="true">
          <span data-home-footer-country-value="true">United States</span>
        </button>
      </div>

      <span class="footer-separator-dot">•</span>

      <button
        class="locale-button home-footer__privacy-action"
        data-home-footer-action="privacy"
        type="button"
        aria-controls="cookie-consent-mount"
        aria-expanded="false">
        Privacy
      </button>
    </div>
  </div>
</footer>
