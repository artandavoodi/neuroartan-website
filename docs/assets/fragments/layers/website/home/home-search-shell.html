<!-- =============================================================================
     HOME SEARCH SHELL FRAGMENT
     Purpose: modular home-layer search surface for models, people, and knowledge.
     Notes:
     - UI shell only
     - retrieval ownership stays with existing search/query infrastructure
     - designed for dashboard/home mounting, not institutional menu replacement
============================================================================= -->

<section class="home-search-shell" id="home-search-shell" aria-label="Home search shell" hidden>
  <div class="home-search-shell__dialog" role="dialog" aria-modal="true" aria-labelledby="home-search-shell-title">
    <div class="home-search-shell__header">
      <div class="home-search-shell__heading-group">
        <p class="home-search-shell__eyebrow">Search</p>
        <h2 class="home-search-shell__title" id="home-search-shell-title">Knowledge, platform, and profile search</h2>
      </div>

      <button
        class="home-search-shell__close global-close-button"
        id="home-search-shell-close"
        type="button"
        aria-label="Close search">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>

    <div class="home-search-shell__body">
      <form class="home-search-shell__form" id="home-search-shell-form" role="search" novalidate>
        <label class="home-search-shell__label" for="home-search-shell-input">Search query</label>
        <div class="home-search-shell__input-row">
          <span class="home-search-shell__input-icon" aria-hidden="true">
            <img src="/assets/icons/core/actions/unclassified/search.svg" alt="">
          </span>
          <input
            class="home-search-shell__input"
            id="home-search-shell-input"
            name="q"
            type="search"
            inputmode="search"
            autocomplete="off"
            placeholder="Search models, users, platform knowledge, or updates"
            aria-describedby="home-search-shell-hint" />
        </div>
        <p class="home-search-shell__hint" id="home-search-shell-hint">
          Search public pages, platform knowledge, and canonical profile routes.
        </p>
      </form>

      <div class="home-search-shell__quick-actions" aria-label="Quick search suggestions">
        <button class="home-search-shell__chip" type="button" data-home-search-chip="ICOS">ICOS</button>
        <button class="home-search-shell__chip" type="button" data-home-search-chip="Platform">Platform</button>
        <button class="home-search-shell__chip" type="button" data-home-search-chip="Research">Research</button>
        <button class="home-search-shell__chip" type="button" data-home-search-chip="Profiles">Profiles</button>
        <button class="home-search-shell__chip" type="button" data-home-search-chip="Updates">Updates</button>
      </div>

      <div class="home-search-shell__results" id="home-search-shell-results" aria-live="polite">
        <div class="home-search-shell__empty-state" id="home-search-shell-empty-state">
          <p class="home-search-shell__empty-title">Start with a query</p>
          <p class="home-search-shell__empty-text">
            Search public pages, platform knowledge, and future profile routes from one surface.
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
