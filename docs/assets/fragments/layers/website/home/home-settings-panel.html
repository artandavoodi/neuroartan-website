<!-- =============================================================================
     00) FILE INDEX
     01) HOME SETTINGS PANEL ROOT
     02) PANEL HEADER
     03) APPEARANCE SECTION
     04) LANGUAGE / REGION / PRIVACY SECTION
     05) IDENTITY / ROUTE SECTION
============================================================================= -->

<!-- =============================================================================
     01) HOME SETTINGS PANEL ROOT
============================================================================= -->
<aside class="home-settings-panel" id="home-settings-panel" aria-label="Home settings panel" hidden>
  <div class="home-settings-panel__inner">
    <!-- =============================================================================
         02) PANEL HEADER
    ============================================================================= -->
    <div class="home-settings-panel__header">
      <div class="home-settings-panel__heading-group">
        <p class="home-settings-panel__eyebrow">Settings</p>
        <h2 class="home-settings-panel__title">Appearance, language, privacy, and identity settings</h2>
      </div>

      <button
        class="home-settings-panel__close global-close-button"
        id="home-settings-panel-close"
        data-home-settings-close
        type="button"
        aria-label="Close settings panel">
        <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
        <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
      </button>
    </div>

    <!-- =============================================================================
         03) APPEARANCE SECTION
    ============================================================================= -->
    <section class="home-settings-panel__section" data-home-settings-section="theme" aria-label="Display settings">
      <p class="home-settings-panel__section-title">Appearance</p>
      <div class="home-settings-panel__theme-grid" role="group" aria-label="Theme controls">
        <button class="home-settings-panel__theme-option" data-theme-option="system" type="button">System</button>
        <button class="home-settings-panel__theme-option" data-theme-option="custom" type="button">Custom</button>
        <button class="home-settings-panel__theme-option" data-theme-option="dark" type="button">Dark</button>
        <button class="home-settings-panel__theme-option" data-theme-option="light" type="button">Light</button>
      </div>
    </section>

    <!-- =============================================================================
         04) LANGUAGE / REGION / PRIVACY SECTION
    ============================================================================= -->
    <section class="home-settings-panel__section" data-home-settings-section="language-privacy" aria-label="Language and privacy settings">
      <p class="home-settings-panel__section-title">Language, region, and privacy</p>
      <div class="home-settings-panel__stack">
        <button class="home-settings-panel__item" data-home-settings-action="language" type="button">
          <span>Language</span>
          <span class="home-settings-panel__item-value" data-home-settings-language-value>English</span>
        </button>
        <button class="home-settings-panel__item" data-home-settings-action="country" type="button">
          <span>Country</span>
          <span class="home-settings-panel__item-value" data-home-settings-country-value>United States</span>
        </button>
        <button class="home-settings-panel__item" data-home-settings-action="privacy" type="button">
          <span>Privacy</span>
          <span class="home-settings-panel__item-value">Cookie settings and privacy controls</span>
        </button>
      </div>
    </section>

    <!-- =============================================================================
         05) IDENTITY / ROUTE SECTION
    ============================================================================= -->
    <section class="home-settings-panel__section" data-home-settings-section="identity-route" aria-label="Profile and route settings">
      <p class="home-settings-panel__section-title">Identity and route</p>
      <div class="home-settings-panel__stack">
        <button class="home-settings-panel__item" data-home-settings-action="profile" type="button">
          <span>Private profile</span>
          <span class="home-settings-panel__item-value">Open private profile surface</span>
        </button>
        <button class="home-settings-panel__item" data-home-settings-action="public-route" type="button">
          <span>Public route</span>
          <span class="home-settings-panel__item-value" data-home-settings-route-value>neuroartan.com/username</span>
        </button>
      </div>
    </section>
  </div>
</aside>
