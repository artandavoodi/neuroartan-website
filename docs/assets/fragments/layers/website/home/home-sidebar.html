<!-- =============================================================================
     HOME SIDEBAR FRAGMENT
     Purpose: primary left-side navigation shell for the homepage/dashboard layer.
     Notes:
     - distinct from institutional menu ownership
     - hidden by default and opened from the home topbar
     - supports navigation, quick actions, and continuity access
============================================================================= -->

<aside class="home-sidebar" id="home-sidebar" aria-label="Home sidebar" hidden>
  <div class="home-sidebar__inner">
    <div class="home-sidebar__header">
      <div class="home-sidebar__heading-group">
        <p class="home-sidebar__eyebrow">Navigation</p>
        <h2 class="home-sidebar__title">Platform surfaces and quick access</h2>
      </div>

      <button
        class="home-sidebar__close global-close-button"
        id="home-sidebar-close"
        type="button"
        aria-label="Close navigation panel">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>

    <nav class="home-sidebar__nav" aria-label="Home sidebar navigation">
      <a class="home-sidebar__nav-link home-sidebar__nav-link--active" href="/" aria-current="page">Home</a>
      <a class="home-sidebar__nav-link" href="/pages/about/">About</a>
      <a class="home-sidebar__nav-link" href="/platform/">Platform</a>
      <a class="home-sidebar__nav-link" href="/knowledge-research/">Knowledge</a>
      <a class="home-sidebar__nav-link" href="/updates/">Updates</a>
    </nav>

    <section class="home-sidebar__section" aria-label="Model spaces">
      <p class="home-sidebar__section-title">Model spaces</p>
      <div class="home-sidebar__stack">
        <button class="home-sidebar__stack-item" data-home-sidebar-action="profile" type="button">Open profile</button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="saved-continuities" type="button">Saved continuities</button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="recent-interactions" type="button">Recent interactions</button>
      </div>
    </section>

    <section class="home-sidebar__section" aria-label="Quick actions">
      <p class="home-sidebar__section-title">Quick actions</p>
      <div class="home-sidebar__stack">
        <button class="home-sidebar__stack-item" data-home-sidebar-action="account-entry" type="button">Create profile</button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="open-search" type="button">Open search</button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="settings" type="button">Settings</button>
      </div>
    </section>
  </div>
</aside>
