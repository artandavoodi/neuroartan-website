<!-- =============================================================================
     HOME SIDEBAR FRAGMENT
     Purpose: primary left-side navigation shell for the homepage/dashboard layer.
     Notes:
     - distinct from institutional menu ownership
     - hidden by default and opened from the home topbar
     - supports grouped platform navigation, workspace entry, and linked policy access
============================================================================= -->

<aside class="home-sidebar" id="home-sidebar" aria-label="Home sidebar" hidden>
  <div class="home-sidebar__inner">
    <div class="home-sidebar__header">
      <div class="home-sidebar__heading-group">
        <p class="home-sidebar__eyebrow">Menu</p>
        <h2 class="home-sidebar__title">Platform navigation and linked access</h2>
      </div>

      <button
        class="home-sidebar__close global-close-button"
        id="home-sidebar-close"
        type="button"
        aria-label="Close navigation panel">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>

    <section class="home-sidebar__section" aria-label="Primary navigation">
      <p class="home-sidebar__section-title">Primary Navigation</p>
      <div class="home-sidebar__stack">
        <a class="home-sidebar__stack-item home-sidebar__stack-item--link" href="/" aria-current="page">
          <span class="home-sidebar__item-label">Home</span>
        </a>
        <a class="home-sidebar__stack-item home-sidebar__stack-item--link" href="/pages/continuity-history/index.html">
          <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/cognition/unclassified/continuity.svg" alt=""></span>
          <span class="home-sidebar__item-label">Continuity</span>
        </a>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="workspace" type="button">
          <span class="home-sidebar__item-label">Workspace</span>
        </button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="profile" type="button">
          <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/identity/unclassified/profile.svg" alt=""></span>
          <span class="home-sidebar__item-label">Profile</span>
        </button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="settings" type="button">
          <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/system/unclassified/settings.svg" alt=""></span>
          <span class="home-sidebar__item-label">Settings</span>
        </button>
      </div>
    </section>

    <section class="home-sidebar__section" aria-label="Secondary linked items">
      <p class="home-sidebar__section-title">Secondary Linked Items</p>
      <div class="home-sidebar__stack">
        <a class="home-sidebar__stack-item home-sidebar__stack-item--link" href="/pages/about/">About</a>
        <a class="home-sidebar__stack-item home-sidebar__stack-item--link" href="/pages/careers/index.html">Careers</a>
        <a class="home-sidebar__stack-item home-sidebar__stack-item--link" href="/pages/legal/privacy/index.html">Privacy Policy</a>
        <a class="home-sidebar__stack-item home-sidebar__stack-item--link" href="/pages/legal/terms/index.html">Terms of Use</a>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="cookie-settings" type="button">Cookie Settings</button>
      </div>
    </section>
  </div>
</aside>
