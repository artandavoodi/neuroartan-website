<!-- =============================================================================
     01) INTERACTION SETTINGS ROOT
============================================================================= -->
<section class="home-interaction-settings-panel" id="home-interaction-settings-panel" data-home-interaction-settings-state="closed" data-home-interaction-settings-active-section="overview" hidden aria-hidden="true" aria-label="Homepage interaction settings">
  <div class="home-interaction-settings-panel__surface" role="dialog" aria-modal="false" aria-labelledby="home-interaction-settings-panel-title">
    <!-- =============================================================================
         02) INTERACTION SETTINGS HEADER
    ============================================================================= -->
    <header class="home-interaction-settings-panel__header">
      <div class="home-interaction-settings-panel__title-block">
        <p class="home-interaction-settings-panel__eyebrow">Interaction settings</p>
        <h2 class="home-interaction-settings-panel__title" id="home-interaction-settings-panel-title">Control center</h2>
      </div>
      <button class="global-close-button home-interaction-settings-panel__close" type="button" data-home-interaction-settings-close="true" aria-label="Close interaction settings">
        <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
        <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
      </button>
    </header>

    <!-- =============================================================================
         03) INTERACTION SETTINGS BODY
    ============================================================================= -->
    <div class="home-interaction-settings-panel__body">
      <!-- =============================================================================
           04) INTERACTION SETTINGS NAVIGATION
      ============================================================================= -->
      <nav class="home-interaction-settings-panel__nav" aria-label="Interaction settings sections">
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="overview" aria-selected="true">Overview</button>
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="model" aria-selected="false">Model</button>
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="response" aria-selected="false">Response</button>
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="voice" aria-selected="false">Voice</button>
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="stage" aria-selected="false">Stage</button>
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="history" aria-selected="false">Chat history</button>
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="privacy" aria-selected="false">Privacy</button>
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="accessibility" aria-selected="false">Accessibility</button>
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="developer" aria-selected="false">Developer</button>
        <button class="home-platform-shell__nav-item home-interaction-settings-panel__nav-item" type="button" data-home-interaction-settings-tab="session" aria-selected="false">Session</button>
      </nav>

      <!-- =============================================================================
           05) INTERACTION SETTINGS SECTION INCLUDES
      ============================================================================= -->
      <div class="home-interaction-settings-panel__content">
        <div id="home-interaction-settings-overview-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="overview" data-include="home-interaction-settings-overview"></div>
        <div id="home-interaction-settings-model-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="model" data-include="home-interaction-settings-model" hidden></div>
        <div id="home-interaction-settings-response-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="response" data-include="home-interaction-settings-response" hidden></div>
        <div id="home-interaction-settings-voice-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="voice" data-include="home-interaction-settings-voice" hidden></div>
        <div id="home-interaction-settings-stage-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="stage" data-include="home-interaction-settings-stage" hidden></div>
        <div id="home-interaction-settings-history-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="history" data-include="home-interaction-settings-history" hidden></div>
        <div id="home-interaction-settings-privacy-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="privacy" data-include="home-interaction-settings-privacy" hidden></div>
        <div id="home-interaction-settings-accessibility-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="accessibility" data-include="home-interaction-settings-accessibility" hidden></div>
        <div id="home-interaction-settings-developer-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="developer" data-include="home-interaction-settings-developer" hidden></div>
        <div id="home-interaction-settings-session-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="session" data-include="home-interaction-settings-session" hidden></div>
      </div>
    </div>
  </div>
</section>
