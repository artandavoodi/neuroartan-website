<!-- =============================================================================
     00) FILE INDEX
     01) INTERACTION SETTINGS ROOT
     02) INTERACTION SETTINGS CHROME
     03) INTERACTION SETTINGS MAIN GRID
     04) LEFT NAVIGATION RAIL
     05) PRIMARY NAVIGATION
     06) RIGHT CONTENT SURFACE
============================================================================= -->

<!-- =============================================================================
     01) INTERACTION SETTINGS ROOT
============================================================================= -->
<section class="home-interaction-settings-panel" id="home-interaction-settings-panel" hidden aria-hidden="true" aria-label="Interaction settings">
  <!-- =============================================================================
       02) INTERACTION SETTINGS CHROME
  ============================================================================= -->
  <div class="home-interaction-settings-panel__chrome">
    <div class="home-interaction-settings-panel__chrome-leading">
      <button
        type="button"
        class="home-interaction-settings-panel__rail-toggle"
        id="home-interaction-settings-panel-rail-toggle"
        aria-label="Toggle navigation rail"
        aria-selected="false"
        data-home-interaction-settings-rail-toggle
      >
        <span class="home-interaction-settings-panel__rail-toggle-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
          <img
            class="ui-icon-theme-aware"
            src="/registry/icons/public/assets/core/navigation/panel/panel-left-deactivated.svg"
            alt=""
            data-home-interaction-settings-rail-toggle-icon
            data-home-interaction-settings-rail-icon-expanded="/registry/icons/public/assets/core/navigation/panel/panel-left-activated.svg"
            data-home-interaction-settings-rail-icon-collapsed="/registry/icons/public/assets/core/navigation/panel/panel-left-deactivated.svg">
        </span>
      </button>

      <button
        type="button"
        class="home-interaction-settings-panel__nested-back"
        data-home-interaction-settings-nested-back="true"
        aria-label="Previous"
        hidden
      >
        <img class="ui-icon-theme-aware home-interaction-settings-panel__nested-navigation-icon" src="/registry/icons/public/assets/core/navigation/direction/back.svg" alt="" aria-hidden="true">
      </button>

      <button
        type="button"
        class="home-interaction-settings-panel__nested-next"
        data-home-interaction-settings-nested-next="true"
        aria-label="Next"
        hidden
      >
        <img class="ui-icon-theme-aware home-interaction-settings-panel__nested-navigation-icon" src="/registry/icons/public/assets/core/navigation/direction/right.svg" alt="" aria-hidden="true">
      </button>

      <button
        type="button"
        class="home-interaction-settings-panel__nav-expand"
        data-home-interaction-settings-nav-expand="overview"
        aria-label="Expand session"
        aria-pressed="false"
        hidden
      >
        <img class="ui-icon-theme-aware home-interaction-settings-panel__nav-expand-icon" src="/registry/icons/public/assets/core/actions/expand-collapse/expand.svg" alt="" data-home-interaction-settings-nav-expand-icon data-home-interaction-settings-nav-expand-icon-expanded="/registry/icons/public/assets/core/actions/expand-collapse/collapse.svg" data-home-interaction-settings-nav-expand-icon-collapsed="/registry/icons/public/assets/core/actions/expand-collapse/expand.svg">
      </button>
    </div>
    <div class="home-interaction-settings-panel__chrome-trailing">
      <button
        type="button"
        class="global-close-button home-interaction-settings-panel__close"
        id="home-interaction-settings-panel-close"
        aria-label="Close interaction settings"
        data-home-interaction-settings-close="true"
      >
        <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
        <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <!-- =============================================================================
       03) INTERACTION SETTINGS MAIN GRID
  ============================================================================= -->
  <div class="home-interaction-settings-panel__main">
    <!-- ======================================================================
    04) LEFT NAVIGATION RAIL
    ======================================================================= -->
    <aside class="home-interaction-settings-panel__rail" aria-label="Interaction settings navigation">
      <div class="home-interaction-settings-panel__rail-inner">
        <!-- ================================================================
        05) PRIMARY NAVIGATION
        ================================================================= -->
        <div class="home-interaction-settings-panel__group" data-home-interaction-settings-rail-group="primary">
          <nav class="home-interaction-settings-panel__nav" aria-label="Primary interaction settings navigation">
            <button type="button" class="home-interaction-settings-panel__nav-item is-active" data-home-interaction-settings-destination="overview" aria-pressed="true" id="home-interaction-settings-panel-nav-overview">
              <span class="home-interaction-settings-panel__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/identity/session/session.svg" alt=""></span>
              <span class="home-interaction-settings-panel__nav-text">Session</span>
            </button>
            <button type="button" class="home-interaction-settings-panel__nav-item" data-home-interaction-settings-destination="workspace-context" aria-pressed="false" id="home-interaction-settings-panel-nav-workspace-context">
              <span class="home-interaction-settings-panel__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/productivity/workspace/workspace.svg" alt=""></span>
              <span class="home-interaction-settings-panel__nav-text">Workspace</span>
            </button>
            <button type="button" class="home-interaction-settings-panel__nav-item" data-home-interaction-settings-destination="model" aria-pressed="false" id="home-interaction-settings-panel-nav-model">
              <span class="home-interaction-settings-panel__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/cognition/model/model.svg" alt=""></span>
              <span class="home-interaction-settings-panel__nav-text">Model</span>
            </button>
            <button type="button" class="home-interaction-settings-panel__nav-item" data-home-interaction-settings-destination="settings" aria-pressed="false" id="home-interaction-settings-panel-nav-settings">
              <span class="home-interaction-settings-panel__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/home/stage/interaction-panel/interaction-settings.svg" alt=""></span>
              <span class="home-interaction-settings-panel__nav-text">Preferences</span>
            </button>
          </nav>
        </div>
      </div>
    </aside>

    <!-- ======================================================================
    07) MIDDLE NAVIGATION LAYER
    ======================================================================= -->
    <aside class="home-interaction-settings-panel__subrail" aria-label="Section-local navigation" hidden>
      <div class="home-interaction-settings-panel__subrail-inner">
        <div class="home-interaction-settings-panel__subrail-header">
          <p class="home-interaction-settings-panel__subrail-label" data-home-interaction-settings-subrail-label>Session</p>
        </div>

        <nav class="home-interaction-settings-panel__subnav" id="home-interaction-settings-panel-subnav" data-home-interaction-settings-subnav-root aria-label="Section-local navigation"></nav>
      </div>
    </aside>

    <!-- ======================================================================
    08) RIGHT CONTENT SURFACE
    ======================================================================= -->
    <section class="home-interaction-settings-panel__content" aria-label="Interaction settings content">
      <div class="home-interaction-settings-panel__content-inner" id="home-interaction-settings-panel-content" data-home-interaction-settings-content-root>
        <div id="home-interaction-settings-overview-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="overview" data-include="home-interaction-settings-overview"></div>
        <div id="home-interaction-settings-workspace-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="workspace" data-include="home-interaction-settings-workspace" hidden></div>
        <div id="home-interaction-settings-model-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="model" data-include="home-interaction-settings-model" hidden></div>
        <div id="home-interaction-settings-response-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="response" data-include="home-interaction-settings-response" hidden></div>
        <div id="home-interaction-settings-voice-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="voice" data-include="home-interaction-settings-voice" hidden></div>
        <div id="home-interaction-settings-memory-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="memory" data-include="home-interaction-settings-memory" hidden></div>
        <div id="home-interaction-settings-session-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="session" data-include="home-interaction-settings-session" hidden></div>
        <div id="home-interaction-settings-stage-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="stage" data-include="home-interaction-settings-stage" hidden></div>
        <div id="home-interaction-settings-developer-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="developer" data-include="home-interaction-settings-developer" hidden></div>
        <div id="home-interaction-settings-changelog-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="changelog" data-include="home-interaction-settings-changelog" hidden></div>
        <div id="home-interaction-settings-privacy-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="privacy" data-include="home-interaction-settings-privacy" hidden></div>
        <div id="home-interaction-settings-accessibility-mount" class="home-interaction-settings-panel__section-mount" data-home-interaction-settings-section-mount="accessibility" data-include="home-interaction-settings-accessibility" hidden></div>
      </div>
    </section>
  </div>
</section>
