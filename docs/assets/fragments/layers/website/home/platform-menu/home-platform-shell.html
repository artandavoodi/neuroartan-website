<!-- =============================================================================
01) HOME PLATFORM SHELL
============================================================================= -->
<section
  class="home-platform-shell"
  id="home-platform-shell"
  hidden
  aria-hidden="true"
  aria-label="Platform shell"
>
  <!-- ========================================================================
  02) SHELL CHROME CONTROLS
  ========================================================================= -->
  <div class="home-platform-shell__chrome">
    <button
      type="button"
      class="global-close-button home-platform-shell__close"
      id="home-platform-shell-close"
      aria-label="Close platform shell"
      data-home-platform-shell-close
    >
      <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
      <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
    </button>
    <button
      type="button"
      class="home-platform-shell__rail-toggle"
      id="home-platform-shell-rail-toggle"
      aria-label="Toggle navigation rail"
      aria-pressed="false"
      data-home-platform-shell-rail-toggle
    >
      <span class="home-platform-shell__rail-toggle-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
        <img
          class="ui-icon-theme-aware"
          src="/assets/icons/core/navigation/unclassified/sidebar-active.svg"
          alt=""
          data-home-platform-rail-toggle-icon
          data-home-platform-rail-icon-expanded="/assets/icons/core/navigation/unclassified/sidebar-active.svg"
          data-home-platform-rail-icon-collapsed="/assets/icons/core/navigation/unclassified/sidebar-left.svg">
      </span>
    </button>
  </div>

  <!-- ========================================================================
  03) SHELL MAIN GRID
  ========================================================================= -->
  <div class="home-platform-shell__main">
    <!-- ======================================================================
    04) LEFT NAVIGATION RAIL
    ======================================================================= -->
    <aside class="home-platform-shell__rail" aria-label="Platform navigation">
      <div class="home-platform-shell__rail-inner">
        <!-- ================================================================
        05) PRIMARY NAVIGATION
        ================================================================= -->
        <div class="home-platform-shell__group">
          <nav class="home-platform-shell__nav" aria-label="Primary platform navigation">
            <button type="button" class="home-platform-shell__nav-item is-active" data-home-platform-destination="home" aria-pressed="true" id="home-platform-shell-nav-home">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/navigation/unclassified/home.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Home</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="continuity" aria-pressed="false" id="home-platform-shell-nav-continuity">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/cognition/unclassified/continuity.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Continuity</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="workspace" aria-pressed="false" id="home-platform-shell-nav-workspace">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/productivity/workspace/workspace.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Workspace</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="profile" aria-pressed="false" id="home-platform-shell-nav-profile">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/identity/unclassified/profile.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Profile</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="settings" aria-pressed="false" id="home-platform-shell-nav-settings">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/system/unclassified/settings.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Settings</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="messaging" aria-pressed="false" id="home-platform-shell-nav-messaging">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/communication/messaging/messages.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Messaging</span>
              <span class="home-platform-shell__nav-indicator" data-home-platform-nav-indicator="messaging" data-home-platform-nav-indicator-state="idle" hidden></span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="notifications" aria-pressed="false" id="home-platform-shell-nav-notifications">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/system/unclassified/notification.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Notifications</span>
              <span class="home-platform-shell__nav-indicator" data-home-platform-nav-indicator="notifications" data-home-platform-nav-indicator-state="idle" hidden></span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="more" aria-pressed="false" id="home-platform-shell-nav-more">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/navigation/unclassified/more.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">More</span>
            </button>
          </nav>
        </div>

        <!-- ================================================================
        06) SECONDARY LINKED ITEMS
        ================================================================= -->
        <div class="home-platform-shell__group">
          <nav class="home-platform-shell__nav" aria-label="Secondary linked items">
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-link-href="/pages/about/index.html" id="home-platform-shell-link-about">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/actions/unclassified/link.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">About</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-link-href="/pages/careers/index.html" id="home-platform-shell-link-careers">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/actions/unclassified/link.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Careers</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-link-href="/pages/legal/privacy/index.html" id="home-platform-shell-link-privacy">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/actions/unclassified/link.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Privacy Policy</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-link-href="/pages/legal/terms/index.html" id="home-platform-shell-link-terms">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/actions/unclassified/link.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Terms of Use</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="cookie-settings" aria-pressed="false" id="home-platform-shell-nav-cookie-settings">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/legal/privacy/cookies.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Cookie Settings</span>
            </button>
          </nav>
        </div>
      </div>
    </aside>

    <!-- ======================================================================
    07) MIDDLE NAVIGATION LAYER
    ======================================================================= -->
    <aside class="home-platform-shell__subrail" aria-label="Section-local navigation">
      <div class="home-platform-shell__subrail-inner">
        <div class="home-platform-shell__subrail-header">
          <p class="home-platform-shell__subrail-label" data-home-platform-subrail-label>Home</p>
        </div>

        <nav class="home-platform-shell__subnav" id="home-platform-shell-subnav" data-home-platform-subnav-root aria-label="Section-local navigation"></nav>
      </div>
    </aside>

    <!-- ======================================================================
    08) RIGHT CONTENT SURFACE
    ======================================================================= -->
    <section class="home-platform-shell__content" aria-label="Platform shell content">
      <div class="home-platform-shell__content-header">
        <p class="home-platform-shell__content-eyebrow" data-home-platform-content-eyebrow>Home</p>
        <h2 class="home-platform-shell__content-title" data-home-platform-content-title>Home</h2>
        <p class="home-platform-shell__content-copy" data-home-platform-content-copy>Unified platform shell ready. Select a destination from the left rail to continue through one stable navigation and content surface.</p>
      </div>

      <div class="home-platform-shell__content-inner" id="home-platform-shell-content" data-home-platform-content-root></div>
    </section>
  </div>
</section>

<!-- =============================================================================
09) END OF FILE
============================================================================= -->
