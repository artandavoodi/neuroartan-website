<!-- =============================================================================
01) HOME PLATFORM SHELL
============================================================================= -->
<section
  class="home-platform-shell"
  id="home-platform-shell"
  hidden
  aria-hidden="true"
  aria-label="Platform shell"
>
  <!-- ========================================================================
  02) SHELL CHROME CONTROLS
  ========================================================================= -->
  <div class="home-platform-shell__chrome">
    <div class="home-platform-shell__chrome-leading">
      <button
        type="button"
        class="home-platform-shell__back"
        id="home-platform-shell-back"
        aria-label="Back to main navigation"
        aria-hidden="true"
        data-home-platform-shell-back
        hidden
      >
        <span class="home-platform-shell__back-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
          <img
            class="ui-icon-theme-aware"
            src="/registry/icons/public/assets/core/navigation/direction/back.svg"
            alt="">
        </span>
      </button>

      <button
        type="button"
        class="home-platform-shell__rail-toggle"
        id="home-platform-shell-rail-toggle"
        aria-label="Toggle navigation rail"
        aria-pressed="false"
        data-home-platform-shell-rail-toggle
      >
        <span class="home-platform-shell__rail-toggle-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
          <img
            class="ui-icon-theme-aware"
            src="/registry/icons/public/assets/core/navigation/panel/panel-left-activated.svg"
            alt=""
            data-home-platform-rail-toggle-icon
            data-home-platform-rail-icon-expanded="/registry/icons/public/assets/core/navigation/panel/panel-left-activated.svg"
            data-home-platform-rail-icon-collapsed="/registry/icons/public/assets/core/navigation/panel/panel-left-deactivated.svg">
        </span>
      </button>
    </div>
    <div class="home-platform-shell__chrome-trailing">
      <button
        type="button"
        class="global-close-button home-platform-shell__close"
        id="home-platform-shell-close"
        aria-label="Close platform shell"
        data-home-platform-shell-close
      >
        <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
        <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <!-- ========================================================================
  03) SHELL MAIN GRID
  ========================================================================= -->
  <div class="home-platform-shell__main">
    <!-- ======================================================================
    04) LEFT NAVIGATION RAIL
    ======================================================================= -->
    <aside class="home-platform-shell__rail" aria-label="Platform navigation">
      <div class="home-platform-shell__rail-inner">
        <!-- ================================================================
        05) PRIMARY NAVIGATION
        ================================================================= -->
        <div class="home-platform-shell__group" data-home-platform-rail-group="primary">
          <nav class="home-platform-shell__nav" aria-label="Primary platform navigation">
            <button type="button" class="home-platform-shell__nav-item is-active" data-home-platform-destination="home" aria-pressed="true" id="home-platform-shell-nav-home" data-profile-auth-visible="signed-in">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/primary/home.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Home</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="continuity" aria-pressed="false" id="home-platform-shell-nav-continuity" data-profile-auth-visible="signed-in">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/cognition/continuity/continuity.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Continuity</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="workspace" aria-pressed="false" id="home-platform-shell-nav-workspace" data-profile-auth-visible="signed-in">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/productivity/workspace/workspace.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Workspace</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="profile" aria-pressed="false" id="home-platform-shell-nav-profile">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/identity/profile/profile.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Profile</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="settings" aria-pressed="false" id="home-platform-shell-nav-settings">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/home/platform-menu/platform-menu-settings.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Settings</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="messaging" aria-pressed="false" id="home-platform-shell-nav-messaging" data-profile-auth-visible="signed-in">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/layers/icos/communication/chat/chat.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Messaging</span>
              <span class="home-platform-shell__nav-indicator" data-home-platform-nav-indicator="messaging" data-home-platform-nav-indicator-state="idle" hidden></span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="notifications" aria-pressed="false" id="home-platform-shell-nav-notifications">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/system/notifications/notification.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">Notifications</span>
              <span class="home-platform-shell__nav-indicator" data-home-platform-nav-indicator="notifications" data-home-platform-nav-indicator-state="idle" hidden></span>
            </button>
            <button type="button" class="home-platform-shell__nav-item" data-home-platform-destination="more" aria-pressed="false" id="home-platform-shell-nav-more">
              <span class="home-platform-shell__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true"><img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/more/navigation-more.svg" alt=""></span>
              <span class="home-platform-shell__nav-text">More</span>
            </button>
          </nav>
        </div>

        <!-- ================================================================
        06) SECONDARY LINKED ITEMS
        ================================================================= -->
<div class="home-platform-shell__group" data-home-platform-rail-group="secondary">
          <nav class="home-platform-shell__nav" aria-label="Secondary linked items">
            <button type="button" class="home-platform-shell__nav-item home-platform-shell__nav-item--footer-link" data-home-platform-link-href="/pages/about/index.html" id="home-platform-shell-link-about" data-profile-auth-visible="signed-out">
              <span class="home-platform-shell__nav-text">About</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item home-platform-shell__nav-item--footer-link" data-home-platform-link-href="/pages/careers/index.html" id="home-platform-shell-link-careers" data-profile-auth-visible="signed-out">
              <span class="home-platform-shell__nav-text">Careers</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item home-platform-shell__nav-item--footer-link" data-home-platform-link-href="/pages/legal/privacy/index.html" id="home-platform-shell-link-privacy" data-profile-auth-visible="signed-out">
              <span class="home-platform-shell__nav-text">Privacy Policy</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item home-platform-shell__nav-item--footer-link" data-home-platform-link-href="/pages/legal/terms/index.html" id="home-platform-shell-link-terms" data-profile-auth-visible="signed-out">
              <span class="home-platform-shell__nav-text">Terms of Use</span>
            </button>
            <button type="button" class="home-platform-shell__nav-item home-platform-shell__nav-item--footer-link" data-home-platform-destination="cookie-settings" aria-pressed="false" id="home-platform-shell-nav-cookie-settings" data-profile-auth-visible="signed-out">
              <span class="home-platform-shell__nav-text">Cookie Settings</span>
            </button>
          </nav>
        </div>
      </div>
    </aside>

    <!-- ======================================================================
    07) MIDDLE NAVIGATION LAYER
    ======================================================================= -->
    <aside class="home-platform-shell__subrail" aria-label="Section-local navigation">
      <div class="home-platform-shell__subrail-inner">
        <div class="home-platform-shell__subrail-header">
          <p class="home-platform-shell__subrail-label" data-home-platform-subrail-label>Home</p>
        </div>

        <nav class="home-platform-shell__subnav" id="home-platform-shell-subnav" data-home-platform-subnav-root aria-label="Section-local navigation"></nav>
      </div>
    </aside>

    <!-- ======================================================================
    08) RIGHT CONTENT SURFACE
    ======================================================================= -->
    <section class="home-platform-shell__content" aria-label="Platform shell content">
      <div class="home-platform-shell__content-header">
        <p class="home-platform-shell__content-eyebrow" data-home-platform-content-eyebrow>Home</p>
        <h2 class="home-platform-shell__content-title" data-home-platform-content-title>Home</h2>
        <p class="home-platform-shell__content-copy" data-home-platform-content-copy></p>
      </div>

      <div class="home-platform-shell__content-inner" id="home-platform-shell-content" data-home-platform-content-root></div>
    </section>
  </div>
</section>

<!-- =============================================================================
09) END OF FILE
============================================================================= -->
