<section class="home-overview-module home-overview-module--continuity" data-home-overview-module="continuity-memory">
  <div class="home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="continuity-memory">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Continuity</p>
        <h2 class="home-platform-theme__section-title" id="continuity-memory">Continuity and Memory</h2>
      </div>

      <div class="home-platform-theme__mode-grid" data-home-continuity-list>
        <button class="home-platform-theme__mode-option home-platform-theme__mode-option--active" type="button" data-continuity-thread="recent">
          <span class="home-platform-theme__mode-label">Recent Carryover</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-continuity-thread="reflection">
          <span class="home-platform-theme__mode-label">Reflection Threads</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-continuity-thread="memory">
          <span class="home-platform-theme__mode-label">Memory Density</span>
        </button>
      </div>

      <div class="home-platform-theme__toggle-list" data-home-continuity-preview>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Active Overview</p>
            <p class="home-platform-theme__toggle-caption">Current continuity view</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-continuity-value>Recent Carryover</span>
        </div>
      </div>
    </section>
  </div>
</section>
