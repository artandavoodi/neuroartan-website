<section class="home-overview-module home-overview-module--graph" data-home-overview-module="knowledge-graph">
  <div class="home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="knowledge-graph">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Cognitive Map</p>
        <h2 class="home-platform-theme__section-title" id="knowledge-graph">Knowledge Graph Preview</h2>
      </div>

      <div class="home-platform-theme__toggle-list" data-home-graph-preview>
        <button class="home-platform-theme__action-button" type="button" data-home-graph-node="domains">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/cognition/knowledge/knowledge.svg" alt="" width="16" height="16">
            Domains
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-graph-node="themes">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/settings/chat-history/chat-history.svg" alt="" width="16" height="16">
            Themes
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-graph-node="entities">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/home/platform-menu/profile/platform-menue-profile-account-control.svg" alt="" width="16" height="16">
            Entities
          </span>
        </button>
      </div>

      <div class="home-platform-theme__toggle-list" data-home-graph-status>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Preview Focus</p>
            <p class="home-platform-theme__toggle-caption">Current graph view</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-graph-value>Domains</span>
        </div>
      </div>
    </section>
  </div>
</section>
