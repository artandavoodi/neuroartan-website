<section class="home-overview-module home-overview-module--readiness" data-home-overview-module="model-readiness">
  <div class="home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="model-readiness">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Model Layer</p>
        <h2 class="home-platform-theme__section-title" id="model-readiness">Model Readiness</h2>
      </div>

      <div class="home-platform-theme__mode-grid" data-home-readiness-track>
        <button class="home-platform-theme__mode-option home-platform-theme__mode-option--active" type="button" data-readiness-node="training">
          <span class="home-platform-theme__mode-label">Training</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-readiness-node="voice">
          <span class="home-platform-theme__mode-label">Voice</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-readiness-node="verification">
          <span class="home-platform-theme__mode-label">Verification</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-readiness-node="publication">
          <span class="home-platform-theme__mode-label">Publication</span>
        </button>
      </div>

      <div class="home-platform-theme__toggle-list" data-home-readiness-detail>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Selected State</p>
            <p class="home-platform-theme__toggle-caption">Current readiness state</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-readiness-value>Training</span>
        </div>
      </div>
    </section>
  </div>
</section>
