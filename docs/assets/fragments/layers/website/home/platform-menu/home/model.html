<section class="home-overview-module home-overview-module--model" data-home-overview-module="model">
  <div class="home-platform-theme" data-home-platform-destination-surface>
    <section class="home-overview-module__section" aria-labelledby="model">
      <div class="home-platform-theme__section-header">
        <h2 class="home-platform-theme__section-title" id="model">Model</h2>
        <p class="home-platform-theme__section-caption">Current condition of the personal model.</p>
      </div>

      <div class="home-model-overview" data-home-model-content hidden>
        <div class="home-model-overview__scan" data-home-model-scan aria-label="Compact model cognitive scan"></div>
        <div class="home-model-overview__summary">
          <div class="home-model-overview__status">
            <p class="home-model-overview__eyebrow">Active model</p>
            <p class="home-model-overview__title" data-home-model-field="modelName">Model unavailable</p>
            <p class="home-model-overview__caption" data-home-model-field="modelState">Awaiting backend state</p>
          </div>
          <div class="home-model-overview__metrics" data-home-model-metrics></div>
        </div>
      </div>

      <div class="home-platform-theme__empty-state" data-home-module-empty-state>
        <p class="home-platform-theme__empty-title">No model state yet</p>
        <p class="home-platform-theme__empty-caption">Model condition, readiness, and active state appear here when the personal model has available status.</p>
      </div>
    </section>
  </div>
</section>
