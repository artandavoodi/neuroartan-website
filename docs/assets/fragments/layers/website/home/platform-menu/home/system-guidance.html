<section class="home-overview-module home-overview-module--guidance" data-home-overview-module="system-guidance">
  <div class="home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="system-guidance">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Guidance</p>
        <h2 class="home-platform-theme__section-title" id="system-guidance">System Guidance</h2>
      </div>

      <div class="home-platform-theme__mode-grid" data-home-guidance-actions>
        <button class="home-platform-theme__mode-option home-platform-theme__mode-option--active" type="button" data-home-guidance-action="voice">
          <span class="home-platform-theme__mode-label">Strengthen Voice</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-guidance-action="profile">
          <span class="home-platform-theme__mode-label">Complete Profile</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-guidance-action="sources">
          <span class="home-platform-theme__mode-label">Connect Sources</span>
        </button>
      </div>

      <div class="home-platform-theme__toggle-list" data-home-guidance-detail>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Priority Action</p>
            <p class="home-platform-theme__toggle-caption">Current guidance focus</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-guidance-value>Strengthen Voice</span>
        </div>
      </div>
    </section>
  </div>
</section>
