<section class="home-overview-module home-overview-module--system" data-home-overview-module="system-overview">
  <div class="home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="system-overview">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">ICOS State</p>
        <h2 class="home-platform-theme__section-title" id="system-overview">System Overview</h2>
      </div>

      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Active Model</p>
            <p class="home-platform-theme__toggle-caption">Current model state</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-system-value="model">Model state</span>
        </div>

        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Session</p>
            <p class="home-platform-theme__toggle-caption">Current session state</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-system-value="session">Session state</span>
        </div>

        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Memory</p>
            <p class="home-platform-theme__toggle-caption">Current memory state</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-system-value="memory">Memory state</span>
        </div>

        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Continuity</p>
            <p class="home-platform-theme__toggle-caption">Current continuity state</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-system-value="continuity">Continuity state</span>
        </div>
      </div>
    </section>
  </div>
</section>
