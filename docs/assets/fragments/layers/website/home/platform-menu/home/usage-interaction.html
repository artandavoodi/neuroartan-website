<section class="home-overview-module home-overview-module--usage" data-home-overview-module="usage-interaction">
  <div class="home-overview-module__header">
    <p class="home-overview-module__eyebrow">Activity</p>
    <h3 class="home-overview-module__title">Usage and Interaction</h3>
  </div>

  <div class="home-usage-switch" data-home-usage-switch>
    <button class="home-usage-switch__item is-active" type="button" data-home-usage-view="sessions">Sessions</button>
    <button class="home-usage-switch__item" type="button" data-home-usage-view="conversations">Conversations</button>
    <button class="home-usage-switch__item" type="button" data-home-usage-view="reflection">Reflection</button>
  </div>

  <div class="home-usage-panel" data-home-usage-panel>
    <span class="home-usage-panel__label">Current view</span>
    <strong class="home-usage-panel__value" data-home-usage-value>Sessions</strong>
  </div>
</section>
