<section class="home-overview-module home-overview-module--usage" data-home-overview-module="usage-interaction">
  <div class="home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="usage-interaction">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Activity</p>
        <h2 class="home-platform-theme__section-title" id="usage-interaction">Usage and Interaction</h2>
      </div>

      <div class="home-platform-theme__toggle-list" data-home-usage-switch>
        <button class="home-platform-theme__action-button" type="button" data-home-usage-view="sessions">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/session-management/session-management.svg" alt="" width="16" height="16">
            Sessions
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-usage-view="conversations">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/voice/voice.svg" alt="" width="16" height="16">
            Conversations
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-usage-view="reflection">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/configure-reflection/configure-reflection.svg" alt="" width="16" height="16">
            Reflection
          </span>
        </button>
      </div>

      <div class="home-platform-theme__toggle-list" data-home-usage-panel>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Current View</p>
            <p class="home-platform-theme__toggle-caption">Active usage view</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-usage-value>Sessions</span>
        </div>
      </div>
    </section>
  </div>
</section>
