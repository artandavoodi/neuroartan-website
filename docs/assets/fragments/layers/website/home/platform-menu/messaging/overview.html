<section class="home-platform-destination home-platform-destination--messaging-overview" data-home-platform-destination-root aria-label="Messaging destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="messaging-overview">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Messaging</p>
        <h2 class="home-platform-theme__section-title" id="messaging-overview">Messaging Overview</h2>
      </div>

      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Messaging Status</p>
            <p class="home-platform-theme__toggle-caption">Current messaging system state</p>
          </div>
          <span class="home-platform-theme__mode-caption" style="color: var(--color-error-500);">● Not Available</span>
        </div>

        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Message History</p>
            <p class="home-platform-theme__toggle-caption">Total messages in history</p>
          </div>
          <span class="home-platform-theme__mode-caption">0 Messages</span>
        </div>
      </div>

      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="new-message">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/new-message/new-message.svg" alt="" width="16" height="16">
            New Message
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="view-history">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/history/history.svg" alt="" width="16" height="16">
            View History
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="messaging-settings">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Messaging Settings</p>
        <h2 class="home-platform-theme__section-title" id="messaging-settings">Configuration</h2>
      </div>

      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Notifications</p>
            <p class="home-platform-theme__toggle-caption">Message notification preferences</p>
          </div>
          <span class="home-platform-theme__mode-caption">Enabled</span>
        </div>

        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Sound</p>
            <p class="home-platform-theme__toggle-caption">Message sound alerts</p>
          </div>
          <span class="home-platform-theme__mode-caption">Disabled</span>
        </div>
      </div>
    </section>
  </div>
</section>
