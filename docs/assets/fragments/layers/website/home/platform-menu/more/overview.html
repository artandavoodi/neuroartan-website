<section class="home-platform-destination home-platform-destination--more-overview" data-home-platform-destination-root aria-label="More destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="more-help">
      <div class="home-platform-theme__section-header" data-home-platform-theme-section-static>
        <h2 class="home-platform-theme__section-title" id="more-help">Help & Support</h2>
      </div>

      <div class="home-platform-theme__action-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="help-center">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/help/help.svg" alt="" width="16" height="16">
            Help Center
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="documentation">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/software/documentation/documentation.svg" alt="" width="16" height="16">
            Documentation
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="contact-support">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/support/contact/contact.svg" alt="" width="16" height="16">
            Contact Support
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="more-about">
      <div class="home-platform-theme__section-header" data-home-platform-theme-section-static>
        <h2 class="home-platform-theme__section-title" id="more-about">About Neuroartan</h2>
      </div>

      <div class="home-platform-theme__action-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="about-neuroartan">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/navigation/institutional/about.svg" alt="" width="16" height="16">
            About Neuroartan
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="about-icos">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/navigation/actions/icos.svg" alt="" width="16" height="16">
            About ICOS
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="leadership">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/home/actions/leadership.svg" alt="" width="16" height="16">
            Leadership
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="more-feedback">
      <div class="home-platform-theme__section-header" data-home-platform-theme-section-static>
        <h2 class="home-platform-theme__section-title" id="more-feedback">Share Feedback</h2>
      </div>

      <div class="home-platform-theme__action-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="send-feedback">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/reply/reply.svg" alt="" width="16" height="16">
            Send Feedback
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="report-issue">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/security-alerts/security-alerts.svg" alt="" width="16" height="16">
            Report Issue
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="feature-request">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/prepare-safe-request/prepare-safe-request.svg" alt="" width="16" height="16">
            Request Feature
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="more-updates">
      <div class="home-platform-theme__section-header" data-home-platform-theme-section-static>
        <h2 class="home-platform-theme__section-title" id="more-updates">Announcements & Updates</h2>
      </div>

      <div class="home-platform-theme__action-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="announcements">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/system/notifications/notification.svg" alt="" width="16" height="16">
            Announcements
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="release-notes">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/software/releases/release.svg" alt="" width="16" height="16">
            Release Notes
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="changelog">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/settings/changelog/changelog.svg" alt="" width="16" height="16">
            Changelog
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="more-legal">
      <div class="home-platform-theme__section-header" data-home-platform-theme-section-static>
        <h2 class="home-platform-theme__section-title" id="more-legal">Legal & Privacy</h2>
      </div>

      <div class="home-platform-theme__action-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="privacy-policy">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/legal/privacy/privacy.svg" alt="" width="16" height="16">
            Privacy Policy
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="terms-of-use">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/legal/terms/terms.svg" alt="" width="16" height="16">
            Terms of Use
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="cookie-policy">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/interface/cookies/cookies.svg" alt="" width="16" height="16">
            Cookie Policy
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section more-system-information" aria-labelledby="more-system" data-more-system-information>
      <div class="home-platform-theme__section-header" data-home-platform-theme-section-static>
        <h2 class="home-platform-theme__section-title" id="more-system">System Information</h2>
      </div>

      <div class="more-system-information__identity">
        <img
          class="more-system-information__brand-symbol ui-icon-theme-aware"
          src="/registry/icons/public/assets/core/identity/brand/neuroartan/logo-plain.svg"
          alt=""
          aria-hidden="true">
        <img
          class="more-system-information__brand-wordmark ui-icon-theme-aware"
          src="/registry/icons/public/assets/core/identity/brand/neuroartan/logo-typo.svg"
          alt="Neuroartan">
        <p class="more-system-information__copyright" data-more-system-copyright>© 2026 Neuroartan. All rights reserved.</p>
      </div>

      <div class="home-platform-theme__action-list more-system-information__details">
        <div class="home-platform-theme__action-row">
          <div class="home-platform-theme__action-copy">
            <p class="home-platform-theme__action-title">Version</p>
          </div>
          <span class="home-platform-theme__action-label" data-more-system-version>v1.0.0</span>
        </div>

        <div class="home-platform-theme__action-row">
          <div class="home-platform-theme__action-copy">
            <p class="home-platform-theme__action-title">Build</p>
          </div>
          <span class="home-platform-theme__action-label" data-more-system-build-label>In development</span>
        </div>
      </div>

      <div class="more-system-information__progress" data-more-system-build-progress>
        <progress class="more-system-information__progress-meter" max="4" value="1" data-more-system-progress-meter aria-label="Platform build progress"></progress>
      </div>
    </section>
  </div>
</section>
