<section class="home-platform-destination home-platform-destination--more-overview" data-home-platform-destination-root aria-label="More destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="more-overview">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">More</p>
        <h2 class="home-platform-theme__section-title" id="more-overview">Additional Options</h2>
      </div>

      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Help & Support</p>
            <p class="home-platform-theme__toggle-caption">Access help documentation</p>
          </div>
          <span class="home-platform-theme__mode-caption">Available</span>
        </div>

        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">About</p>
            <p class="home-platform-theme__toggle-caption">Platform information</p>
          </div>
          <span class="home-platform-theme__mode-caption">Available</span>
        </div>

        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Legal</p>
            <p class="home-platform-theme__toggle-caption">Terms and privacy policy</p>
          </div>
          <span class="home-platform-theme__mode-caption">Available</span>
        </div>
      </div>

      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="help">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/help/help.svg" alt="" width="16" height="16">
            Help Center
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="about">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/about/about.svg" alt="" width="16" height="16">
            About Neuroartan
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="more-system">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">System</p>
        <h2 class="home-platform-theme__section-title" id="more-system">System Information</h2>
      </div>

      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Version</p>
            <p class="home-platform-theme__toggle-caption">Current platform version</p>
          </div>
          <span class="home-platform-theme__mode-caption">v1.0.0</span>
        </div>

        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Build</p>
            <p class="home-platform-theme__toggle-caption">Build information</p>
          </div>
          <span class="home-platform-theme__mode-caption">Stable</span>
        </div>
      </div>
    </section>
  </div>
</section>
