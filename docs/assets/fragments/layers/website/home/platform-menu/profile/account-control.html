<section class="home-platform-destination home-platform-destination--profile-account-control" data-home-platform-destination-root aria-label="Account control destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="account-control">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Account</p>
        <h2 class="home-platform-theme__section-title" id="account-control">Account Control</h2>
      </div>

      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="sign-in">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/sign-in/sign-in.svg" alt="" width="16" height="16">
            Sign In
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="sessions">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/session-management/session-management.svg" alt="" width="16" height="16">
            Sessions
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="linked-accounts">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/linked-accounts/linked-accounts.svg" alt="" width="16" height="16">
            Linked Accounts
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="account-security">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Security</p>
        <h2 class="home-platform-theme__section-title" id="account-security">Security Settings</h2>
      </div>

      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="change-password">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/password-security/password-security.svg" alt="" width="16" height="16">
            Change Password
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="two-factor">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/two-factor-auth/two-factor-auth.svg" alt="" width="16" height="16">
            Two-Factor Authentication
          </span>
        </button>
      </div>
    </section>
  </div>
</section>
