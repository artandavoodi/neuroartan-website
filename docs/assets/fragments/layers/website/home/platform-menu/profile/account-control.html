<section class="home-platform-destination home-platform-destination--profile-account-control" data-home-platform-destination-root aria-label="Account control destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="account-control">
      <div class="home-platform-theme__section-header">
        <h2 class="home-platform-theme__section-title" id="account-control">Account Control</h2>
      </div>

      <div class="home-platform-theme__section-content">
        <div class="home-platform-theme__toggle-list">
          <button class="home-platform-theme__action-button" type="button" data-profile-action="sign-in" data-profile-auth-visible="signed-out" data-settings-action-bound="true">
            <span class="home-platform-theme__action-button-label">
              <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/sign-in/sign-in.svg" alt="" width="16" height="16">
              Sign In
            </span>
          </button>
          <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-subdestination="account" data-home-platform-settings-detail="password" data-profile-auth-visible="signed-in" data-settings-action-bound="true">
            <span class="home-platform-theme__action-button-label">
              <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/change-password/change-password.svg" alt="" width="16" height="16">
              Change Password
            </span>
          </button>
          <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-route="account" data-profile-auth-visible="signed-in" data-settings-action-bound="true">
            <span class="home-platform-theme__action-button-label">
              <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/overlays/cookie/preferences.svg" alt="" width="16" height="16">
              Privacy Preferences
            </span>
          </button>
          <button class="home-platform-theme__action-button" type="button" data-profile-action="sign-out" data-profile-auth-visible="signed-in" data-settings-action-bound="true">
            <span class="home-platform-theme__action-button-label">
              <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/identity/signout/signout.svg" alt="" width="16" height="16">
              Sign Out
            </span>
          </button>
        </div>
      </div>
    </section>
  </div>
</section>
