<section class="home-platform-destination home-platform-destination--profile-overview" data-home-platform-destination-root aria-label="Profile overview destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="profile-overview">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Profile</p>
        <h2 class="home-platform-theme__section-title" id="profile-overview">Profile Overview</h2>
      </div>

      <div class="home-platform-theme__action-list">
        <div class="profile-private-hero__avatar-wrap">
          <div class="profile-private-hero__avatar" data-profile-avatar aria-hidden="true">
            <img class="profile-private-hero__avatar-image" data-profile-avatar-image alt="" aria-hidden="true">
          </div>
        </div>

        <div class="home-platform-theme__action-row">
          <div class="home-platform-theme__action-copy">
            <p class="home-platform-theme__action-title">Display Name</p>
            <p class="home-platform-theme__action-subtitle" data-profile-username>@account required</p>
          </div>
          <span class="home-platform-theme__action-label" data-profile-display-name>Not Set</span>
        </div>

        <div class="home-platform-theme__action-row">
          <div class="home-platform-theme__action-copy">
            <p class="home-platform-theme__action-title">Profile Status</p>
            <p class="home-platform-theme__action-subtitle" data-profile-route>Public route pending</p>
          </div>
          <span class="home-platform-theme__action-label" data-profile-status>Signed out</span>
        </div>

      </div>

      <div class="home-platform-theme__action-list">
        <button class="home-platform-theme__action-button" type="button" data-profile-action="sign-in" data-profile-auth-visible="signed-out">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/sign-in/sign-in.svg" alt="" width="16" height="16">
            Sign In
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-profile-action="edit-profile" data-profile-auth-visible="signed-in">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/profile/actions/edit-identity.svg" alt="" width="16" height="16">
            Edit Profile
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-profile-action="account-control" data-profile-auth-visible="signed-in">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/home/platform-menu/profile/platform-menue-profile-account-control.svg" alt="" width="16" height="16">
            Account Control
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-profile-action="public-route" data-profile-auth-visible="signed-in">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/visibility/public-route.svg" alt="" width="16" height="16">
            Public Route
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="profile-commercial">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Account</p>
        <h2 class="home-platform-theme__section-title" id="profile-commercial">Account Access</h2>
      </div>

      <div class="home-platform-theme__action-list">
        <button class="home-platform-theme__action-button" type="button" data-profile-action="subscription" data-profile-auth-visible="signed-in">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/commerce/subscriptions/subscription.svg" alt="" width="16" height="16">
            Subscription
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-profile-action="preferences" data-profile-auth-visible="signed-in">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/layers/website/overlays/cookie/preferences.svg" alt="" width="16" height="16">
            Preferences
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-profile-action="sign-out" data-profile-auth-visible="signed-in">
          <span class="home-platform-theme__action-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/identity/signout/signout.svg" alt="" width="16" height="16">
            Sign Out
          </span>
        </button>
      </div>
    </section>
  </div>
</section>
