<section class="home-platform-destination home-platform-destination--profile-shortcuts" data-home-platform-destination-root aria-label="Profile shortcuts destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="profile-shortcuts">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Profile</p>
        <h2 class="home-platform-theme__section-title" id="profile-shortcuts">Profile Shortcuts</h2>
      </div>

      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="edit-profile">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/edit-profile/edit-profile.svg" alt="" width="16" height="16">
            Edit Profile
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="account-control">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/account-control/account-control.svg" alt="" width="16" height="16">
            Account Control
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="preferences">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/preferences/preferences.svg" alt="" width="16" height="16">
            Preferences
          </span>
        </button>
      </div>
    </section>
  </div>
</section>
