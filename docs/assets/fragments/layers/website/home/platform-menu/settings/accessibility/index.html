<section class="home-platform-destination home-platform-destination--settings-accessibility" data-home-platform-destination-root aria-label="Accessibility settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-accessibility-readability">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Readability</p>
        <h2 class="home-platform-theme__section-title" id="settings-accessibility-readability">Contrast and text</h2>
      </div>
      <div class="home-platform-theme__mode-grid">
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="contrast-high">
          <span class="home-platform-theme__mode-label">High contrast</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="contrast-standard">
          <span class="home-platform-theme__mode-label">Standard contrast</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:appearance">
          <span class="home-platform-theme__mode-label">Typography and density</span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-accessibility-motion">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Motion</p>
        <h2 class="home-platform-theme__section-title" id="settings-accessibility-motion">Interface motion</h2>
      </div>
      <div class="home-platform-theme__mode-grid">
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="motion-reduced">
          <span class="home-platform-theme__mode-label">Reduce motion</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="motion-enabled">
          <span class="home-platform-theme__mode-label">Enable motion</span>
        </button>
      </div>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Captions / Screen reader</p>
          </div>
          <span class="home-platform-theme__mode-caption">Semantic HTML labels are preserved; media captions require source media ownership.</span>
        </div>
      </div>
    </section>
  </div>
</section>
