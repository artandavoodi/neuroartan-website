<section class="home-platform-destination home-platform-destination--settings-accessibility" data-home-platform-destination-root aria-label="Accessibility settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-accessibility-typography" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-accessibility-typography">Typography</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-accessibility-typography-content">
      <div class="ui-radio-list" role="group" aria-label="Typography size">
        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-typography-option
          data-typography-option="small"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Small</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-typography-option
          data-typography-option="medium"
          aria-pressed="true">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Medium</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-typography-option
          data-typography-option="large"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Large</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-typography-option
          data-typography-option="extra-large"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Extra large</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-accessibility-density" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-accessibility-density">Density</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-accessibility-density-content">
      <div class="ui-radio-list" role="group" aria-label="Interface density">
        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-density-option
          data-density-option="compact"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Compact</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-density-option
          data-density-option="standard"
          aria-pressed="true">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Standard</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-density-option
          data-density-option="comfortable"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Comfortable</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-accessibility-icons" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-accessibility-icons">Icon size</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-accessibility-icons-content">
      <div class="ui-radio-list" role="group" aria-label="Icon size">
        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-icon-option
          data-icon-option="small"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Small</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-icon-option
          data-icon-option="medium"
          aria-pressed="true">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Medium</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-icon-option
          data-icon-option="large"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Large</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-accessibility-motion" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-accessibility-motion">Interface motion</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-accessibility-motion-content">
      <div class="ui-radio-list" role="group" aria-label="Motion preference">
        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-motion-option
          data-motion-option="reduced"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Reduced motion</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-accessibility-motion-option
          data-motion-option="enabled"
          aria-pressed="true">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Enabled motion</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-accessibility-screen-reader" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-accessibility-screen-reader">Screen reader</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-accessibility-screen-reader-content">
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Enhanced ARIA</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-accessibility-aria-toggle
            data-na-toggle>
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-accessibility-reset" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-accessibility-reset">Restore defaults</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-accessibility-reset-content">
      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-accessibility-reset>
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/restore/restore.svg" alt="" width="16" height="16">
            Restore to default settings
          </span>
        </button>
      </div>
      </div>
    </section>
  </div>
</section>
