     09) RESET CONTROL
============================================================================= -->
<!-- =============================================================================
     01) THEME DESTINATION ROOT
============================================================================= -->
<section class="home-platform-destination home-platform-destination--settings-appearance" data-home-platform-destination-root aria-label="Appearance destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <!-- =============================================================================
         03) APPEARANCE MODE SECTION
    ============================================================================= -->
    <section class="home-platform-theme__section" aria-labelledby="home-platform-theme-mode-title" data-home-platform-theme-section>
      <div class="home-platform-theme__section-header">
        <h2 class="home-platform-theme__section-title" id="home-platform-theme-mode-title">Choose your appearance mode</h2>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>

      <div class="home-platform-theme__mode-grid" role="group" aria-label="Appearance mode">
        <button
          class="home-platform-theme__mode-option"
          type="button"
          data-home-platform-theme-mode-option
          data-home-platform-theme-reset-company
          data-theme-option="company"
          aria-pressed="true">
          <span class="home-platform-theme__mode-label">Default</span>
        </button>

        <button
          class="home-platform-theme__mode-option"
          type="button"
          data-home-platform-theme-mode-option
          data-theme-option="system"
          aria-pressed="false">
          <span class="home-platform-theme__mode-label">System</span>
        </button>

        <button
          class="home-platform-theme__mode-option"
          type="button"
          data-home-platform-theme-mode-option
          data-theme-option="dark"
          aria-pressed="false">
          <span class="home-platform-theme__mode-label">Dark</span>
        </button>

        <button
          class="home-platform-theme__mode-option"
          type="button"
          data-home-platform-theme-mode-option
          data-theme-option="light"
          aria-pressed="false">
          <span class="home-platform-theme__mode-label">Light</span>
        </button>

        <button
          class="home-platform-theme__mode-option"
          type="button"
          data-home-platform-theme-mode-option
          data-theme-option="custom"
          aria-pressed="false">
          <span class="home-platform-theme__mode-label">Custom</span>
        </button>
      </div>
      </div>
    </section>

    <!-- =============================================================================
         04) CONTRAST SECTION
    ============================================================================= -->
    <section class="home-platform-theme__section" aria-labelledby="home-platform-theme-contrast-title" data-home-platform-theme-section>
      <div class="home-platform-theme__section-header">
        <h2 class="home-platform-theme__section-title" id="home-platform-theme-contrast-title">Choose contrast density</h2>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>

      <div class="ui-radio-list" role="group" aria-label="Theme contrast">
        <button
          class="ui-radio-list__item"
          type="button"
          data-home-platform-theme-contrast-option
          data-theme-contrast-option="low"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Low</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-home-platform-theme-contrast-option
          data-theme-contrast-option="standard"
          aria-pressed="true">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">Standard</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>

        <button
          class="ui-radio-list__item"
          type="button"
          data-home-platform-theme-contrast-option
          data-theme-contrast-option="high"
          aria-pressed="false">
          <span class="ui-radio-list__content">
            <span class="ui-radio-list__label">High</span>
          </span>
          <span class="ui-radio-list__indicator"></span>
        </button>
      </div>
      </div>
    </section>

    <!-- =============================================================================
         05) CUSTOM PALETTE SECTION
    ============================================================================= -->
    <section class="home-platform-theme__section" aria-labelledby="home-platform-theme-palette-title" data-home-platform-theme-section data-home-platform-theme-section-collapsed="true">
      <div class="home-platform-theme__section-header">
        <button class="home-platform-theme__section-eyebrow" type="button" data-home-platform-theme-section-toggle aria-expanded="false">
          <span class="home-platform-theme__section-eyebrow-text">Palette</span>
          <img class="ui-icon-theme-aware home-platform-theme__section-toggle-icon" src="/registry/icons/public/assets/core/actions/create/plus.svg" alt="" width="16" height="16">
        </button>
        <h2 class="home-platform-theme__section-title" id="home-platform-theme-palette-title">Choose custom palette</h2>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>

      <div class="home-platform-theme__dropdown-container">
        <span class="home-platform-theme__dropdown-label">Neuroartan</span>
        <div class="home-platform-theme__dropdown-icon-wrapper">
          <img class="ui-icon-theme-aware home-platform-theme__dropdown-icon" src="/registry/icons/public/assets/core/navigation/chevron/chevron-down.svg" alt="" width="16" height="16">
          <select
            class="ui-dropdown ui-dropdown--icon-only"
            data-home-platform-theme-palette-select
            aria-label="Choose custom palette">
            <option value="neuroartan" selected>Neuroartan</option>
            <option value="mono">Mono</option>
            <option value="sovereign">Sovereign</option>
          </select>
        </div>
      </div>
      </div>
    </section>

    <!-- =============================================================================
         06) CUSTOM HEX TOKEN SECTION
    ============================================================================= -->
    <section class="home-platform-theme__section" aria-labelledby="home-platform-theme-token-title" data-home-platform-theme-section data-home-platform-theme-section-collapsed="true">
      <div class="home-platform-theme__section-header">
        <button class="home-platform-theme__section-eyebrow" type="button" data-home-platform-theme-section-toggle aria-expanded="false">
          <span class="home-platform-theme__section-eyebrow-text">Colors</span>
          <img class="ui-icon-theme-aware home-platform-theme__section-toggle-icon" src="/registry/icons/public/assets/core/actions/create/plus.svg" alt="" width="16" height="16">
        </button>
        <h2 class="home-platform-theme__section-title" id="home-platform-theme-token-title">Custom colors</h2>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>

      <div class="home-platform-theme__token-grid" role="group" aria-label="Custom hex color tokens">
        <div class="home-platform-theme__token-field">
          <span class="home-platform-theme__token-label">Accent</span>
          <input class="home-platform-theme__token-input na-color-picker" type="color" data-theme-token="accent" aria-label="Custom accent color">
        </div>

        <div class="home-platform-theme__token-field">
          <span class="home-platform-theme__token-label">Accent hover</span>
          <input class="home-platform-theme__token-input na-color-picker" type="color" data-theme-token="accentHover" aria-label="Custom accent hover color">
        </div>

        <div class="home-platform-theme__token-field">
          <span class="home-platform-theme__token-label">Background</span>
          <input class="home-platform-theme__token-input na-color-picker" type="color" data-theme-token="background" aria-label="Custom background color">
        </div>

        <div class="home-platform-theme__token-field">
          <span class="home-platform-theme__token-label">Text</span>
          <input class="home-platform-theme__token-input na-color-picker" type="color" data-theme-token="text" aria-label="Custom text color">
        </div>

        <div class="home-platform-theme__token-field">
          <span class="home-platform-theme__token-label">Surface</span>
          <input class="home-platform-theme__token-input na-color-picker" type="color" data-theme-token="surface" aria-label="Custom surface color">
        </div>

        <div class="home-platform-theme__token-field">
          <span class="home-platform-theme__token-label">Border</span>
          <input class="home-platform-theme__token-input na-color-picker" type="color" data-theme-token="border" aria-label="Custom border color">
        </div>
      </div>
      </div>
    </section>

    <!-- =============================================================================
         07) CUSTOM BACKGROUND CONTROLS
    ============================================================================= -->
    <section class="home-platform-theme__section" aria-labelledby="home-platform-theme-effects-title" data-home-platform-theme-section>
      <div class="home-platform-theme__section-header">
        <h2 class="home-platform-theme__section-title" id="home-platform-theme-effects-title">Custom visual layers</h2>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>

      <div class="home-platform-theme__toggle-list" role="list" aria-label="Background controls">
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="breathing-circle">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Breathing circle</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="breathing-circle"
            data-toggle-scope="homepage-theme"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>

        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="cinematic-background">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Cinematic background</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="cinematic-background"
            data-toggle-scope="homepage-theme"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>

        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="hero-shader">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Hero shader</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="hero-shader"
            data-toggle-scope="homepage-theme"
            data-toggle-default="on"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>

        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="matte-atmosphere">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Matte atmosphere</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="matte-atmosphere"
            data-toggle-scope="homepage-theme"
            data-toggle-default="on"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
      </div>
      </div>
    </section>

  </div>
</section>
