<section class="home-platform-destination home-platform-destination--settings-configuration" data-home-platform-destination-root aria-label="Configuration settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-configuration-runtime">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Runtime</p>
        <h2 class="home-platform-theme__section-title" id="settings-configuration-runtime">Provider routing</h2>
      </div>
      <form class="home-platform-theme__token-grid" autocomplete="off">
        <label class="home-platform-theme__token-field">
          <span class="home-platform-theme__token-label">Provider</span>
          <select class="home-platform-theme__token-input" data-home-platform-runtime-provider>
            <option value="gemini">Google Gemini</option>
            <option value="openai">OpenAI</option>
            <option value="local">Local Runtime</option>
          </select>
        </label>
        <label class="home-platform-theme__token-field">
          <span class="home-platform-theme__token-label">Model</span>
          <input class="home-platform-theme__token-input" type="text" autocomplete="off" data-home-platform-runtime-model placeholder="Active model ID">
        </label>
        <label class="home-platform-theme__token-field">
          <span class="home-platform-theme__token-label">API key</span>
          <input class="home-platform-theme__token-input" type="password" autocomplete="off" data-home-platform-runtime-api-key placeholder="Provider credential">
        </label>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="save-runtime">
          <span class="home-platform-theme__mode-label">Save runtime</span>
          <span class="home-platform-theme__mode-caption">Persist the selected provider and model in the active runtime.</span>
        </button>
      </form>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-configuration-environment">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Environment</p>
        <h2 class="home-platform-theme__section-title" id="settings-configuration-environment">Web runtime boundaries</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Browser Use</p>
          </div>
          <span class="home-platform-theme__mode-caption">Browser actions route through mounted website services only.</span>
        </div>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Worktree</p>
          </div>
          <span class="home-platform-theme__mode-caption">Repository worktree access belongs to ICOS native Developer Console.</span>
        </div>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Events</p>
          </div>
          <span class="home-platform-theme__mode-caption">Settings controls emit Neuroartan runtime events for owned systems.</span>
        </div>
      </div>
    </section>
  </div>
</section>
