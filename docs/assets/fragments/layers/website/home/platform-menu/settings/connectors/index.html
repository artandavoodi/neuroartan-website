<section class="home-platform-destination home-platform-destination--settings-connectors" data-home-platform-destination-root aria-label="Connectors settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-connectors-providers">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Providers</p>
        <h2 class="home-platform-theme__section-title" id="settings-connectors-providers">Model connectors</h2>
      </div>
      <div class="home-platform-theme__mode-grid">
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:configuration">
          <span class="home-platform-theme__mode-label">Cloud Providers</span>
          <span class="home-platform-theme__mode-caption">Configure OpenAI-compatible, Gemini, or future cloud providers.</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="scan-local-models">
          <span class="home-platform-theme__mode-label">Local LLM</span>
          <span class="home-platform-theme__mode-caption">Scan LM Studio at http://localhost:1234/v1/models.</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:configuration">
          <span class="home-platform-theme__mode-label">API Keys</span>
          <span class="home-platform-theme__mode-caption">Open Configuration for provider credential input.</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="scan-local-models">
          <span class="home-platform-theme__mode-label">Health</span>
          <span class="home-platform-theme__mode-caption">Check local model server availability.</span>
        </button>
      </div>
    </section>
  </div>
</section>
