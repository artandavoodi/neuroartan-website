<section class="home-platform-destination home-platform-destination--settings-dashboard" data-home-platform-destination-root data-home-platform-settings-dashboard aria-label="Dashboard settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>

  <div class="home-platform-theme__sections">
    <!-- Analytics Dashboard Section -->
    <section class="home-platform-theme__section" aria-labelledby="settings-dashboard-analytics" data-home-platform-theme-section data-home-platform-theme-section-collapsed="true">
      <button class="home-platform-theme__section-eyebrow" type="button" aria-expanded="false" aria-controls="settings-dashboard-analytics-content" data-home-platform-theme-section-toggle>
        <span class="home-platform-theme__section-title" id="settings-dashboard-analytics">Analytics dashboard</span>
        <span class="home-platform-theme__section-toggle-icon" aria-hidden="true">⌄</span>
      </button>
      <div class="home-platform-theme__section-content" id="settings-dashboard-analytics-content" data-home-platform-theme-section-content>
        <div class="home-platform-theme__toggle-list" role="list" aria-label="Dashboard analytics controls">
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="enableTracking">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">Analytics tracking</p>
            </div>
            <button class="na-toggle" type="button" role="switch" aria-checked="true" data-na-toggle data-toggle-key="enableTracking" data-toggle-scope="dashboard-analytics">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Health Dashboard Section -->
    <section class="home-platform-theme__section" aria-labelledby="settings-dashboard-health" data-home-platform-theme-section data-home-platform-theme-section-collapsed="true">
      <button class="home-platform-theme__section-eyebrow" type="button" aria-expanded="false" aria-controls="settings-dashboard-health-content" data-home-platform-theme-section-toggle>
        <span class="home-platform-theme__section-title" id="settings-dashboard-health">Health dashboard</span>
        <span class="home-platform-theme__section-toggle-icon" aria-hidden="true">⌄</span>
      </button>
      <div class="home-platform-theme__section-content" id="settings-dashboard-health-content" data-home-platform-theme-section-content>
        <div class="home-platform-theme__toggle-list" role="list" aria-label="Dashboard health controls">
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="showSystemHealth">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">System health indicators</p>
            </div>
            <button class="na-toggle" type="button" role="switch" aria-checked="true" data-na-toggle data-toggle-key="showSystemHealth" data-toggle-scope="dashboard-health">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Readiness Dashboard Section -->
    <section class="home-platform-theme__section" aria-labelledby="settings-dashboard-readiness" data-home-platform-theme-section data-home-platform-theme-section-collapsed="true">
      <button class="home-platform-theme__section-eyebrow" type="button" aria-expanded="false" aria-controls="settings-dashboard-readiness-content" data-home-platform-theme-section-toggle>
        <span class="home-platform-theme__section-title" id="settings-dashboard-readiness">Readiness dashboard</span>
        <span class="home-platform-theme__section-toggle-icon" aria-hidden="true">⌄</span>
      </button>
      <div class="home-platform-theme__section-content" id="settings-dashboard-readiness-content" data-home-platform-theme-section-content>
        <div class="home-platform-theme__toggle-list" role="list" aria-label="Dashboard readiness controls">
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="showReadiness">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">Readiness indicators</p>
            </div>
            <button class="na-toggle" type="button" role="switch" aria-checked="true" data-na-toggle data-toggle-key="showReadiness" data-toggle-scope="dashboard-readiness">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Model Dashboard Section -->
    <section class="home-platform-theme__section" aria-labelledby="settings-dashboard-model" data-home-platform-theme-section data-home-platform-theme-section-collapsed="true">
      <button class="home-platform-theme__section-eyebrow" type="button" aria-expanded="false" aria-controls="settings-dashboard-model-content" data-home-platform-theme-section-toggle>
        <span class="home-platform-theme__section-title" id="settings-dashboard-model">Model dashboard</span>
        <span class="home-platform-theme__section-toggle-icon" aria-hidden="true">⌄</span>
      </button>
      <div class="home-platform-theme__section-content" id="settings-dashboard-model-content" data-home-platform-theme-section-content>
        <div class="home-platform-theme__toggle-list" role="list" aria-label="Dashboard model controls">
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="enableDashboard">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">Model dashboard controls</p>
            </div>
            <button class="na-toggle" type="button" role="switch" aria-checked="true" data-na-toggle data-toggle-key="enableDashboard" data-toggle-scope="dashboard-model">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </div>

  </div>
</section>
