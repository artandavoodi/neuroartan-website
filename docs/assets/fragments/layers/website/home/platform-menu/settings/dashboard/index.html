<section class="home-platform-destination home-platform-destination--settings-dashboard" data-home-platform-destination-root aria-label="Dashboard settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-dashboard-runtime">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Runtime dashboard</p>
        <h2 class="home-platform-theme__section-title" id="settings-dashboard-runtime">Operational state</h2>
      </div>
      <div class="home-platform-theme__mode-grid">
        <a class="home-platform-theme__mode-option" href="/pages/models/index.html">
          <span class="home-platform-theme__mode-label">Model Dashboard</span>
        </a>
        <a class="home-platform-theme__mode-option" href="/pages/dashboard/index.html">
          <span class="home-platform-theme__mode-label">Analytics</span>
        </a>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:connectors">
          <span class="home-platform-theme__mode-label">Health</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:configuration">
          <span class="home-platform-theme__mode-label">Readiness</span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-dashboard-knowledge">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Knowledge</p>
        <h2 class="home-platform-theme__section-title" id="settings-dashboard-knowledge">Activity and graph</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Activity</p>
          </div>
          <span class="home-platform-theme__mode-caption">Activity is emitted by runtime events and account-backed sessions.</span>
        </div>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Knowledge Graph</p>
          </div>
          <span class="home-platform-theme__mode-caption">Knowledge graph state is model-owned and routed through the workspace layer.</span>
        </div>
      </div>
    </section>
  </div>
</section>
