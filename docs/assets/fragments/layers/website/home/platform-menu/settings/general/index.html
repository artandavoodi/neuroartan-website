<section class="home-platform-destination home-platform-destination--settings-general" data-home-platform-destination-root aria-label="General settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-general-defaults">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Defaults</p>
        <h2 class="home-platform-theme__section-title" id="settings-general-defaults">Runtime summary</h2>
      </div>
      <div class="home-platform-theme__mode-grid">
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:appearance">
          <span class="home-platform-theme__mode-label">Appearance</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:configuration">
          <span class="home-platform-theme__mode-label">Configuration</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:connectors">
          <span class="home-platform-theme__mode-label">Connectors</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:security">
          <span class="home-platform-theme__mode-label">Security</span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-general-behavior">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Behavior</p>
        <h2 class="home-platform-theme__section-title" id="settings-general-behavior">Shell controls</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Reset menu rail</p>
          </div>
          <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="reset-rail">
            <span class="home-platform-theme__mode-label">Restore</span>
          </button>
        </div>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Reload runtime</p>
          </div>
          <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="reload-page">
            <span class="home-platform-theme__mode-label">Reload</span>
          </button>
        </div>
      </div>
    </section>
  </div>
</section>
