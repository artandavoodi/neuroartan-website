<section class="home-platform-destination home-platform-destination--settings-general" data-home-platform-destination-root aria-label="General settings destination">
  <div class="home-platform-destination__surface home-platform-settings-category" data-home-platform-destination-surface data-settings-category="general">
    <header class="home-platform-settings-category__header">
      <p class="home-platform-settings-category__eyebrow">Settings</p>
      <h1 class="home-platform-settings-category__title">General</h1>
      <p class="home-platform-settings-category__summary">Defaults, startup posture, behavior, quick routes, and reset controls for the web runtime.</p>
    </header>

    <section class="home-platform-settings-category__section" aria-labelledby="settings-general-defaults">
      <div class="home-platform-settings-category__section-header">
        <p class="home-platform-settings-category__section-eyebrow">Defaults</p>
        <h2 class="home-platform-settings-category__section-title" id="settings-general-defaults">Runtime summary</h2>
      </div>
      <div class="home-platform-settings-category__grid">
        <button class="home-platform-settings-category__option" type="button" data-home-platform-settings-action="open:appearance">
          <span class="home-platform-settings-category__label">Appearance</span>
          <span class="home-platform-settings-category__caption">Theme, surfaces, contrast, and visual layers.</span>
        </button>
        <button class="home-platform-settings-category__option" type="button" data-home-platform-settings-action="open:configuration">
          <span class="home-platform-settings-category__label">Configuration</span>
          <span class="home-platform-settings-category__caption">Runtime provider and environment wiring.</span>
        </button>
        <button class="home-platform-settings-category__option" type="button" data-home-platform-settings-action="open:connectors">
          <span class="home-platform-settings-category__label">Connectors</span>
          <span class="home-platform-settings-category__caption">Models, local LLM, API keys, and health.</span>
        </button>
        <button class="home-platform-settings-category__option" type="button" data-home-platform-settings-action="open:security">
          <span class="home-platform-settings-category__label">Security</span>
          <span class="home-platform-settings-category__caption">Sign-in, sessions, trust, and linked accounts.</span>
        </button>
      </div>
    </section>

    <section class="home-platform-settings-category__section" aria-labelledby="settings-general-behavior">
      <div class="home-platform-settings-category__section-header">
        <p class="home-platform-settings-category__section-eyebrow">Behavior</p>
        <h2 class="home-platform-settings-category__section-title" id="settings-general-behavior">Shell controls</h2>
      </div>
      <div class="home-platform-settings-category__stack">
        <button class="home-platform-settings-category__option" type="button" data-home-platform-settings-action="reset-rail">
          <span class="home-platform-settings-category__label">Reset menu rail</span>
          <span class="home-platform-settings-category__caption">Restore the platform menu rail to its default startup state.</span>
        </button>
        <button class="home-platform-settings-category__option" type="button" data-home-platform-settings-action="reload-page">
          <span class="home-platform-settings-category__label">Reload runtime</span>
          <span class="home-platform-settings-category__caption">Reload the current web runtime and rehydrate saved settings.</span>
        </button>
      </div>
      <p class="home-platform-settings-category__status" data-home-platform-settings-status>General settings are connected to the active platform shell.</p>
    </section>
  </div>
</section>
