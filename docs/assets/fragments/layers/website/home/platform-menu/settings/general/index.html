<section class="home-platform-destination home-platform-destination--settings-general" data-home-platform-destination-root aria-label="General settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>

    <section class="home-platform-theme__section" aria-labelledby="settings-general-landing" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-general-landing">Default landing</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-general-landing-content">
        <div class="ui-radio-list" role="radiogroup" aria-label="Default landing after sign in">
          <button class="ui-radio-list__item" type="button" role="radio" data-account-landing-option="feed" aria-pressed="false" aria-checked="false">
            <span class="ui-radio-list__content">
              <span class="ui-radio-list__label">Feed</span>
            </span>
            <span class="ui-radio-list__indicator"></span>
          </button>
          <button class="ui-radio-list__item" type="button" role="radio" data-account-landing-option="stage" aria-pressed="false" aria-checked="false">
            <span class="ui-radio-list__content">
              <span class="ui-radio-list__label">Stage</span>
            </span>
            <span class="ui-radio-list__indicator"></span>
          </button>
        </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-general-locale" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-general-locale">Language and region</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-general-locale-content">
        <div class="home-platform-theme__toggle-list">
          <button class="home-platform-theme__shortcut-item" type="button" data-home-platform-settings-action="open:language">
            <span class="home-platform-theme__shortcut-label">Language</span>
            <span class="home-platform-theme__action-button-value">
              <span data-home-settings-language-value>English</span>
            </span>
          </button>
          <button class="home-platform-theme__shortcut-item" type="button" data-home-platform-settings-action="country-language">
            <span class="home-platform-theme__shortcut-label">Region</span>
            <span class="home-platform-theme__action-button-value" data-home-settings-country-value>United States</span>
          </button>
        </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-general-behavior" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-general-behavior">Runtime controls</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-general-behavior-content">
      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="reset-rail" data-settings-action-bound="true">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/reset/reset.svg" alt="" width="16" height="16">
            Reset menu rail
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="reload-page" data-settings-action-bound="true">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/refresh/refresh.svg" alt="" width="16" height="16">
            Reload runtime
          </span>
        </button>
      </div>
      </div>
    </section>
  </div>
</section>
