<section class="home-platform-destination home-platform-destination--settings-model" data-home-platform-destination-root data-model-settings-root aria-label="Model settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>

    <div class="ui-loading-inline" data-model-settings-loading role="status" aria-live="polite" aria-label="Loading model settings">
      <span class="ui-loading-inline__spinner" aria-hidden="true"></span>
    </div>

    <div class="home-platform-theme__sections" hidden>
      <section class="home-platform-theme__section" data-model-settings-view="visibility" aria-label="Model visibility" data-home-platform-theme-section hidden>
        <div class="home-platform-theme__section-eyebrow">
          <span class="home-platform-theme__section-title" id="settings-model-visibility">Visibility</span>
        </div>
        <div class="home-platform-theme__section-content" id="settings-model-visibility-content">
          <div class="home-platform-theme__toggle-list" data-model-visibility-toggle-list>
            <div class="home-platform-theme__toggle-row" role="listitem">
              <div class="home-platform-theme__toggle-copy">
                <p class="home-platform-theme__toggle-title">Visible to public</p>
              </div>
              <button class="na-toggle" type="button" role="switch" data-model-visibility-toggle="publicVisible">
                <span class="na-toggle__track">
                  <span class="na-toggle__thumb"></span>
                </span>
              </button>
            </div>
            <div class="home-platform-theme__toggle-row" role="listitem">
              <div class="home-platform-theme__toggle-copy">
                <p class="home-platform-theme__toggle-title">Visible to friends</p>
              </div>
              <button class="na-toggle" type="button" role="switch" data-model-visibility-toggle="friendsVisible">
                <span class="na-toggle__track">
                  <span class="na-toggle__thumb"></span>
                </span>
              </button>
            </div>
            <div class="home-platform-theme__toggle-row" role="listitem">
              <div class="home-platform-theme__toggle-copy">
                <p class="home-platform-theme__toggle-title">Visible to followers</p>
              </div>
              <button class="na-toggle" type="button" role="switch" data-model-visibility-toggle="followersVisible">
                <span class="na-toggle__track">
                  <span class="na-toggle__thumb"></span>
                </span>
              </button>
            </div>
            <div class="home-platform-theme__toggle-row" role="listitem">
              <div class="home-platform-theme__toggle-copy">
                <p class="home-platform-theme__toggle-title">Visible to mutuals</p>
              </div>
              <button class="na-toggle" type="button" role="switch" data-model-visibility-toggle="mutualsVisible">
                <span class="na-toggle__track">
                  <span class="na-toggle__thumb"></span>
                </span>
              </button>
            </div>
            <div class="home-platform-theme__toggle-row" role="listitem">
              <div class="home-platform-theme__toggle-copy">
                <p class="home-platform-theme__toggle-title">Visible to family</p>
              </div>
              <button class="na-toggle" type="button" role="switch" data-model-visibility-toggle="familyVisible">
                <span class="na-toggle__track">
                  <span class="na-toggle__thumb"></span>
                </span>
              </button>
            </div>
            <div class="home-platform-theme__toggle-row" role="listitem">
              <div class="home-platform-theme__toggle-copy">
                <p class="home-platform-theme__toggle-title">Visible to subscribers</p>
              </div>
              <button class="na-toggle" type="button" role="switch" data-model-visibility-toggle="subscribersVisible">
                <span class="na-toggle__track">
                  <span class="na-toggle__thumb"></span>
                </span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</section>
