<section class="home-platform-destination home-platform-destination--settings-notifications" data-home-platform-destination-root aria-label="Notifications settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-notifications-categories" data-home-platform-theme-section>
      <div class="home-platform-theme__section-header">
        <h2 class="home-platform-theme__section-title" id="settings-notifications-categories">Notification categories</h2>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>
        <div class="home-platform-theme__toggle-list">
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="system-notifications">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">System notifications</p>
            </div>
            <button
              class="na-toggle"
              type="button"
              role="switch"
              aria-checked="true"
              data-na-toggle
              data-toggle-key="system-notifications"
              data-toggle-scope="notifications"
              data-toggle-default="on"
              data-toggle-mode="custom-only">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="social-notifications">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">Social notifications</p>
            </div>
            <button
              class="na-toggle"
              type="button"
              role="switch"
              aria-checked="true"
              data-na-toggle
              data-toggle-key="social-notifications"
              data-toggle-scope="notifications"
              data-toggle-default="on"
              data-toggle-mode="custom-only">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="cognitive-notifications">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">Cognitive notifications</p>
            </div>
            <button
              class="na-toggle"
              type="button"
              role="switch"
              aria-checked="true"
              data-na-toggle
              data-toggle-key="cognitive-notifications"
              data-toggle-scope="notifications"
              data-toggle-default="on"
              data-toggle-mode="custom-only">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="account-notifications">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">Account notifications</p>
            </div>
            <button
              class="na-toggle"
              type="button"
              role="switch"
              aria-checked="true"
              data-na-toggle
              data-toggle-key="account-notifications"
              data-toggle-scope="notifications"
              data-toggle-default="on"
              data-toggle-mode="custom-only">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-notifications-delivery" data-home-platform-theme-section>
      <div class="home-platform-theme__section-header">
        <h2 class="home-platform-theme__section-title" id="settings-notifications-delivery">Delivery preferences</h2>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>
        <div class="home-platform-theme__toggle-list">
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="browser-notifications">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">Browser notifications</p>
            </div>
            <button
              class="na-toggle"
              type="button"
              role="switch"
              aria-checked="false"
              data-na-toggle
              data-toggle-key="browser-notifications"
              data-toggle-scope="notifications"
              data-toggle-default="off"
              data-toggle-mode="custom-only">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
          <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="sound-alerts">
            <div class="home-platform-theme__toggle-copy">
              <p class="home-platform-theme__toggle-title">Sound alerts</p>
            </div>
            <button
              class="na-toggle"
              type="button"
              role="switch"
              aria-checked="false"
              data-na-toggle
              data-toggle-key="sound-alerts"
              data-toggle-scope="notifications"
              data-toggle-default="off"
              data-toggle-mode="custom-only">
              <span class="na-toggle__track" aria-hidden="true">
                <span class="na-toggle__thumb"></span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </div>
</section>
