<section class="home-platform-destination home-platform-destination--settings-permissions" data-home-platform-destination-root aria-label="Permissions settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-permissions-browser">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Browser permissions</p>
        <h2 class="home-platform-theme__section-title" id="settings-permissions-browser">Request access</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="permission-files">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Files</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="permission-files"
            data-toggle-scope="permissions"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="permission-microphone">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Microphone</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="permission-microphone"
            data-toggle-scope="permissions"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="permission-camera">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Camera</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="permission-camera"
            data-toggle-scope="permissions"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="permission-notifications">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Notifications</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="permission-notifications"
            data-toggle-scope="permissions"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
      </div>
    </section>
  </div>
</section>
