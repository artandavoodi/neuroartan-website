<section class="home-platform-destination home-platform-destination--settings-personalization" data-home-platform-destination-root aria-label="Personalization settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-personalization-profile">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Profile</p>
        <h2 class="home-platform-theme__section-title" id="settings-personalization-profile">Identity and route</h2>
      </div>
      <div class="home-platform-theme__mode-grid">
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="account-entry">
          <span class="home-platform-theme__mode-label">Profile</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="public-profile">
          <span class="home-platform-theme__mode-label">Identity</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="open:appearance">
          <span class="home-platform-theme__mode-label">Style</span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-personalization-cognition">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Cognition</p>
        <h2 class="home-platform-theme__section-title" id="settings-personalization-cognition">Memory and tone</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Memory</p>
          </div>
          <span class="home-platform-theme__mode-caption">Memory controls require a signed-in continuity model runtime.</span>
        </div>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Tone</p>
          </div>
          <span class="home-platform-theme__mode-caption">Tone is governed by the selected model and future UVS layer.</span>
        </div>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Social Graph</p>
          </div>
          <span class="home-platform-theme__mode-caption">Social graph controls stay private until account connectors are active.</span>
        </div>
      </div>
    </section>
  </div>
</section>
