<section class="home-platform-destination home-platform-destination--settings-privacy" data-home-platform-destination-root aria-label="Privacy settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface">
    <section class="home-platform-theme__section" aria-labelledby="settings-privacy-essential" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-privacy-essential">Always active</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-privacy-essential-content">
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Security & abuse prevention</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            disabled
            data-cookie-consent-subtoggle="essential-security"
            data-cookie-consent-enabled="true">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
          <input type="checkbox" data-cookie-consent-subcategory="essential-security" data-cookie-consent-parent="essential" checked disabled hidden>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Session continuity</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            disabled
            data-cookie-consent-subtoggle="essential-session"
            data-cookie-consent-enabled="true">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
          <input type="checkbox" data-cookie-consent-subcategory="essential-session" data-cookie-consent-parent="essential" checked disabled hidden>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Interface integrity</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            disabled
            data-cookie-consent-subtoggle="essential-integrity"
            data-cookie-consent-enabled="true">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
          <input type="checkbox" data-cookie-consent-subcategory="essential-integrity" data-cookie-consent-parent="essential" checked disabled hidden>
        </div>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-privacy-analytics" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-privacy-analytics">Performance & usage</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-privacy-analytics-content">
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Analytics</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            data-cookie-consent-toggle="analytics"
            data-cookie-consent-enabled="true">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
          <input type="checkbox" data-cookie-consent-category="analytics" checked hidden>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Performance measurement</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            data-cookie-consent-subtoggle="analytics-performance"
            data-cookie-consent-enabled="true">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
          <input type="checkbox" data-cookie-consent-subcategory="analytics-performance" data-cookie-consent-parent="analytics" checked hidden>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Usage insights</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            data-cookie-consent-subtoggle="analytics-usage"
            data-cookie-consent-enabled="true">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
          <input type="checkbox" data-cookie-consent-subcategory="analytics-usage" data-cookie-consent-parent="analytics" checked hidden>
        </div>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-privacy-experience" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-privacy-experience">Preferences & continuity</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-privacy-experience-content">
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Experience</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            data-cookie-consent-toggle="experience"
            data-cookie-consent-enabled="true">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
          <input type="checkbox" data-cookie-consent-category="experience" checked hidden>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Preference memory</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            data-cookie-consent-subtoggle="experience-preferences"
            data-cookie-consent-enabled="true">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
          <input type="checkbox" data-cookie-consent-subcategory="experience-preferences" data-cookie-consent-parent="experience" checked hidden>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row>
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Refined interaction continuity</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            data-cookie-consent-subtoggle="experience-continuity"
            data-cookie-consent-enabled="true">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
          <input type="checkbox" data-cookie-consent-subcategory="experience-continuity" data-cookie-consent-parent="experience" checked hidden>
        </div>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-privacy-data" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-privacy-data">Export & clear</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-privacy-data-content">
      <div class="home-platform-theme__connector-list">
        <button class="home-platform-theme__connector-item" type="button" data-home-platform-settings-action="export-settings">
          <span class="home-platform-theme__connector-name">Export settings</span>
          <img class="ui-icon-theme-aware home-platform-theme__connector-icon" src="/registry/icons/public/assets/core/navigation/chevron/chevron-right.svg" alt="" width="16" height="16">
        </button>
        <button class="home-platform-theme__connector-item" type="button" data-home-platform-settings-action="clear-local-preferences">
          <span class="home-platform-theme__connector-name">Delete local preferences</span>
          <img class="ui-icon-theme-aware home-platform-theme__connector-icon" src="/registry/icons/public/assets/core/navigation/chevron/chevron-right.svg" alt="" width="16" height="16">
        </button>
      </div>
      </div>
    </section>
  </div>
</section>
