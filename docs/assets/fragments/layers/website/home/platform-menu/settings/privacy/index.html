<section class="home-platform-destination home-platform-destination--settings-privacy" data-home-platform-destination-root aria-label="Privacy settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-privacy-controls">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Privacy controls</p>
        <h2 class="home-platform-theme__section-title" id="settings-privacy-controls">Local and cookie state</h2>
      </div>
      <div class="home-platform-theme__mode-grid">
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="cookie-settings">
          <span class="home-platform-theme__mode-label">Cookie settings</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="export-settings">
          <span class="home-platform-theme__mode-label">Export</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="clear-local-preferences">
          <span class="home-platform-theme__mode-label">Delete local preferences</span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-privacy-public">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Public / Private</p>
        <h2 class="home-platform-theme__section-title" id="settings-privacy-public">Profile route</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Public route</p>
          </div>
          <span class="home-platform-theme__mode-caption" data-home-settings-route-value>neuroartan.com/username</span>
        </div>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Linked sources</p>
          </div>
          <span class="home-platform-theme__mode-caption">Linked sources are account-bound and stay private until a signed-in runtime exposes them.</span>
        </div>
      </div>
    </section>
  </div>
</section>
