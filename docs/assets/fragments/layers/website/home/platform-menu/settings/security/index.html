<section class="home-platform-destination home-platform-destination--settings-security" data-home-platform-destination-root aria-label="Security settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-security-account">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Account Security</p>
        <h2 class="home-platform-theme__section-title" id="settings-security-account">Two-factor authentication</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="setup-2fa">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/two-factor-auth/two-factor-auth.svg" alt="" width="16" height="16">
            Set up two-factor authentication
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="generate-backup-codes">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/two-factor-auth/two-factor-auth.svg" alt="" width="16" height="16">
            Generate backup codes
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="link-google">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/linked-accounts/linked-accounts.svg" alt="" width="16" height="16">
            Link Google account
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="link-apple">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/linked-accounts/linked-accounts.svg" alt="" width="16" height="16">
            Link iCloud account
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="change-password">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/password-security/password-security.svg" alt="" width="16" height="16">
            Change password
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-security-sessions">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Session Protection</p>
        <h2 class="home-platform-theme__section-title" id="settings-security-sessions">Active sessions</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="view-sessions">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/session-management/session-management.svg" alt="" width="16" height="16">
            View active sessions
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="revoke-all-sessions">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/session-management/session-management.svg" alt="" width="16" height="16">
            Sign out all devices
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-security-integrity">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Anti-Impersonation</p>
        <h2 class="home-platform-theme__section-title" id="settings-security-integrity">Voice authentication</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="voice-verify">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/voice-authentication/voice-authentication.svg" alt="" width="16" height="16">
            Verify voice identity
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="liveness-check">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/anti-impersonation/anti-impersonation.svg" alt="" width="16" height="16">
            Run liveness check
          </span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-security-cyber">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Cybersecurity</p>
        <h2 class="home-platform-theme__section-title" id="settings-security-cyber">Security controls</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="security-alerts">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/security-alerts/security-alerts.svg" alt="" width="16" height="16">
            Configure security alerts
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="account-lockout">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/account-lockout/account-lockout.svg" alt="" width="16" height="16">
            Configure account lockout
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="ip-restrictions">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/ip-restrictions/ip-restrictions.svg" alt="" width="16" height="16">
            Configure IP restrictions
          </span>
        </button>
      </div>
    </section>
  </div>
</section>
