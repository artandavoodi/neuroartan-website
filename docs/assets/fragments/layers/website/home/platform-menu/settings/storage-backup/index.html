<section class="home-platform-destination home-platform-destination--settings-storage-backup" data-home-platform-destination-root aria-label="Storage and backup settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-storage-local">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Local Data</p>
        <h2 class="home-platform-theme__section-title" id="settings-storage-local">Browser storage</h2>
      </div>
      <div class="home-platform-theme__mode-grid">
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="export-settings">
          <span class="home-platform-theme__mode-label">Export</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="clear-local-preferences">
          <span class="home-platform-theme__mode-label">Archive / Clear local</span>
        </button>
      </div>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Backup</p>
          </div>
          <span class="home-platform-theme__mode-caption">Cloud backup requires a signed-in account storage owner.</span>
        </div>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Restore / Sync</p>
          </div>
          <span class="home-platform-theme__mode-caption">Restore and sync depend on the account-backed storage runtime.</span>
        </div>
      </div>
    </section>
  </div>
</section>
