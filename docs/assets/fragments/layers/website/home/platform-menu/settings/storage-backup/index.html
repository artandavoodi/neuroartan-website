<section class="home-platform-destination home-platform-destination--settings-storage-backup" data-home-platform-destination-root aria-label="Storage and backup settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-storage-local" data-home-platform-theme-section data-home-platform-theme-section-collapsed="true">
      <div class="home-platform-theme__section-header">
        <button class="home-platform-theme__section-eyebrow" type="button" data-home-platform-theme-section-toggle aria-expanded="false">
          <span class="home-platform-theme__section-eyebrow-text">Browser storage</span>
          <img class="ui-icon-theme-aware home-platform-theme__section-toggle-icon" src="/registry/icons/public/assets/core/actions/create/plus.svg" alt="" width="16" height="16">
        </button>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>
      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="export-settings">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/export-settings/export-settings.svg" alt="" width="16" height="16">
            Export settings
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="archive-clear-local">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/archive-clear-local/archive-clear-local.svg" alt="" width="16" height="16">
            Archive & clear local
          </span>
        </button>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-storage-cloud" data-home-platform-theme-section data-home-platform-theme-section-collapsed="true">
      <div class="home-platform-theme__section-header">
        <button class="home-platform-theme__section-eyebrow" type="button" data-home-platform-theme-section-toggle aria-expanded="false">
          <span class="home-platform-theme__section-eyebrow-text">Backup & sync</span>
          <img class="ui-icon-theme-aware home-platform-theme__section-toggle-icon" src="/registry/icons/public/assets/core/actions/create/plus.svg" alt="" width="16" height="16">
        </button>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="storage-auto-backup">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Automatic backup</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="storage-auto-backup"
            data-toggle-scope="storage"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
      </div>
      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="create-backup">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/create-backup/create-backup.svg" alt="" width="16" height="16">
            Create backup now
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="restore-backup">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/restore-backup/restore-backup.svg" alt="" width="16" height="16">
            Restore from backup
          </span>
        </button>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-storage-management" data-home-platform-theme-section>
      <div class="home-platform-theme__section-header">
        <h2 class="home-platform-theme__section-title" id="settings-storage-management">Storage usage</h2>
      </div>
      <div class="home-platform-theme__section-content" data-home-platform-theme-section-content>
      <div class="home-platform-theme__storage-breakdown">
        <div class="home-platform-theme__storage-breakdown-row">
          <span class="home-platform-theme__storage-breakdown-label">Preferences</span>
          <span class="home-platform-theme__storage-breakdown-value" data-home-platform-storage-preferences>0 KB</span>
        </div>
        <div class="home-platform-theme__storage-breakdown-row">
          <span class="home-platform-theme__storage-breakdown-label">Chat history</span>
          <span class="home-platform-theme__storage-breakdown-value" data-home-platform-storage-chat>0 KB</span>
        </div>
        <div class="home-platform-theme__storage-breakdown-row">
          <span class="home-platform-theme__storage-breakdown-label">Model state</span>
          <span class="home-platform-theme__storage-breakdown-value" data-home-platform-storage-model>0 KB</span>
        </div>
        <div class="home-platform-theme__storage-breakdown-row home-platform-theme__storage-breakdown-row--total">
          <span class="home-platform-theme__storage-breakdown-label">Total</span>
          <span class="home-platform-theme__storage-breakdown-value" data-home-platform-storage-total>0 KB</span>
        </div>
      </div>
      <div class="home-platform-theme__toggle-list">
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="clear-preferences">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/clear-preferences/clear-preferences.svg" alt="" width="16" height="16">
            Clear preferences
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="clear-chat">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/clear-chat/clear-chat.svg" alt="" width="16" height="16">
            Clear chat history
          </span>
        </button>
        <button class="home-platform-theme__action-button" type="button" data-home-platform-settings-action="clear-model">
          <span class="home-platform-theme__action-button-label">
            <img class="ui-icon-theme-aware home-platform-theme__action-icon" src="/registry/icons/public/assets/core/actions/clear-model/clear-model.svg" alt="" width="16" height="16">
            Clear model state
          </span>
        </button>
      </div>
      </div>
    </section>
  </div>
</section>
