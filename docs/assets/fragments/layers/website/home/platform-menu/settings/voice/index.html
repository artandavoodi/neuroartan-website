<section class="home-platform-destination home-platform-destination--settings-voice" data-home-platform-destination-root aria-label="Voice settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-voice-input-output">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Input / Output</p>
        <h2 class="home-platform-theme__section-title" id="settings-voice-input-output">Voice runtime</h2>
      </div>
      <div class="home-platform-theme__mode-grid">
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="voice-input">
          <span class="home-platform-theme__mode-label">Input</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="voice-output">
          <span class="home-platform-theme__mode-label">Output</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="country-language">
          <span class="home-platform-theme__mode-label">Language</span>
        </button>
        <button class="home-platform-theme__mode-option" type="button" data-home-platform-settings-action="permission-microphone">
          <span class="home-platform-theme__mode-label">Microphone permission</span>
        </button>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-voice-training">
      <div class="home-platform-theme__section-header">
        <p class="home-platform-theme__section-eyebrow">Training</p>
        <h2 class="home-platform-theme__section-title" id="settings-voice-training">Voice identity</h2>
      </div>
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Training</p>
          </div>
          <span class="home-platform-theme__mode-caption">Voice training remains governed by account and ICOS runtime permissions before browser exposure.</span>
        </div>
        <div class="home-platform-theme__toggle-row">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Wake / Hold</p>
          </div>
          <span class="home-platform-theme__mode-caption">Wake and hold behavior is represented as a runtime boundary until the web voice engine owns it.</span>
        </div>
      </div>
    </section>
  </div>
</section>
