<section class="home-platform-destination home-platform-destination--settings-voice" data-home-platform-destination-root aria-label="Voice settings destination">
  <div class="home-platform-destination__surface home-platform-theme" data-home-platform-destination-surface>
    <section class="home-platform-theme__section" aria-labelledby="settings-voice-input-output" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-voice-input-output">Voice runtime</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-voice-input-output-content">
      <div class="home-platform-theme__shortcut-list">
        <button class="home-platform-theme__shortcut-item" type="button" data-home-platform-settings-action="voice-input">
          <span class="home-platform-theme__shortcut-label">Input</span>
          <img class="ui-icon-theme-aware home-platform-theme__shortcut-icon" src="/registry/icons/public/assets/core/media/audio/mic.svg" alt="" width="16" height="16">
        </button>
        <button class="home-platform-theme__shortcut-item" type="button" data-home-platform-settings-action="voice-output">
          <span class="home-platform-theme__shortcut-label">Output</span>
          <img class="ui-icon-theme-aware home-platform-theme__shortcut-icon" src="/registry/icons/public/assets/core/media/audio/mic.svg" alt="" width="16" height="16">
        </button>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-voice-permissions" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-voice-permissions">Voice consent</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-voice-permissions-content">
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="voice-training-permission">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Training permission</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="voice-training-permission"
            data-toggle-scope="voice"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="voice-playback-permission">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Playback permission</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="voice-playback-permission"
            data-toggle-scope="voice"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="voice-public-permission">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Public display permission</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="voice-public-permission"
            data-toggle-scope="voice"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
      </div>
      </div>
    </section>

    <section class="home-platform-theme__section" aria-labelledby="settings-voice-activation" data-home-platform-theme-section>
      <div class="home-platform-theme__section-eyebrow">
        <span class="home-platform-theme__section-title" id="settings-voice-activation">Voice activation</span>
      </div>
      <div class="home-platform-theme__section-content" id="settings-voice-activation-content">
      <div class="home-platform-theme__toggle-list">
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="voice-activation">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Voice activation</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="voice-activation"
            data-toggle-scope="voice"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
        <div class="home-platform-theme__toggle-row" role="listitem" data-home-platform-theme-toggle-row data-toggle-key="voice-auto-activation">
          <div class="home-platform-theme__toggle-copy">
            <p class="home-platform-theme__toggle-title">Auto-activation</p>
          </div>
          <button
            class="na-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            data-na-toggle
            data-toggle-key="voice-auto-activation"
            data-toggle-scope="voice"
            data-toggle-default="off"
            data-toggle-mode="custom-only">
            <span class="na-toggle__track" aria-hidden="true">
              <span class="na-toggle__thumb"></span>
            </span>
          </button>
        </div>
      </div>
      </div>
    </section>
  </div>
</section>
