<form class="home-runtime-provider-settings" aria-label="Runtime provider settings">
  <label class="ui-form-row">
    <span class="ui-label__text">Provider</span>

    <select
      class="developer-mode-settings-field"
      data-runtime-provider-input>

      <option value="gemini">Google Gemini</option>
      <option value="openai">OpenAI</option>
      <option value="local">Local Runtime</option>
    </select>
  </label>

  <label class="ui-form-row">
    <span class="ui-label__text">Gemini API Key</span>

    <input
      class="developer-mode-settings-field"
      type="password"
      autocomplete="off"
      placeholder="Paste Gemini API key"
      data-runtime-provider-api-key>
  </label>
</form>
