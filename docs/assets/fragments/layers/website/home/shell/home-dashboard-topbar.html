<!-- =============================================================================
     HOME DASHBOARD TOPBAR FRAGMENT
     Purpose: primary home-layer top navigation shell for homepage app surfaces.
     Notes:
     - owns homepage platform navigation independently from the institutional menu
     - keeps the homepage stage primary while exposing governed platform entry points
     - routes menu, search, profile, and page-level platform surfaces from one shell
============================================================================= -->

<header class="home-dashboard-topbar" id="home-dashboard-topbar" aria-label="Home dashboard topbar">
  <div class="home-dashboard-topbar__inner">
    <a class="home-dashboard-topbar__brand" href="/" aria-label="Neuroartan home" data-profile-auth-visible="signed-out">
      <img
        class="home-dashboard-topbar__brand-mark"
        src="/registry/icons/public/assets/core/identity/brand/neuroartan/logo-plain.svg"
        alt="Neuroartan symbol">
    </a>

    <div class="home-dashboard-topbar__nav-group">
      <nav class="home-dashboard-topbar__nav" aria-label="Platform navigation">
        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="home-dashboard-menu-trigger"
          type="button"
          aria-label="Open home navigation"
          aria-controls="home-platform-shell"
          aria-expanded="false">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/primary/home.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Home</span>
        </button>

        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--search"
          id="home-dashboard-search-trigger"
          type="button"
          aria-label="Open platform explore"
          aria-controls="home-search-shell"
          aria-expanded="false">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/discovery/explore.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Explore</span>
        </button>

        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="home-dashboard-models-trigger"
          type="button"
          data-home-topbar-route="/model/#model/foundation/overview"
          aria-label="Open model">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/cognition/model/model.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Model</span>
        </button>

        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="home-dashboard-feed-trigger"
          type="button"
          data-home-topbar-route="/feed/"
          aria-label="Open public feed"
          data-profile-auth-visible="signed-in">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/feed/feed.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Feed</span>
        </button>

</nav>

    </div>

    <div class="home-dashboard-topbar__utility" aria-label="Account control" data-profile-auth-visible="signed-out">
        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--utility home-dashboard-topbar__action--profile"
          id="home-dashboard-profile-trigger"
          type="button"
          aria-label="Open profile control"
          aria-controls="home-platform-shell"
          aria-expanded="false">
          <span class="home-dashboard-topbar__profile-avatar" data-home-topbar-profile-avatar-shell aria-hidden="true" hidden>
            <img class="home-dashboard-topbar__profile-avatar-image" data-home-topbar-profile-avatar alt="" hidden>
            <span class="home-dashboard-topbar__profile-avatar-fallback" data-home-topbar-profile-avatar-fallback>N</span>
          </span>
          <span class="home-dashboard-topbar__icon home-dashboard-topbar__icon--profile" data-home-topbar-profile-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/identity/profile/profile.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label sr-only" data-home-topbar-profile-label>Profile</span>
        </button>
      </div>
  </div>
</header>
