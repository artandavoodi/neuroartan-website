<!-- =============================================================================
     HOME SEARCH SHELL FRAGMENT
     Purpose: modular home-layer search surface for models, people, and knowledge.
     Notes:
     - UI shell only
     - retrieval ownership stays with existing search/query infrastructure
     - designed for dashboard/home mounting, not institutional menu replacement
============================================================================= -->

<section class="home-search-shell" id="home-search-shell" aria-label="Home search shell" hidden>
  <div class="home-search-shell__dialog" role="dialog" aria-modal="true" aria-label="Search">
    <div class="home-search-shell__header">
      <button
        class="home-search-shell__close global-close-button"
        id="home-search-shell-close"
        type="button"
        aria-label="Close search">
        <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
        <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
      </button>
    </div>

    <div class="home-search-shell__body">
      <form class="home-search-shell__form" id="home-search-shell-form" role="search" novalidate>
        <div class="home-search-shell__input-row">
        <span class="home-search-shell__input-icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/search/search.svg" alt="">
          </span>
          <input
            class="home-search-shell__input"
            id="home-search-shell-input"
            name="q"
            type="search"
            inputmode="search"
            autocomplete="off"
            placeholder="Explore"
            aria-describedby="home-search-shell-hint" />
          <button
            class="home-search-shell__clear-button"
            id="home-search-shell-clear-button"
            type="button"
            data-home-search-clear="true"
            aria-label="Clear search"
            hidden>
            <span class="home-search-shell__clear-icon" aria-hidden="true">
              <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/close/close.svg" alt="">
            </span>
          </button>
          <button
            class="home-search-shell__voice-button"
            id="home-search-shell-voice-button"
            type="button"
            aria-label="Start voice search"
            aria-pressed="false">
            <span class="home-search-shell__voice-icon" aria-hidden="true">
              <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/media/audio/mic.svg" alt="">
            </span>
          </button>
        </div>
      </form>
      <nav class="home-search-shell__scope-nav" aria-label="Search scope" data-home-search-scope-nav>
        <button class="home-search-shell__scope-tab home-search-shell__scope-tab--active" type="button" data-home-search-scope="all" aria-pressed="true">All</button>
        <button class="home-search-shell__scope-tab" type="button" data-home-search-scope="profiles" aria-pressed="false">Profiles</button>
        <button class="home-search-shell__scope-tab" type="button" data-home-search-scope="models" aria-pressed="false">Models</button>
        <button class="home-search-shell__scope-ask-button" type="button" data-home-search-result-action="ask-home" data-home-search-rail-ask hidden>Ask Neuroartan</button>
        <button class="home-search-shell__scope-filter-button" type="button" data-home-search-filter aria-label="Filter search results">
          <span class="home-search-shell__scope-filter-icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/filter/filter.svg" alt="">
          </span>
        </button>
      </nav>

      <section class="home-search-shell__filter-panel" data-home-search-filter-panel hidden aria-label="Search filters">
        <header class="home-search-shell__filter-header">
          <div>
            <h2 class="home-search-shell__filter-title" id="home-search-shell-filter-title">Filters</h2>
          </div>
          <div class="home-search-shell__filter-actions">
            <button class="home-search-shell__filter-reset" type="button" data-home-search-filter-reset aria-label="Reset filters">
              <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/reset/reset.svg" alt="" width="16" height="16" draggable="false">
            </button>
            <button class="home-search-shell__filter-close global-close-button" type="button" data-home-search-filter-close aria-label="Close filters" data-core-close-button="true" data-close-button-primitive-bound="true">
              <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
              <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
            </button>
          </div>
        </header>
        <div class="home-search-shell__filter-group" data-home-search-filter-group="type">
          <p class="home-search-shell__filter-label">Type</p>
          <div class="home-search-shell__filter-options">
            <button class="home-search-shell__filter-chip is-active" type="button" data-home-search-filter-option="type" data-home-search-filter-value="all" aria-pressed="true">All</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="type" data-home-search-filter-value="profile" aria-pressed="false">Profiles</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="type" data-home-search-filter-value="model" aria-pressed="false">Models</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="type" data-home-search-filter-value="page" aria-pressed="false">Pages</button>
          </div>
        </div>
        <div class="home-search-shell__filter-group" data-home-search-filter-group="year">
          <p class="home-search-shell__filter-label">Year</p>
          <div class="home-search-shell__filter-options">
            <select class="home-search-shell__filter-select" data-home-search-filter-option="year" aria-label="Year">
              <option value="all" selected>Any</option>
              <option value="2026">2026</option>
            </select>
          </div>
        </div>
        <div class="home-search-shell__filter-group home-search-shell__filter-group--models" data-home-search-filter-group="model-trust" data-model-filter-group>
          <p class="home-search-shell__filter-label">Trust</p>
          <div class="home-search-shell__filter-options">
            <button class="home-search-shell__filter-chip is-active" type="button" data-home-search-filter-option="model-trust" data-home-search-filter-value="all" aria-pressed="true">Any</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="model-trust" data-home-search-filter-value="verified" aria-pressed="false">Verified</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="model-trust" data-home-search-filter-value="not-verified" aria-pressed="false">Not Verified</button>
          </div>
        </div>
        <div class="home-search-shell__filter-group home-search-shell__filter-group--models" data-home-search-filter-group="model-state" data-model-filter-group>
          <p class="home-search-shell__filter-label">State</p>
          <div class="home-search-shell__filter-options">
            <button class="home-search-shell__filter-chip is-active" type="button" data-home-search-filter-option="model-state" data-home-search-filter-value="all" aria-pressed="true">Any</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="model-state" data-home-search-filter-value="ready" aria-pressed="false">Ready</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="model-state" data-home-search-filter-value="training" aria-pressed="false">Training</button>
          </div>
        </div>
        <div class="home-search-shell__filter-group home-search-shell__filter-group--models" data-home-search-filter-group="model-scope" data-model-filter-group>
          <p class="home-search-shell__filter-label">Scope</p>
          <div class="home-search-shell__filter-options">
            <button class="home-search-shell__filter-chip is-active" type="button" data-home-search-filter-option="model-scope" data-home-search-filter-value="all" aria-pressed="true">Any</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="model-scope" data-home-search-filter-value="saved" aria-pressed="false">Saved</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="model-scope" data-home-search-filter-value="hired" aria-pressed="false">Hired</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="model-scope" data-home-search-filter-value="deployed" aria-pressed="false">Deployed</button>
          </div>
        </div>
        <div class="home-search-shell__filter-group home-search-shell__filter-group--models" data-home-search-filter-group="model-expertise" data-model-filter-group>
          <p class="home-search-shell__filter-label">Expertise</p>
          <div class="home-search-shell__filter-options">
            <button class="home-search-shell__filter-chip is-active" type="button" data-home-search-filter-option="model-expertise" data-home-search-filter-value="all" aria-pressed="true">Any</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="model-expertise" data-home-search-filter-value="personal" aria-pressed="false">Personal</button>
            <button class="home-search-shell__filter-chip" type="button" data-home-search-filter-option="model-expertise" data-home-search-filter-value="expert" aria-pressed="false">Expert</button>
          </div>
        </div>
        <div class="home-search-shell__filter-group home-search-shell__filter-group--models" data-home-search-filter-group="model-year" data-model-filter-group>
          <p class="home-search-shell__filter-label">Year</p>
          <div class="home-search-shell__filter-options">
            <select class="home-search-shell__filter-select" data-home-search-filter-option="model-year" aria-label="Model Year">
              <option value="all" selected>Any</option>
              <option value="2026">2026</option>
            </select>
          </div>
        </div>
      </section>

      <div class="home-search-shell__results" id="home-search-shell-results" aria-live="polite">
        <div class="home-search-shell__empty-state" id="home-search-shell-empty-state">
          <p class="home-search-shell__empty-title">Start with a query</p>
          <p class="home-search-shell__empty-text">
            Search public pages, continuity models, profile routes, and platform knowledge from one surface.
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
