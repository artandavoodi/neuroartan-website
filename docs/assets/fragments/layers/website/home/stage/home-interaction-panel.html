<section class="home-interaction-panel" id="home-interaction-panel" data-home-interaction-mode="idle" aria-label="Homepage interaction panel">
  <form class="home-interaction-panel__form" id="home-interaction-panel-form" novalidate>
    <textarea
      class="home-interaction-panel__input"
      id="home-interaction-panel-input"
      name="prompt"
      rows="3"
      placeholder="Ask anything"
      aria-describedby="home-interaction-panel-support"></textarea>

    <div class="home-interaction-panel__composer" id="home-interaction-panel-support">
      <div class="home-interaction-panel__composer-left">
<button class="home-interaction-panel__settings" type="button" data-home-interaction-settings-open="true" data-home-interaction-settings-section="overview" aria-label="Interaction settings" aria-controls="home-interaction-settings-panel" aria-expanded="false" data-profile-auth-visible="signed-in">
          <span class="home-interaction-panel__settings-icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/fullscreen/fullscreen.svg" alt="">
          </span>
        </button>
      </div>

      <input id="home-interaction-panel-file-input" type="file" multiple hidden>
      <div class="home-interaction-panel__files" data-home-interaction-files aria-live="polite"></div>

      <div class="home-interaction-panel__composer-right">
<button class="home-interaction-panel__continuity home-interaction-panel__continuity" id="home-interaction-panel-submit" type="submit" aria-label="Voice input">
          <span class="home-interaction-panel__continuity-icon" aria-hidden="true" data-home-interaction-submit-icon>
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/media/audio/mic.svg" alt="">
          </span>
</button>
      </div>
    </div>
  </form>
</section>
