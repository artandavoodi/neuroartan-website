<section class="home-interaction-panel" id="home-interaction-panel" data-home-interaction-mode="idle" aria-label="Homepage interaction panel">
  <form class="home-interaction-panel__form" id="home-interaction-panel-form" novalidate>
    <textarea
      class="home-interaction-panel__input"
      id="home-interaction-panel-input"
      name="prompt"
      rows="3"
      placeholder="Ask anything."
      aria-describedby="home-interaction-panel-support"></textarea>

    <div class="home-interaction-panel__composer" id="home-interaction-panel-support">
      <div class="home-interaction-panel__composer-left">
        <button class="home-interaction-panel__attach" type="button" data-home-interaction-attach="true" aria-label="Attach file">
          <span class="home-interaction-panel__attach-icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/actions/unclassified/attach.svg" alt="">
          </span>
        </button>

        <button class="home-interaction-panel__model-button" type="button" data-home-interaction-open-search="true" aria-label="Change model">
          <span class="home-interaction-panel__model-name" data-home-interaction-active-model>Neuroartan Institution</span>
          <span class="home-interaction-panel__model-chevron" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/navigation/unclassified/chevron-down.svg" alt="">
          </span>
        </button>

        <button class="home-interaction-panel__settings" type="button" data-home-interaction-settings-open="true" data-home-interaction-settings-section="overview" aria-label="Interaction settings" aria-controls="home-interaction-settings-panel" aria-expanded="false">
          <span class="home-interaction-panel__settings-icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/system/unclassified/settings.svg" alt="">
          </span>
        </button>
      </div>

      <input id="home-interaction-panel-file-input" type="file" multiple hidden>
      <div class="home-interaction-panel__files" data-home-interaction-files aria-live="polite"></div>

      <div class="home-interaction-panel__composer-right">
        <button
          id="stage-microphone-button"
          class="home-interaction-panel__voice"
          type="button"
          aria-label="Activate voice input"
          aria-controls="home-interaction-response-panel"
          aria-expanded="false">
          <span class="home-interaction-panel__voice-icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/media/unclassified/mic.svg" alt="">
          </span>
        </button>

        <button class="home-interaction-panel__submit" id="home-interaction-panel-submit" type="submit" aria-label="Submit interaction">
          <span class="home-interaction-panel__submit-icon" aria-hidden="true" data-home-interaction-submit-icon>
            <img class="ui-icon-theme-aware" src="/assets/icons/core/actions/unclassified/send.svg" alt="">
          </span>
          <span class="home-interaction-panel__submit-label" data-home-interaction-submit-label>Send</span>
        </button>
      </div>
    </div>
  </form>
</section>
