<section class="model-memory-foundation" data-model-memory-foundation>
  <dl class="model-management__card-grid model-memory-foundation__metrics" aria-label="Memory foundation overview">
    <div class="model-management__card">
      <dt>
        <img class="model-management__card-icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/cognition/memory/memory.svg" alt="">
        Memory Readiness
      </dt>
      <dd>
        <span class="model-management__status-dot" data-status="initial" data-model-memory-readiness-dot aria-hidden="true"></span>
        <span data-model-memory-readiness>Initial</span>
      </dd>
    </div>
    <div class="model-management__card">
      <dt>
        <img class="model-management__card-icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/files/database/database.svg" alt="">
        Accepted Memory
      </dt>
      <dd>
        <span data-model-memory-accepted-count>0</span>
      </dd>
    </div>
    <div class="model-management__card">
      <dt>
        <img class="model-management__card-icon ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/model/foundation/memory/memory-consolidation-queue.svg" alt="">
        Consolidation Queue
      </dt>
      <dd>
        <span data-model-memory-queue-count>0</span>
      </dd>
    </div>
    <div class="model-management__card">
      <dt>
        <img class="model-management__card-icon ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/model/foundation/memory/memory-lookback.svg" alt="">
        Look-back Window
      </dt>
      <dd>
        <span data-model-memory-lookback>10 years</span>
      </dd>
    </div>
    <div class="model-management__card">
      <dt>
        <img class="model-management__card-icon ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/model/foundation/memory/memory-indefinite-continuity.svg" alt="">
        Continuity Horizon
      </dt>
      <dd>
        <span data-model-memory-longevity>25 years</span>
      </dd>
    </div>
  </dl>

  <section class="model-memory-foundation__surface" aria-label="Human memory foundation">
    <div class="model-memory-foundation__orbit" aria-hidden="true" data-model-memory-orbit></div>
    <div class="model-memory-foundation__body">
      <p class="model-memory-foundation__kicker">Human-memory continuity</p>
      <p class="model-memory-foundation__copy">
        Memory separates raw history from accepted continuity by reviewing what should persist, decay, return to the present, or remain restricted.
      </p>
    </div>
  </section>

  <section class="model-memory-foundation__classes" aria-label="Memory classes" data-model-memory-classes></section>

  <section class="model-memory-foundation__streams" aria-label="Memory signal streams" data-model-memory-streams></section>

  <div class="model-memory-foundation__actions" aria-label="Memory actions">
    <button class="model-management__button" type="button" data-model-memory-open="controls">
      <img class="model-memory-foundation__action-icon ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/model/foundation/memory/memory-controls.svg" alt="">
      Memory Controls
    </button>
    <button class="model-management__button" type="button" data-model-memory-open="queue">
      <img class="model-memory-foundation__action-icon ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/model/foundation/memory/memory-consolidation-queue.svg" alt="">
      Consolidation Queue
    </button>
    <button class="model-management__button" type="button" data-model-memory-open="graph">
      <img class="model-memory-foundation__action-icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/cognition/graph/graph.svg" alt="">
      Memory Graph
    </button>
  </div>

  <div class="profile-settings__status" data-model-memory-status aria-live="polite"></div>
</section>
