<section class="model-source-calibration-workspace" data-model-source-calibration-workspace hidden aria-hidden="true">
  <div class="model-source-calibration-workspace__backdrop" data-model-source-calibration-workspace-close></div>

  <article class="model-source-calibration-workspace__surface" role="dialog" aria-modal="true" aria-label="Source Calibration">
    <header class="model-source-calibration-workspace__header">

      <span class="model-source-calibration-workspace__progress" data-model-source-calibration-workspace-progress aria-live="polite">0%</span>

      <button class="global-close-button" type="button" data-model-source-calibration-workspace-close aria-label="Close Source Calibration">
        <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
        <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
      </button>
    </header>

    <div class="model-source-calibration-workspace__body" data-model-source-calibration-workspace-body>
      <section class="model-source-calibration-workspace__question" data-model-source-calibration-workspace-question></section>
      <section class="model-source-calibration-workspace__result" data-model-source-calibration-workspace-result hidden></section>
    </div>
  </article>
</section>
