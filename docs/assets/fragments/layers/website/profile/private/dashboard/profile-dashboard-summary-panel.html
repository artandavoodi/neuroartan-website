<!-- =============================================================================
     01) PRIVATE DASHBOARD SUMMARY PANEL
     02) PROFILE SUMMARY OVERVIEW
============================================================================= -->
<article class="profile-dashboard__card ui-card ui-surface--glass" data-profile-dashboard-summary-panel data-profile-dashboard-pane="summary">
  <div class="profile-dashboard__header">
    <div>
      <h2 class="profile-dashboard__title">Profile Summary</h2>
      <p class="profile-dashboard__intro" data-profile-dashboard-copy>
        A quick overview of your profile maturity and activity across all key systems.
      </p>
    </div>
  </div>

  <div class="profile-dashboard__metrics">
    <div class="profile-dashboard__metric">
      <div class="profile-dashboard__metric-copy">
        <p class="profile-dashboard__metric-label">Completion</p>
        <p class="profile-dashboard__metric-value" data-profile-dashboard-value="completion">0%</p>
      </div>
      <div class="profile-dashboard__bar"><span data-profile-dashboard-bar="completion"></span></div>
    </div>

    <div class="profile-dashboard__metric">
      <div class="profile-dashboard__metric-copy">
        <p class="profile-dashboard__metric-label">Route readiness</p>
        <p class="profile-dashboard__metric-value" data-profile-dashboard-value="route">0%</p>
      </div>
      <div class="profile-dashboard__bar"><span data-profile-dashboard-bar="route"></span></div>
    </div>

    <div class="profile-dashboard__metric">
      <div class="profile-dashboard__metric-copy">
        <p class="profile-dashboard__metric-label">Visibility control</p>
        <p class="profile-dashboard__metric-value" data-profile-dashboard-value="visibility">0%</p>
      </div>
      <div class="profile-dashboard__bar"><span data-profile-dashboard-bar="visibility"></span></div>
    </div>

    <div class="profile-dashboard__metric">
      <div class="profile-dashboard__metric-copy">
        <p class="profile-dashboard__metric-label">Continuity readiness</p>
        <p class="profile-dashboard__metric-value" data-profile-dashboard-value="continuity">0%</p>
      </div>
      <div class="profile-dashboard__bar"><span data-profile-dashboard-bar="continuity"></span></div>
    </div>
  </div>

  <div class="profile-dashboard__activity">
    <div class="profile-dashboard__activity-card">
      <p class="profile-dashboard__activity-label">Private bank</p>
      <p class="profile-dashboard__activity-value" data-profile-dashboard-thought-count="private">0</p>
    </div>
    <div class="profile-dashboard__activity-card">
      <p class="profile-dashboard__activity-label">Public writing</p>
      <p class="profile-dashboard__activity-value" data-profile-dashboard-thought-count="public">0</p>
    </div>
  </div>
</article>
