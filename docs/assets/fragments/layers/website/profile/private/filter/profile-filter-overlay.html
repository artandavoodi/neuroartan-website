<!-- =============================================================================
     PROFILE FILTER OVERLAY
     Context-owned filter surface for profile toolbar actions.
============================================================================= -->
<section class="profile-filter-overlay" data-profile-filter-overlay hidden aria-label="Profile filters">
  <div class="profile-filter-overlay__backdrop" aria-hidden="true"></div>
  <article class="profile-filter-overlay__dialog ui-card ui-surface--glass" role="dialog" aria-modal="true" aria-labelledby="profile-filter-overlay-title">
    <header class="profile-filter-overlay__header">
      <div>
        <h2 class="profile-filter-overlay__title" id="profile-filter-overlay-title" data-profile-filter-title>Filters</h2>
      </div>
      <div class="profile-filter-overlay__header-actions">
        <button class="profile-filter-overlay__reset" type="button" data-profile-filter-reset aria-label="Reset filters">
          <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/reset/reset.svg" alt="" width="16" height="16">
        </button>
        <button class="profile-filter-overlay__close global-close-button" type="button" data-profile-filter-close aria-label="Close filters">
          <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
          <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <div class="profile-filter-overlay__groups" data-profile-filter-groups></div>
  </article>
</section>
