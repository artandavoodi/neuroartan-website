<!-- =============================================================================
     01) PRIVATE PROFILE HERO
     02) HERO COVER
     03) HERO IDENTITY ROW
     04) HERO PROFILE IMAGE
     05) HERO COPY
     06) HERO SOCIAL ROW
============================================================================= -->
<section class="profile-private-hero" data-profile-private-hero aria-labelledby="profile-private-hero-title">
  <div class="profile-private-hero__surface">
    <!-- =========================================================================
         02) HERO COVER
    ========================================================================= -->
    <div class="profile-private-hero__cover" data-profile-cover>
      <button class="profile-private-hero__media-action profile-private-hero__media-action--cover" type="button" data-profile-action="edit-cover" aria-label="Edit cover image">
        <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/editing/edit.svg" alt="" aria-hidden="true">
      </button>
    </div>

    <!-- =========================================================================
         03) HERO IDENTITY ROW
    ========================================================================= -->
    <div class="profile-private-hero__identity-row">
      <!-- =======================================================================
           04) HERO PROFILE IMAGE
      ======================================================================= -->
      <div class="profile-private-hero__avatar-wrap">
        <div class="profile-private-hero__avatar" data-profile-avatar aria-hidden="true">
          <img class="profile-private-hero__avatar-image" data-profile-avatar-image alt="" hidden>
          <span class="profile-private-hero__avatar-initials" data-profile-avatar-initials>NA</span>
        </div>

        <button class="profile-private-hero__media-action profile-private-hero__media-action--avatar" type="button" data-profile-action="edit-avatar" aria-label="Edit profile image">
          <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/media/camera/camera.svg" alt="" aria-hidden="true">
        </button>
      </div>

      <!-- =======================================================================
           05) HERO COPY
      ======================================================================= -->
      <div class="profile-private-hero__copy">
        <h1 class="profile-private-hero__title" id="profile-private-hero-title" data-profile-display-name>Profile not completed</h1>
        <p class="profile-private-hero__meta" data-profile-username>@username pending</p>

        <div class="profile-private-hero__details" aria-label="Profile details">
          <span class="profile-private-hero__detail" data-profile-location-wrap>
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/location/location.svg" alt="" aria-hidden="true">
            <span data-profile-location>Location pending</span>
          </span>
          <span class="profile-private-hero__detail" data-profile-role>Role pending</span>
        </div>
      </div>
    </div>

    <!-- =========================================================================
         06) HERO SOCIAL ROW
    ========================================================================= -->
    <div class="profile-private-hero__social-row">
      <div class="profile-private-hero__stats" aria-label="Profile social statistics">
        <span class="profile-private-hero__stat"><strong data-profile-followers-count>0</strong> Followers</span>
        <span class="profile-private-hero__stat"><strong data-profile-following-count>0</strong> Following</span>
      </div>

      <nav class="profile-private-hero__tabs" aria-label="Profile sections" data-profile-hero-tabs>
        <button class="profile-private-hero__tab" type="button" data-profile-tab="posts" aria-current="page">Posts</button>
        <button class="profile-private-hero__tab" type="button" data-profile-tab="thoughts">Thoughts</button>
        <button class="profile-private-hero__tab" type="button" data-profile-tab="models">Models</button>
        <button class="profile-private-hero__tab" type="button" data-profile-tab="organizations">Organizations</button>
      </nav>
    </div>
  </div>
</section>
