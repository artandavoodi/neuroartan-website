<!-- =============================================================================
     01) PRIVATE PROFILE HERO
     02) HERO COVER
     03) HERO IDENTITY ROW
     04) HERO PROFILE IMAGE
     05) HERO COPY
     06) HERO SOCIAL ROW
============================================================================= -->
<section class="profile-private-hero" data-profile-private-hero data-home-platform-theme aria-labelledby="profile-private-hero-title">
  <div class="profile-private-hero__surface" data-profile-hero-visible="false">
    <!-- =========================================================================
         02) HERO COVER
    ========================================================================= -->
    <div class="profile-private-hero__cover" data-profile-cover>
      <button class="profile-private-hero__media-action profile-private-hero__media-action--cover" type="button" data-profile-action="edit-cover" aria-label="Edit cover image">
        <span class="home-dashboard-topbar__icon" aria-hidden="true">
          <img class="profile-private-hero__icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/media/camera/camera.svg" alt="" aria-hidden="true">
        </span>
      </button>
    </div>

    <!-- =========================================================================
         03) HERO IDENTITY ROW
    ========================================================================= -->
    <div class="profile-private-hero__identity-row">
      <!-- =======================================================================
           04) HERO PROFILE IMAGE
      ======================================================================= -->
      <div class="profile-private-hero__avatar-wrap">
        <div class="profile-private-hero__avatar" data-profile-avatar aria-hidden="true">
          <img class="profile-private-hero__avatar-image" data-profile-avatar-image src="/assets/images/layers/website/sections/home/hero/Salim%20Sky.jpg" alt="" aria-hidden="true">
        </div>
        <button class="profile-private-hero__media-action profile-private-hero__media-action--avatar" type="button" data-profile-action="edit-avatar" aria-label="Edit profile image">
          <span class="profile-private-hero__icon-wrap home-platform-shell__nav-icon" aria-hidden="true">
            <img class="profile-private-hero__icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/media/camera/camera.svg" alt="" aria-hidden="true">
          </span>
        </button>
      </div>

      <!-- =======================================================================
           05) HERO COPY
      ======================================================================= -->
      <div class="profile-private-hero__copy">
        <div class="profile-private-hero__title-row">
          <h1 class="profile-private-hero__title" id="profile-private-hero-title" data-profile-display-name></h1>
          <span class="profile-private-hero__verified home-platform-shell__nav-icon" data-profile-verified-block hidden>
            <img class="profile-private-hero__icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/identity/trust/verified.svg" alt="" aria-hidden="true">
          </span>
        </div>
        <p class="profile-private-hero__meta" data-profile-username></p>
        <p class="profile-private-hero__bio" data-profile-bio hidden></p>
        <div class="profile-private-hero__stats" aria-label="Profile social statistics">
          <span class="profile-private-hero__stat"><strong data-profile-followers-count>0</strong> Followers</span>
          <span class="profile-private-hero__stat"><strong data-profile-following-count>0</strong> Following</span>
        </div>
      </div>

      <div class="profile-private-hero__actions" aria-label="Profile actions">
        <span class="profile-private-hero__info">
          <button class="profile-private-hero__info-button" type="button" data-profile-hero-info-toggle aria-expanded="false" aria-label="Profile information">
            <span class="profile-private-hero__icon-wrap" aria-hidden="true">
              <img class="profile-private-hero__icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/for-more-information-about/for-more-information-about.svg" alt="" aria-hidden="true">
            </span>
          </button>
          <span class="profile-private-hero__info-popover" data-profile-hero-info-popover hidden>
            <span class="profile-private-hero__info-row">
              <span class="profile-private-hero__info-label">Location</span>
              <span class="profile-private-hero__info-value" data-profile-location>Not set</span>
            </span>
            <span class="profile-private-hero__info-row">
              <span class="profile-private-hero__info-label">Role</span>
              <span class="profile-private-hero__info-value" data-profile-role>Not set</span>
            </span>
          </span>
        </span>
      </div>
    </div>

    <!-- =========================================================================
         06) HERO SOCIAL ROW
    ========================================================================= -->
    <div class="profile-private-hero__social-row">
      <nav class="profile-private-hero__tabs" aria-label="Profile contextual sections" data-profile-hero-tabs></nav>
    </div>
  </div>
</section>
