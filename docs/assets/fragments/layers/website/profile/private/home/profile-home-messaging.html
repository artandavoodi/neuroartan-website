<section class="profile-home-panel profile-home-panel--messaging" data-profile-home-messaging aria-label="Messaging">
  <div class="profile-home-panel__stream" data-profile-home-message-list></div>
  <form class="profile-home-panel__composer" data-profile-home-message-form>
    <input class="ui-field profile-home-panel__input" type="text" name="message" placeholder="Write a message" autocomplete="off">
    <button class="profile-home-panel__action" type="submit">Send</button>
  </form>
  <p class="profile-home-panel__empty" data-profile-home-message-empty hidden>No messages are stored in this browser.</p>
</section>
