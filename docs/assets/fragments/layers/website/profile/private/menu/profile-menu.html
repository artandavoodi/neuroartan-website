<!-- =============================================================================
     PROFILE DASHBOARD TOPBAR FRAGMENT
     Purpose: primary private-profile top navigation shell.
     Notes:
     - mirrors the homepage dashboard topbar structure exactly
     - keeps profile-specific data hooks additive only
     - preserves source-level topbar spacing, rail, icon, and account-control architecture
============================================================================= -->

<header class="home-dashboard-topbar profile-menu" id="profile-dashboard-topbar" data-profile-menu data-profile-surface="private" aria-label="Private profile topbar">
  <div class="home-dashboard-topbar__inner">
    <a class="home-dashboard-topbar__brand" href="/" aria-label="Neuroartan home">
      <img
        class="home-dashboard-topbar__brand-mark"
        src="/assets/icons/core/identity/brand/neuroartan/logo-plain.svg"
        alt="Neuroartan symbol">
    </a>

    <div class="home-dashboard-topbar__nav-group">
      <nav class="home-dashboard-topbar__nav" aria-label="Private profile navigation">
        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="profile-dashboard-menu-trigger"
          type="button"
          data-profile-action="menu"
          aria-label="Open platform navigation"
          aria-controls="home-platform-shell"
          aria-expanded="false">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/navigation/unclassified/menu.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Menu</span>
        </button>

        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--search"
          id="profile-dashboard-search-trigger"
          type="button"
          data-profile-action="search"
          aria-label="Open platform search"
          aria-controls="home-search-shell"
          aria-expanded="false">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/actions/unclassified/search.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Search</span>
        </button>

        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="profile-dashboard-models-trigger"
          type="button"
          data-home-topbar-route="/pages/models/index.html"
          data-profile-action="models"
          aria-label="Open models directory">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/cognition/unclassified/model.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Models</span>
        </button>

        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="profile-dashboard-feed-trigger"
          type="button"
          data-home-topbar-route="/pages/feed/index.html"
          data-profile-action="feed"
          aria-label="Open public feed">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/navigation/unclassified/feed.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Feed</span>
        </button>

        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="profile-dashboard-dashboard-trigger"
          type="button"
          data-home-topbar-route="/pages/dashboard/index.html"
          data-profile-action="dashboard"
          aria-label="Open dashboard">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/navigation/unclassified/dashboard.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Dashboard</span>
        </button>
      </nav>

    </div>

    <div class="home-dashboard-topbar__utility" aria-label="Account control">
        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--utility home-dashboard-topbar__action--profile"
          id="profile-dashboard-profile-trigger"
          type="button"
          data-profile-action="account"
          data-home-topbar-profile-state="icon"
          aria-label="Open profile control"
          aria-controls="home-platform-shell"
          aria-expanded="false">
          <span class="home-dashboard-topbar__profile-avatar" data-profile-menu-avatar-shell aria-hidden="true" hidden>
            <img class="home-dashboard-topbar__profile-avatar-image" data-profile-menu-avatar-image alt="" hidden>
            <span class="home-dashboard-topbar__profile-avatar-fallback" data-profile-menu-avatar-fallback>N</span>
          </span>
          <span class="home-dashboard-topbar__icon home-dashboard-topbar__icon--profile" data-profile-menu-profile-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/assets/icons/core/identity/unclassified/profile.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label sr-only" data-profile-menu-account-label>Profile</span>
        </button>
      </div>
  </div>
</header>
