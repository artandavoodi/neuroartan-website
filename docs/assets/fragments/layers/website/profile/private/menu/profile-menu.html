<!-- =============================================================================
     PROFILE DASHBOARD TOPBAR FRAGMENT
     Purpose: primary private-profile top navigation shell.
     Notes:
     - mirrors the homepage dashboard topbar structure exactly
     - keeps profile-specific data hooks additive only
     - preserves source-level topbar spacing, rail, icon, and account-control architecture
============================================================================= -->

<header class="home-dashboard-topbar profile-menu" id="profile-dashboard-topbar" data-profile-menu data-profile-surface="private" aria-label="Private profile topbar">
  <div class="home-dashboard-topbar__inner">
    <a class="home-dashboard-topbar__brand" href="/profile.html" aria-label="Profile home">
      <span class="home-dashboard-topbar__label">Profile</span>
    </a>

    <div class="home-dashboard-topbar__nav-group">
      <nav class="home-dashboard-topbar__nav" aria-label="Private profile navigation">
        <a
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="profile-dashboard-menu-trigger"
          href="/index.html"
          aria-label="Open home">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/primary/home.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Home</span>
        </a>

        <button
          class="home-dashboard-topbar__action home-dashboard-topbar__action--search"
          id="profile-dashboard-explore-trigger"
          type="button"
          aria-label="Open platform explore"
          aria-controls="home-search-shell"
          aria-expanded="false"
          data-profile-search-trigger="true">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/discovery/explore.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Explore</span>
        </button>

        <a
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="profile-dashboard-library-trigger"
          href="/pages/knowledge-research/index.html"
          aria-label="Open library">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/library/library.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Library</span>
        </a>

        <a
          class="home-dashboard-topbar__action home-dashboard-topbar__action--nav"
          id="profile-dashboard-workspace-trigger"
          href="/profile.html#overview"
          aria-label="Open workspace">
          <span class="home-dashboard-topbar__icon" aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/productivity/workspace/workspace.svg" alt="">
          </span>
          <span class="home-dashboard-topbar__label">Workspace</span>
        </a>
      </nav>

    </div>

  </div>
</header>
