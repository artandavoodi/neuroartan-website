<section class="profile-private-organization" data-profile-private-organization aria-labelledby="profile-private-organization-title">
  <div class="profile-private-organization__surface">
    <h2 class="profile-private-organization__title" id="profile-private-organization-title">Organizations</h2>

    <div class="profile-private-organization__list">
      <article class="profile-private-organization__item" data-profile-organization-card="personal">
        <div class="profile-private-organization__item-content-wrapper">
          <div class="profile-private-organization__item-header">
            <span class="profile-private-organization__label">Personal account</span>
            <strong class="profile-private-organization__value" data-profile-personal-space-status>Private profile pending</strong>
          </div>
          <p class="profile-private-organization__note">Root identity for future organization memberships and account ownership.</p>
        </div>
      </article>

      <article class="profile-private-organization__item" data-profile-organization-card="company">
        <div class="profile-private-organization__item-content-wrapper">
          <div class="profile-private-organization__item-header">
            <span class="profile-private-organization__label">Company space</span>
            <strong class="profile-private-organization__value" data-profile-company-space-status>Not created</strong>
          </div>
          <p class="profile-private-organization__note">Team, billing, access, and institutional workspace ownership will appear here when available.</p>
        </div>
      </article>
    </div>

    <p class="profile-private-organization__status" data-profile-organization-status>Organization records are not active yet.</p>
  </div>
</section>
