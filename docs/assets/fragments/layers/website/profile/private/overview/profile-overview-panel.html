<!-- =============================================================================
     01) PRIVATE PROFILE OVERVIEW PANEL
     02) IDENTITY SUMMARY
     03) PUBLIC ROUTE SUMMARY
============================================================================= -->
<div class="profile-sections__grid" data-profile-overview-panel data-profile-surface="private">
  <article class="profile-panel ui-card ui-surface--glass">
    <div class="profile-panel__inner">
      <div class="profile-panel__header">
        <div>
          <h2 class="profile-panel__title">Identity</h2>
        </div>

        <button class="ui-button ui-button--ghost profile-panel__action" type="button" data-profile-action="edit-profile">
          <img
            class="ui-icon-theme-aware ui-icon-sm"
            src="/registry/icons/public/assets/core/actions/editing/edit.svg"
            alt=""
            aria-hidden="true"
          >
          <span>Edit</span>
        </button>
      </div>

      <dl class="profile-panel__rows">
        <div class="profile-panel__row">
          <dt class="profile-panel__label">Display name</dt>
          <dd class="profile-panel__value" data-profile-identity-display-name>Pending</dd>
        </div>
        <div class="profile-panel__row">
          <dt class="profile-panel__label">Username</dt>
          <dd class="profile-panel__value" data-profile-username-raw>Pending</dd>
        </div>
        <div class="profile-panel__row">
          <dt class="profile-panel__label">Bio</dt>
          <dd class="profile-panel__value" data-profile-identity-bio>Pending</dd>
        </div>
      </dl>
    </div>
  </article>

  <article class="profile-panel ui-card ui-surface--glass">
    <div class="profile-panel__inner">
      <div class="profile-panel__header">
        <div>
          <h2 class="profile-panel__title">Public Route</h2>
        </div>

        <button class="ui-button ui-button--ghost profile-panel__action" type="button" data-profile-action="edit-username">
          <img
            class="ui-icon-theme-aware ui-icon-sm"
            src="/registry/icons/public/assets/core/actions/editing/edit.svg"
            alt=""
            aria-hidden="true"
          >
          <span>Edit</span>
        </button>
      </div>

      <dl class="profile-panel__rows">
        <div class="profile-panel__row">
          <dt class="profile-panel__label">Route</dt>
          <dd class="profile-panel__value" data-profile-route-path>neuroartan.com/username</dd>
        </div>
        <div class="profile-panel__row">
          <dt class="profile-panel__label">Status</dt>
          <dd class="profile-panel__value" data-profile-route-status>Pending</dd>
        </div>
        <div class="profile-panel__row">
          <dt class="profile-panel__label">Discoverable</dt>
          <dd class="profile-panel__value" data-profile-public-discoverable>No</dd>
        </div>
      </dl>
    </div>
  </article>
</div>
