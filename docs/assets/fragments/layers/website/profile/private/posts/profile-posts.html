<!-- =============================================================================
     01) PRIVATE PROFILE POSTS
     02) POST COMPOSER
     03) POST STREAM
============================================================================= -->
<section class="profile-posts" data-profile-posts aria-labelledby="profile-posts-title">
  <article class="profile-posts__stream ui-card ui-surface--glass">
    <header class="profile-posts__stream-header">
      <div>
        <h2 class="profile-posts__title" id="profile-posts-title">Posts</h2>
      </div>
      <span class="ui-badge ui-badge--outline" data-profile-post-count>0 posts</span>
    </header>

    <div class="profile-posts__list" data-profile-post-list></div>
    <p class="profile-posts__empty" data-profile-post-empty>No posts have been created yet.</p>
  </article>

  <button class="profile-posts__fab" type="button" data-profile-post-overlay-open aria-label="Create post">
    <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/create/plus.svg" alt="" aria-hidden="true">
  </button>

  <div class="profile-posts__overlay" data-profile-post-overlay hidden>
    <div class="profile-posts__overlay-backdrop" aria-hidden="true"></div>
    <article class="profile-posts__composer ui-card ui-surface--glass" role="dialog" aria-modal="true" aria-labelledby="profile-post-composer-title">
      <header class="profile-posts__header">
        <div>
          <h2 class="profile-posts__title" id="profile-post-composer-title">Create Post</h2>
        </div>
        <button class="profile-posts__close global-close-button" type="button" data-profile-post-overlay-close aria-label="Close post composer">
          <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
          <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
        </button>
      </header>

      <form class="profile-posts__form" data-profile-post-form novalidate>
        <div>
          <label class="profile-posts__field profile-posts__field--full">
            <span class="profile-posts__label">Post</span>
            <textarea class="ui-field profile-posts__textarea" rows="4" name="body" maxlength="500" placeholder="What is in your mind?"></textarea>
          </label>
        </div>

        <div>
          <div class="profile-posts__field profile-posts__field--full profile-posts__visibility">
            <button class="profile-posts__visibility-trigger" type="button" data-profile-post-visibility-trigger aria-expanded="false" aria-haspopup="listbox">
              <img class="ui-icon-theme-aware profile-posts__visibility-icon" src="/registry/icons/public/assets/core/actions/visibility/public-route.svg" alt="" aria-hidden="true">
              <span class="profile-posts__visibility-label">Everyone</span>
            </button>
            <div class="profile-posts__visibility-dropdown" data-profile-post-visibility-dropdown hidden role="listbox">
              <button class="profile-posts__visibility-option profile-posts__visibility-option--active" type="button" data-profile-post-visibility-option="public" role="option" aria-selected="true">
                <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/visibility/public-route.svg" alt="" aria-hidden="true">
                <span>Everyone</span>
              </button>
              <button class="profile-posts__visibility-option" type="button" data-profile-post-visibility-option="private" role="option" aria-selected="false">
                <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/visibility/private-draft.svg" alt="" aria-hidden="true">
                <span>Only me</span>
              </button>
            </div>
            <input type="hidden" name="visibility" value="public" data-profile-post-visibility>
          </div>
        </div>

        <div>
          <div class="profile-posts__attachment profile-posts__field--full" data-profile-post-attachment>
            <div class="profile-posts__toolbar-left">
              <button class="profile-posts__attachment-button" type="button" data-profile-post-media-trigger aria-label="Attach media">
                <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/content/media/media.svg" alt="" aria-hidden="true">
                <span>Media</span>
              </button>
              <button class="profile-posts__attachment-button" type="button" data-profile-post-media-trigger data-profile-post-media-kind="gif" aria-label="Attach GIF">
                <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/content/media/gif.svg" alt="" aria-hidden="true">
                <span>GIF</span>
              </button>
            </div>
            <div class="profile-posts__toolbar-right">
              <button class="profile-posts__attachment-button" type="button" data-profile-post-voice-trigger aria-label="Dictate post">
                <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/media/audio/mic.svg" alt="" aria-hidden="true">
              </button>
            </div>
            <input type="file" name="post_media" accept="image/*,video/*,audio/*,image/gif" data-profile-post-media-input hidden>
            <figure class="profile-posts__attachment-preview" data-profile-post-media-preview hidden>
              <img src="" alt="" data-profile-post-media-preview-image hidden>
              <video controls data-profile-post-media-preview-video hidden></video>
              <audio controls data-profile-post-media-preview-audio hidden></audio>
              <figcaption data-profile-post-media-name></figcaption>
              <button class="profile-posts__attachment-remove" type="button" data-profile-post-media-remove>Remove</button>
            </figure>
          </div>
        </div>

        <div class="profile-posts__footer">
          <div class="profile-posts__meta">
            <p class="profile-posts__status" data-profile-post-status aria-live="polite"></p>
            <div class="profile-posts__counter" data-profile-post-character-count>
              <svg class="profile-posts__counter-circle" viewBox="0 0 36 36" aria-hidden="true">
                <circle class="profile-posts__counter-circle-bg" cx="18" cy="18" r="16" fill="none" stroke-width="2"></circle>
                <circle class="profile-posts__counter-circle-progress" cx="18" cy="18" r="16" fill="none" stroke-width="2" stroke-dasharray="100" stroke-dashoffset="100"></circle>
              </svg>
            </div>
          </div>
          <button class="profile-posts__attachment-button" type="submit" data-profile-post-submit aria-label="Post">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/create/plus.svg" alt="" aria-hidden="true">
          </button>
        </div>
      </form>
    </article>
  </div>
</section>
