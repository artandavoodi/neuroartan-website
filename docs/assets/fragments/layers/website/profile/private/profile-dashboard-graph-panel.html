<!-- =============================================================================
     01) PRIVATE DASHBOARD GRAPH PANEL
     02) THOUGHT GRAPH
============================================================================= -->
<article class="profile-dashboard__card ui-card ui-surface--glass" data-profile-dashboard-graph-panel>
  <div class="profile-dashboard__header">
    <div>
      <h2 class="profile-dashboard__title">Thought Graph</h2>
      <p class="profile-dashboard__intro">
        Category distribution across the thoughts captured inside your private profile workspace.
      </p>
    </div>
  </div>

  <div class="profile-dashboard__graph" data-profile-dashboard-thought-graph></div>

  <div class="profile-dashboard__graph-summary">
    <div class="profile-dashboard__graph-summary-card">
      <p class="profile-dashboard__graph-summary-label">Route state</p>
      <p class="profile-dashboard__graph-summary-value" data-profile-dashboard-route-summary>Pending</p>
    </div>
    <div class="profile-dashboard__graph-summary-card">
      <p class="profile-dashboard__graph-summary-label">Thought status</p>
      <p class="profile-dashboard__graph-summary-value" data-profile-dashboard-thought-summary>No thought entries captured yet.</p>
    </div>
  </div>

  <p class="profile-dashboard__note" data-profile-dashboard-thought-note>
    No thought categories are active yet.
  </p>
</article>
