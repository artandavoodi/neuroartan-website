<!-- =============================================================================
     01) PRIVATE THOUGHT STREAM PANEL
     02) PRIVATE STREAM LANE
     03) PUBLIC STREAM LANE
============================================================================= -->
<div class="profile-thought-stream" data-profile-thought-stream>
  <article class="profile-thought-stream__lane ui-card ui-surface--glass" data-profile-thought-stream-lane="private">
    <div class="profile-thought-stream__lane-header">
      <div>
        <h3 class="profile-thought-stream__lane-title">Private bank</h3>
        <p class="profile-thought-stream__lane-copy">Owner-only reflections, drafts, and internal thought records.</p>
      </div>
      <span class="ui-badge ui-badge--outline" data-profile-thought-stream-count="private">0 entries</span>
    </div>

    <div class="profile-thought-stream__list" data-profile-thought-stream-list="private"></div>
    <p class="profile-thought-stream__empty" data-profile-thought-stream-empty="private">
      No private thought entries have been captured yet.
    </p>
  </article>

  <article class="profile-thought-stream__lane ui-card ui-surface--glass" data-profile-thought-stream-lane="public">
    <div class="profile-thought-stream__lane-header">
      <div>
        <h3 class="profile-thought-stream__lane-title">Public writing</h3>
        <p class="profile-thought-stream__lane-copy">Thoughts prepared for outward company-domain presence.</p>
      </div>
      <span class="ui-badge ui-badge--outline" data-profile-thought-stream-count="public">0 entries</span>
    </div>

    <div class="profile-thought-stream__list" data-profile-thought-stream-list="public"></div>
    <p class="profile-thought-stream__empty" data-profile-thought-stream-empty="public">
      No public-writing entries have been staged yet.
    </p>
  </article>
</div>
