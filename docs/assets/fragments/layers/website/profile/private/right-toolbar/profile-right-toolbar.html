<aside
  class="profile-right-toolbar"
  data-profile-right-toolbar
  data-profile-private-right-toolbar
  data-profile-right-toolbar-rail="expanded"
  aria-label="Profile tools"
>
  <div class="profile-right-toolbar__surface">
    <div class="profile-right-toolbar__rail-inner">
      <div class="profile-right-toolbar__header">
        <button
          class="profile-right-toolbar__rail-toggle"
          type="button"
          data-profile-right-toolbar-rail-toggle
          aria-label="Collapse profile tools"
          aria-pressed="false"
        >
          <span
            class="profile-right-toolbar__rail-toggle-icon inline-stroke-icon"
            data-inline-stroke-icon
            data-profile-right-toolbar-rail-toggle-icon-host
            data-profile-right-toolbar-rail-icon-expanded="/registry/icons/public/assets/core/navigation/panel/panel-right-activated.svg"
            data-profile-right-toolbar-rail-icon-collapsed="/registry/icons/public/assets/core/navigation/panel/panel-right-deactivated.svg"
            data-profile-right-toolbar-rail-current-icon="/registry/icons/public/assets/core/navigation/panel/panel-right-activated.svg"
            aria-hidden="true"
          >
            <img
              class="ui-icon-theme-aware"
              src="/registry/icons/public/assets/core/navigation/panel/panel-right-activated.svg"
              alt=""
              data-profile-right-toolbar-rail-toggle-icon
              data-profile-right-toolbar-rail-icon-expanded="/registry/icons/public/assets/core/navigation/panel/panel-right-activated.svg"
              data-profile-right-toolbar-rail-icon-collapsed="/registry/icons/public/assets/core/navigation/panel/panel-right-deactivated.svg"
            >
          </span>
        </button>
      </div>

      <nav class="profile-right-toolbar__nav" aria-label="Profile quick tools" data-profile-right-toolbar-actions></nav>
    </div>
  </div>
</aside>
