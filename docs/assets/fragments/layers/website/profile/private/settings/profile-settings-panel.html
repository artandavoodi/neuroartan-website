<!-- =============================================================================
     01) PRIVATE PROFILE SETTINGS PANEL
     02) SETTINGS HEADER
     03) SETTINGS NAVIGATION
     04) SETTINGS PANES
============================================================================= -->
<div class="profile-settings" data-profile-settings-panel data-profile-surface="private">
  <article class="profile-settings__shell ui-card ui-surface--glass">
    <div class="profile-settings__header">
      <div>
        <h2 class="profile-settings__title" data-profile-settings-title>Profile Settings</h2>
      </div>
    </div>

  </article>

  <div class="profile-settings__panes">
    <section class="profile-settings__pane ui-card ui-surface--glass" data-profile-settings-pane="identity">
      <div class="profile-settings__pane-header">
        <div>
          <h3 class="profile-settings__pane-title">Identity Details</h3>
        </div>
      </div>

      <form class="profile-settings__form" data-profile-save-form data-profile-save-scope="identity" novalidate>
        <div class="profile-settings__field-grid">
          <label class="profile-settings__field">
            <span class="profile-settings__label">First name</span>
            <input class="ui-field" type="text" name="first_name" autocomplete="given-name">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Last name</span>
            <input class="ui-field" type="text" name="last_name" autocomplete="family-name">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Display name</span>
            <input class="ui-field" type="text" name="display_name" autocomplete="nickname">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Date of birth</span>
            <input class="ui-field" type="date" name="date_of_birth" autocomplete="bday">
          </label>

          <label class="profile-settings__field profile-settings__field--full">
            <span class="profile-settings__label">Gender</span>
            <select class="ui-field" name="gender">
              <option value="">Optional</option>
              <option value="woman">Woman</option>
              <option value="man">Man</option>
            </select>
          </label>

          <label class="profile-settings__field profile-settings__field--full">
            <span class="profile-settings__label">Bio</span>
            <textarea class="ui-field profile-settings__textarea" rows="4" maxlength="180" name="public_summary" placeholder="A short bio for your profile."></textarea>
          </label>
        </div>

        <div class="profile-settings__status" data-profile-save-status="identity" aria-live="polite"></div>

        <div class="profile-settings__actions">
          <button class="ui-button ui-button--secondary" type="submit" data-profile-save-submit="identity">Save</button>
        </div>
      </form>
    </section>

    <section class="profile-settings__pane ui-card ui-surface--glass" data-profile-settings-pane="route" hidden>
      <div class="profile-settings__pane-header">
        <div>
          <h3 class="profile-settings__pane-title">Username &amp; Public Route</h3>
        </div>
      </div>

      <form class="profile-settings__form" data-profile-save-form data-profile-save-scope="route" novalidate>
        <div class="profile-settings__field-grid">
          <label class="profile-settings__field">
            <span class="profile-settings__label">Username</span>
            <input class="ui-field" type="text" name="username" autocapitalize="off" spellcheck="false">
            <span class="profile-settings__hint" data-profile-settings-username-note>
              Username changes are governed by the canonical reservation policy.
            </span>
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Public display name</span>
            <input class="ui-field" type="text" name="public_display_name">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Identity label</span>
            <input class="ui-field" type="text" name="public_identity_label" placeholder="Founder, Researcher, Builder">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Primary public link</span>
            <input class="ui-field" type="url" name="public_primary_link" placeholder="https://">
          </label>

        </div>

        <div class="profile-settings__status" data-profile-save-status="route" aria-live="polite"></div>

        <div class="profile-settings__actions">
          <button class="ui-button ui-button--secondary" type="submit" data-profile-save-submit="route">Save</button>
        </div>
      </form>
    </section>

    <section class="profile-settings__pane ui-card ui-surface--glass" data-profile-settings-pane="visibility" hidden>
      <div class="profile-settings__pane-header">
        <div>
          <h3 class="profile-settings__pane-title">Visibility &amp; Public Presence</h3>
        </div>
      </div>

      <form class="profile-settings__form" data-profile-save-form data-profile-save-scope="visibility" novalidate>
        <div class="profile-settings__toggle-list">
          <label class="profile-settings__toggle">
            <input type="checkbox" name="public_profile_enabled">
            <span class="profile-settings__toggle-copy">
              <strong>Public profile</strong>
              <span>Make your public route visible.</span>
            </span>
          </label>

          <label class="profile-settings__toggle">
            <input type="checkbox" name="public_profile_discoverable">
            <span class="profile-settings__toggle-copy">
              <strong>Discovery</strong>
              <span>Allow search and profile discovery.</span>
            </span>
          </label>
        </div>

        <div class="profile-settings__status" data-profile-save-status="visibility" aria-live="polite"></div>

        <div class="profile-settings__actions">
          <button class="ui-button ui-button--secondary" type="submit" data-profile-save-submit="visibility">Save</button>
        </div>
      </form>
    </section>

    <section class="profile-settings__pane ui-card ui-surface--glass" data-profile-settings-pane="discovery" hidden>
      <div class="profile-settings__pane-header">
        <div>
          <h3 class="profile-settings__pane-title">Discovery</h3>
        </div>
      </div>

      <form class="profile-settings__form" data-profile-save-form data-profile-save-scope="visibility" novalidate>
        <div class="profile-settings__toggle-list">
          <label class="profile-settings__toggle">
            <input type="checkbox" name="profile_search_visible">
            <span class="profile-settings__toggle-copy">
              <strong>Search visibility</strong>
              <span>Allow this profile to appear in search.</span>
            </span>
          </label>

          <label class="profile-settings__toggle">
            <input type="checkbox" name="profile_models_visible">
            <span class="profile-settings__toggle-copy">
              <strong>Models visibility</strong>
              <span>Show public model associations.</span>
            </span>
          </label>
        </div>

        <div class="profile-settings__status" data-profile-save-status="visibility" aria-live="polite"></div>

        <div class="profile-settings__actions">
          <button class="ui-button ui-button--secondary" type="submit" data-profile-save-submit="visibility">Save</button>
        </div>
      </form>
    </section>

    <section class="profile-settings__pane ui-card ui-surface--glass" data-profile-settings-pane="sharing" hidden>
      <div class="profile-settings__pane-header">
        <div>
          <h3 class="profile-settings__pane-title">Sharing</h3>
        </div>
      </div>

      <form class="profile-settings__form" data-profile-save-form data-profile-save-scope="visibility" novalidate>
        <div class="profile-settings__toggle-list">
          <label class="profile-settings__toggle">
            <input type="checkbox" name="profile_followers_visible">
            <span class="profile-settings__toggle-copy">
              <strong>Follower counts</strong>
              <span>Show follower and following counts.</span>
            </span>
          </label>

          <label class="profile-settings__toggle">
            <input type="checkbox" name="profile_posts_visible">
            <span class="profile-settings__toggle-copy">
              <strong>Posts visibility</strong>
              <span>Show public posts on your profile.</span>
            </span>
          </label>

          <label class="profile-settings__toggle">
            <input type="checkbox" name="profile_thoughts_visible">
            <span class="profile-settings__toggle-copy">
              <strong>Thoughts visibility</strong>
              <span>Show public thoughts on your profile.</span>
            </span>
          </label>
        </div>

        <div class="profile-settings__status" data-profile-save-status="visibility" aria-live="polite"></div>

        <div class="profile-settings__actions">
          <button class="ui-button ui-button--secondary" type="submit" data-profile-save-submit="visibility">Save</button>
        </div>
      </form>
    </section>

    <section class="profile-settings__pane ui-card ui-surface--glass" data-profile-settings-pane="password" hidden>
      <div class="profile-settings__pane-header">
        <div>
          <h3 class="profile-settings__pane-title">Password</h3>
        </div>
      </div>

      <form class="profile-settings__form" data-profile-password-form novalidate>
        <div class="profile-settings__field-grid">
          <label class="profile-settings__field profile-settings__field--full">
            <span class="profile-settings__label">Current password</span>
            <input class="ui-field" type="password" name="current_password" autocomplete="current-password">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">New password</span>
            <input class="ui-field" type="password" name="new_password" autocomplete="new-password">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Confirm password</span>
            <input class="ui-field" type="password" name="new_password_confirm" autocomplete="new-password">
          </label>
        </div>

        <div class="profile-settings__status" data-profile-password-status aria-live="polite"></div>

        <div class="profile-settings__actions">
          <button class="ui-button ui-button--secondary" type="submit" data-profile-password-submit>Update password</button>
        </div>
      </form>
    </section>

    <section class="profile-settings__pane ui-card ui-surface--glass" data-profile-settings-pane="verification" hidden>
      <div class="profile-settings__pane-header">
        <div>
          <h3 class="profile-settings__pane-title">Verification</h3>
        </div>
      </div>

      <form class="profile-settings__form" data-profile-verification-form novalidate>
        <div class="profile-settings__field-grid">
          <label class="profile-settings__field profile-settings__field--full">
            <span class="profile-settings__label">Verification request note</span>
            <textarea class="ui-field profile-settings__textarea" rows="4" name="request_note" placeholder="Add relevant context for profile verification review."></textarea>
          </label>
        </div>

        <div class="profile-settings__status" data-profile-verification-status aria-live="polite"></div>

        <div class="profile-settings__actions">
          <button class="ui-button ui-button--secondary" type="submit" data-profile-verification-submit>Request Verification</button>
        </div>
      </form>
    </section>
  </div>
</div>
