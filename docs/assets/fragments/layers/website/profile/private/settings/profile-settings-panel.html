<!-- =============================================================================
     01) PRIVATE PROFILE SETTINGS PANEL
     02) SETTINGS HEADER
     03) SETTINGS NAVIGATION
     04) SETTINGS PANES
============================================================================= -->
<div class="profile-settings" data-profile-settings-panel data-profile-surface="private" role="dialog" aria-modal="true" aria-label="Edit profile">
  <button
    class="profile-settings__close global-close-button"
    type="button"
    data-profile-settings-close
    aria-label="Close edit profile"
  >
    <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
    <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
  </button>

  <div class="profile-settings__hero-mount" data-include="profile-private-hero"></div>

  <div class="profile-settings__panes">
    <section class="profile-settings__pane" data-profile-settings-pane="identity">
      <form class="profile-settings__form" data-profile-save-form data-profile-save-scope="identity" novalidate>
        <div class="profile-settings__field-grid">
          <label class="profile-settings__field">
            <span class="profile-settings__label">First name</span>
            <input class="ui-field profile-settings__input" type="text" name="first_name" autocomplete="given-name">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Last name</span>
            <input class="ui-field profile-settings__input" type="text" name="last_name" autocomplete="family-name">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Display name</span>
            <input class="ui-field profile-settings__input" type="text" name="display_name" autocomplete="nickname">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Date of birth</span>
            <input
              class="ui-field profile-settings__input"
              type="hidden"
              name="date_of_birth"
              autocomplete="bday"
              data-profile-settings-date-of-birth
            >
            <span class="profile-settings__date-grid" data-profile-settings-date-grid>
              <span class="ui-inline-dropdown profile-settings__select-control">
                <span class="ui-inline-dropdown__value profile-settings__select-value" data-profile-settings-date-label="month">Month</span>
                <span class="ui-inline-dropdown__icon-wrapper profile-settings__dropdown-icon-wrapper">
                  <img class="ui-icon-theme-aware ui-inline-dropdown__icon profile-settings__dropdown-icon" src="/registry/icons/public/assets/core/navigation/chevron/chevron-down.svg" alt="" width="16" height="16">
                  <select
                    class="ui-dropdown ui-dropdown--icon-only profile-settings__dropdown-select profile-settings__date-select"
                    data-profile-settings-date-control="month"
                    aria-label="Birth month"
                  >
                    <option value="">Month</option>
                  </select>
                </span>
              </span>
              <span class="ui-inline-dropdown profile-settings__select-control">
                <span class="ui-inline-dropdown__value profile-settings__select-value" data-profile-settings-date-label="day">Day</span>
                <span class="ui-inline-dropdown__icon-wrapper profile-settings__dropdown-icon-wrapper">
                  <img class="ui-icon-theme-aware ui-inline-dropdown__icon profile-settings__dropdown-icon" src="/registry/icons/public/assets/core/navigation/chevron/chevron-down.svg" alt="" width="16" height="16">
                  <select
                    class="ui-dropdown ui-dropdown--icon-only profile-settings__dropdown-select profile-settings__date-select"
                    data-profile-settings-date-control="day"
                    aria-label="Birth day"
                  >
                    <option value="">Day</option>
                  </select>
                </span>
              </span>
              <span class="ui-inline-dropdown profile-settings__select-control">
                <span class="ui-inline-dropdown__value profile-settings__select-value" data-profile-settings-date-label="year">Year</span>
                <span class="ui-inline-dropdown__icon-wrapper profile-settings__dropdown-icon-wrapper">
                  <img class="ui-icon-theme-aware ui-inline-dropdown__icon profile-settings__dropdown-icon" src="/registry/icons/public/assets/core/navigation/chevron/chevron-down.svg" alt="" width="16" height="16">
                  <select
                    class="ui-dropdown ui-dropdown--icon-only profile-settings__dropdown-select profile-settings__date-select"
                    data-profile-settings-date-control="year"
                    aria-label="Birth year"
                  >
                    <option value="">Year</option>
                  </select>
                </span>
              </span>
            </span>
          </label>

          <label class="profile-settings__field profile-settings__field--full">
            <span class="profile-settings__label">Gender</span>
            <span class="ui-inline-dropdown profile-settings__dropdown">
              <span class="ui-inline-dropdown__value profile-settings__select-value" data-profile-settings-select-label="gender">Man</span>
              <span class="ui-inline-dropdown__icon-wrapper profile-settings__dropdown-icon-wrapper">
                <img class="ui-icon-theme-aware ui-inline-dropdown__icon profile-settings__dropdown-icon" src="/registry/icons/public/assets/core/navigation/chevron/chevron-down.svg" alt="" width="16" height="16">
                <select class="ui-dropdown ui-dropdown--icon-only profile-settings__dropdown-select" name="gender" aria-label="Gender">
                  <option value="woman">Woman</option>
                  <option value="man" selected>Man</option>
                </select>
              </span>
            </span>
          </label>

          <label class="profile-settings__field profile-settings__field--full">
            <textarea class="ui-field profile-settings__input profile-settings__textarea profile-settings__textarea--minimal" rows="4" maxlength="180" name="public_summary" placeholder="Bio"></textarea>
          </label>

          <label class="profile-settings__field profile-settings__field--with-info">
            <div class="profile-settings__label-row">
              <span class="profile-settings__label">Username</span>
              <span class="profile-settings__field-info">
                <button class="profile-settings__info-button" type="button" data-profile-settings-info-toggle aria-expanded="false" aria-label="Username information">
                  <span class="profile-settings__icon-wrap" aria-hidden="true">
                    <img class="profile-settings__icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/for-more-information-about/for-more-information-about.svg" alt="" aria-hidden="true">
                  </span>
                </button>
                <span class="profile-settings__info-popover" data-profile-settings-info-popover hidden>
                  <span class="profile-settings__info-content" data-profile-settings-username-note>
                    Username changes are governed by the canonical reservation policy.
                  </span>
                </span>
              </span>
            </div>
            <input class="ui-field profile-settings__input" type="text" name="username" autocapitalize="off" spellcheck="false">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Identity label</span>
            <input class="ui-field profile-settings__input" type="text" name="public_identity_label" placeholder="Your role">
          </label>

          <label class="profile-settings__field">
            <span class="profile-settings__label">Primary public link</span>
            <input class="ui-field profile-settings__input" type="url" name="public_primary_link" placeholder="https://">
          </label>
        </div>

        <div class="profile-settings__status" data-profile-save-status="identity" aria-live="polite"></div>

        <div class="profile-settings__actions">
          <button class="ui-button ui-button--secondary" type="submit" data-profile-save-submit="identity">
            <span class="ui-button__icon" aria-hidden="true">
              <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/save/save.svg" alt="">
            </span>
            <span>Save</span>
          </button>
        </div>
      </form>
    </section>
  </div>
</div>
