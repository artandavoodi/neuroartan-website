<aside
  class="profile-sidebar"
  data-profile-sidebar
  data-profile-private-sidebar
  data-profile-sidebar-rail="expanded"
>
  <div class="profile-sidebar__surface">
    <div class="profile-sidebar__rail-inner">
      <div class="profile-sidebar__header">
        <button
          class="profile-sidebar__rail-toggle"
          type="button"
          data-profile-sidebar-rail-toggle
          aria-label="Collapse profile sidebar"
          aria-pressed="false"
        >
          <span
            class="profile-sidebar__rail-toggle-icon inline-stroke-icon"
            data-inline-stroke-icon
            data-profile-sidebar-rail-toggle-icon-host
            data-profile-sidebar-rail-icon-expanded="/registry/icons/public/assets/core/navigation/panel/panel-left-activated.svg"
            data-profile-sidebar-rail-icon-collapsed="/registry/icons/public/assets/core/navigation/panel/panel-left-deactivated.svg"
            data-profile-sidebar-rail-current-icon="/registry/icons/public/assets/core/navigation/panel/panel-left-activated.svg"
            aria-hidden="true"
          >
            <img
              class="ui-icon-theme-aware"
              src="/registry/icons/public/assets/core/navigation/panel/panel-left-activated.svg"
              alt=""
              data-profile-sidebar-rail-toggle-icon
              data-profile-sidebar-rail-icon-expanded="/registry/icons/public/assets/core/navigation/panel/panel-left-activated.svg"
              data-profile-sidebar-rail-icon-collapsed="/registry/icons/public/assets/core/navigation/panel/panel-left-deactivated.svg"
            >
          </span>
        </button>
      </div>

      <nav class="profile-sidebar__nav" aria-label="Private profile workspace" data-profile-sidebar-primary-nav>
        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="home" data-profile-nav-pane="" data-profile-nav-route="/feed/#home">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/primary/home.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Home</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="profile" data-profile-nav-pane="" data-profile-nav-route="/profile.html#profile">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/identity/profile/profile.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Profile</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="model-foundation" data-profile-nav-model-pane="overview" data-profile-nav-route="/model/#model/foundation/overview">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/profile/actions/models.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Model</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-link="/">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/system/stage/stage.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Stage</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" id="profile-dashboard-explore-trigger" aria-controls="home-search-shell" aria-expanded="false" data-profile-search-trigger="true">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/discovery/explore.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Explore</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="dashboard" data-profile-nav-pane="" data-profile-nav-route="/dashboard.html#dashboard/overview">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/dashboard/dashboard.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Dashboard</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="settings" data-profile-nav-pane="password" data-profile-nav-route="/settings.html#settings/password">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/system/settings/settings.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Settings</span>
        </button>
      </nav>

      <nav class="profile-sidebar__nav" aria-label="Model workspace" data-profile-sidebar-model-nav hidden>
        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="model-foundation" data-profile-nav-model-pane="overview" data-profile-nav-route="/model/#model/foundation/overview" data-auth-state="user">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/model-identity-panel/model-identity-panel.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Foundation</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="model-training" data-profile-nav-model-pane="protocol" data-profile-nav-route="/model/#model/training/protocol" data-auth-state="user">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/model-training-panel/model-training-panel.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Training</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="model-personalization" data-profile-nav-model-pane="behavior" data-profile-nav-route="/model/#model/personalization/behavior" data-auth-state="user">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/system/personalization/customize.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Personalization</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-link="/">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/system/stage/stage.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Stage</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" aria-controls="home-search-shell" aria-expanded="false" data-profile-search-trigger="true">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/discovery/explore.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Explore</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="model-readiness" data-profile-nav-model-pane="state" data-profile-nav-route="/model/#model/readiness/state" data-auth-state="user">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/dashboard/dashboard.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Dashboard</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="model-discovery" data-profile-nav-model-pane="directory" data-profile-nav-route="/model/#model/discovery/directory">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/discovery/discover.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Discovery</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="model-settings" data-profile-nav-model-pane="preferences" data-profile-nav-route="/model/#model/settings/preferences" data-auth-state="user">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/system/settings/settings.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Settings</span>
        </button>
      </nav>
    </div>
  </div>
</aside>
