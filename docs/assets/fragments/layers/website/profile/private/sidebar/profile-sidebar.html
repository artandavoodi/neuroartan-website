<aside
  class="profile-sidebar"
  data-profile-sidebar
  data-profile-private-sidebar
  data-profile-sidebar-rail="expanded"
>
  <div class="profile-sidebar__surface">
    <div class="profile-sidebar__rail-inner">
      <div class="profile-sidebar__header">
        <button
          class="profile-sidebar__rail-toggle"
          type="button"
          data-profile-sidebar-rail-toggle
          aria-label="Collapse profile sidebar"
          aria-pressed="false"
        >
          <span
            class="profile-sidebar__rail-toggle-icon inline-stroke-icon"
            data-inline-stroke-icon
            aria-hidden="true"
          >
            <img
              class="ui-icon-theme-aware"
              src="/registry/icons/public/assets/core/navigation/panel/panel-left-activated.svg"
              alt=""
              data-profile-sidebar-rail-toggle-icon
              data-profile-sidebar-rail-toggle-expanded="/registry/icons/public/assets/core/navigation/panel/panel-left-activated.svg"
              data-profile-sidebar-rail-toggle-collapsed="/registry/icons/public/assets/core/navigation/panel/panel-left-deactivated.svg"
            >
          </span>
        </button>
      </div>

      <nav class="profile-sidebar__nav" aria-label="Private profile workspace">
        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="overview" data-profile-nav-pane="">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/layers/website/settings/overview/overview.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Overview</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="dashboard" data-profile-nav-pane="">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/navigation/dashboard/dashboard.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Dashboard</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="settings" data-profile-nav-pane="identity">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/editing/edit.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Edit Profile</span>
        </button>

        <button class="profile-sidebar__nav-item" type="button" data-profile-nav-section="settings" data-profile-nav-pane="visibility">
          <span class="profile-sidebar__nav-icon inline-stroke-icon" data-inline-stroke-icon aria-hidden="true">
            <img class="ui-icon-theme-aware" src="/registry/icons/public/assets/core/legal/privacy/privacy.svg" alt="">
          </span>
          <span class="profile-sidebar__nav-text">Privacy Settings</span>
        </button>
      </nav>
    </div>
  </div>
</aside>
