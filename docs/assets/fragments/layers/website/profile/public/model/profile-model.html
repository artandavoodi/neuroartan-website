<!-- =============================================================================
     01) PUBLIC PROFILE MODEL
============================================================================= -->
<section class="profile-home-panel" data-profile-public-model aria-label="Public model">
  <section class="profile-header" data-profile-public-model-header data-profile-surface="public-model" aria-label="Public model header">
    <div class="profile-header__surface">
      <div class="profile-header__cover" data-profile-public-model-cover aria-hidden="true"></div>

      <div class="profile-header__identity-block">
        <div class="profile-header__avatar-shell">
          <div class="profile-header__avatar-surface">
            <img
              class="profile-header__avatar-image"
              data-profile-public-model-avatar
              src="/registry/icons/public/assets/core/cognition/model/model.svg"
              alt="">
          </div>
        </div>

        <div class="profile-header__copy">
          <div class="profile-header__name-block">
            <h2 class="profile-header__display-name" data-profile-public-model-name>Personal model</h2>
            <p class="profile-header__username" data-profile-public-model-slug>Model</p>
          </div>

          <p class="profile-header__summary" data-profile-public-model-description>
            This owner has not shared public model development details yet.
          </p>

          <div class="profile-header__stats" aria-label="Public model state">
            <span><strong data-profile-public-model-type>Personal</strong> Type</span>
            <span><strong data-profile-public-model-created>Not available</strong> Created</span>
            <span><strong data-profile-public-model-readiness>Not shared</strong> Readiness</span>
            <span><strong data-profile-public-model-verification>Not verified</strong> Verification</span>
          </div>
        </div>
      </div>
    </div>
  </section>
</section>
