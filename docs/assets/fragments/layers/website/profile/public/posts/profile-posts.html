<!-- =============================================================================
     01) PUBLIC PROFILE POSTS
============================================================================= -->
<section
  class="profile-home-panel profile-home-panel--feed"
  data-profile-home-feed
  data-profile-public-posts="true"
  data-profile-public-profile-id=""
  data-profile-public-username=""
  aria-label="Public posts"
>
  <div class="profile-home-panel__stream" data-profile-home-feed-list></div>
  <div class="ui-loading-inline" data-profile-home-feed-loading aria-label="Loading posts">
    <span class="ui-loading-inline__spinner" aria-hidden="true"></span>
  </div>
  <p class="profile-home-panel__empty" data-profile-home-feed-empty hidden>No public posts have been published yet.</p>
</section>
