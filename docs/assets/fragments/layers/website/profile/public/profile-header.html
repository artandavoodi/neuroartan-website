<!-- =============================================================================
     01) PUBLIC PROFILE HEADER
     02) OWNER-APPROVED IDENTITY AND SOCIAL CONTROLS
============================================================================= -->
<section class="profile-header" data-profile-header data-profile-surface="public" aria-label="Public profile header">
  <div class="profile-header__surface">
    <div class="profile-header__cover" data-profile-public-cover aria-hidden="true"></div>

    <div class="profile-header__identity-block">
      <div class="profile-header__avatar-shell">
        <div class="profile-header__avatar-surface">
          <img class="profile-header__avatar-image" data-profile-avatar-image alt="">
        </div>
      </div>

      <div class="profile-header__copy">
        <div class="profile-header__identity-heading">
          <div class="profile-header__name-block">
            <div class="profile-header__display-row">
              <h1 class="profile-header__display-name" data-profile-display-name>Public Profile</h1>
              <span class="profile-header__verified" data-profile-verified-block hidden>
                <img
                  src="/registry/icons/public/assets/core/identity/trust/verified.svg"
                  alt=""
                  class="profile-header__verified-icon ui-icon-sm"
                  aria-hidden="true">
              </span>
            </div>
            <p class="profile-header__username" data-profile-username>@username</p>
          </div>

          <div class="profile-header__follow-control" data-profile-follow-control hidden>
            <button class="ui-button ui-button--secondary profile-header__follow-button" type="button" data-profile-action="follow-profile" data-profile-follow-primary>
              <span data-profile-follow-label>Follow</span>
            </button>

            <button class="ui-icon-button profile-header__follow-menu-button" type="button" aria-label="Open profile actions" aria-expanded="false" data-profile-follow-menu-toggle hidden>
              <img class="ui-icon-theme-aware ui-icon-sm" src="/registry/icons/public/assets/core/actions/more/more.svg" alt="" aria-hidden="true">
            </button>

            <div class="profile-header__follow-menu" data-profile-follow-menu hidden>
              <button class="profile-header__follow-menu-item" type="button" data-profile-action="unfollow-profile">
                <img class="profile-header__follow-menu-item-icon ui-icon-theme-aware ui-icon-sm" src="/registry/icons/public/assets/layers/website/profile/social/Unfollow.svg" alt="" aria-hidden="true">
                <span>Unfollow</span>
              </button>
            </div>
          </div>
        </div>

        <p class="profile-header__summary" data-profile-summary></p>

        <div class="profile-header__stats" aria-label="Profile social graph">
          <span><strong data-profile-followers-count>0</strong> Followers</span>
          <span><strong data-profile-following-count>0</strong> Following</span>
        </div>
      </div>
    </div>
  </div>
</section>
