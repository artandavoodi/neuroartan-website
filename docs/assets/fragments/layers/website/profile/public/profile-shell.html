<!-- =============================================================================
     01) PUBLIC PROFILE FEED SHELL BINDING
     02) FEED LAYOUT AUTHORITY
     03) FEED MAIN PROFILE SURFACE
     04) FEED DISCOVERY SURFACE
============================================================================= -->
<section class="catalog-section" data-profile-shell data-profile-surface="public" aria-label="Public profile shell">
  <div class="feed-layout" data-profile-public-feed-shell>
    <div class="feed-main" data-profile-public-main>
      <div class="profile-shell__mount" data-include="profile-public-header"></div>
      <div class="profile-shell__mount" data-include="profile-public-sections"></div>
    </div>

    <aside class="feed-discovery" aria-label="Public profile discovery layer" data-profile-public-discovery>
      <div class="profile-shell__mount" data-include="profile-public-footer"></div>
    </aside>
  </div>
</section>
