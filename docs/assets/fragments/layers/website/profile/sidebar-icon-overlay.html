<!-- =============================================================================
     01) SIDEBAR ICON OVERLAY
============================================================================= -->
<div id="sidebar-icon-overlay" class="sidebar-icon-overlay" data-sidebar-icon-overlay aria-hidden="false">
  <button class="sidebar-icon-overlay__button sidebar-icon-overlay__button--left" type="button" aria-label="Toggle left sidebar">
    <img src="/registry/icons/public/assets/system/states/sidebar-left-inactive.svg" alt="" class="sidebar-icon-overlay__icon sidebar-icon-overlay__icon--left-inactive">
    <img src="/registry/icons/public/assets/system/states/sidebar-left-active.svg" alt="" class="sidebar-icon-overlay__icon sidebar-icon-overlay__icon--left-active">
  </button>
  <button class="sidebar-icon-overlay__button sidebar-icon-overlay__button--right" type="button" aria-label="Toggle right sidebar">
    <img src="/registry/icons/public/assets/system/states/sidebar-right-inactive.svg" alt="" class="sidebar-icon-overlay__icon sidebar-icon-overlay__icon--right-inactive">
    <img src="/registry/icons/public/assets/system/states/sidebar-right-active.svg" alt="" class="sidebar-icon-overlay__icon sidebar-icon-overlay__icon--right-active">
  </button>
</div>
