<aside class="products-sidebar" aria-label="Products index navigation">
  <div class="products-sidebar__inner">
    <header class="products-sidebar__header">
      <div class="products-sidebar__title-row">
        <button
          class="products-sidebar__toggle"
          type="button"
          aria-label="Toggle products sidebar"
          aria-expanded="false"
          data-products-sidebar-toggle
        >
          <img
            class="products-sidebar__toggle-icon"
            src="/registry/icons/public/assets/core/navigation/sidebar/sidebar-left.svg"
            alt=""
            aria-hidden="true"
          >
        </button>

        <div class="products-sidebar__heading">
          <p class="products-sidebar__eyebrow">Products</p>
          <h2 class="products-sidebar__title" data-products-sidebar-title>Overview</h2>
        </div>
      </div>
    </header>

    <div class="products-sidebar__panel">
      <nav class="products-sidebar__nav" aria-label="Products sections">
        <ul class="products-sidebar__list" data-products-sidebar-list></ul>
      </nav>
    </div>
  </div>
</aside>
