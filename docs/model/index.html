<body class="site-body profile-page model-page" data-profile-page="private">
  <div id="global-loading-overlay" class="loading-overlay" aria-hidden="true" aria-live="polite">
    <div class="loading-overlay__backdrop"></div>

      <p class="loading-overlay__label">Loading</p>

  <main id="site-main">
    <div id="account-drawer-mount" data-include="account-drawer"></div>
    <div id="profile-shell-mount" data-include="profile-private-shell" data-profile-state="empty" data-profile-visibility="private" aria-hidden="false"></div>

  </main>
  <div id="footer-mount" data-include="profile-private-footer" data-profile-surface="private" data-profile-footer-state="empty" aria-hidden="false"></div>

      <img src="/registry/icons/public/assets/system/states/sidebar-right-active.svg" alt="" class="sidebar-icon-overlay__icon sidebar-icon-overlay__icon--right-active">
    </button>
  </div>
  <div id="cookie-consent-mount" data-include="cookie-consent" data-consent-state="pending" data-consent-surface="banner" data-consent-settings="available" aria-hidden="true"></div>
