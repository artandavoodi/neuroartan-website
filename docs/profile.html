<!-- =============================================================================
     06) GLOBAL LOADING OVERLAY
============================================================================= -->
<div id="global-loading-overlay" class="loading-overlay" aria-hidden="true" aria-live="polite">
  <div class="loading-overlay__backdrop"></div>
  <div class="loading-overlay__surface" role="status" aria-label="Loading">
    <div class="loading-overlay__spinner" aria-hidden="true"></div>
    <p class="loading-overlay__label" data-i18n-key="loading.label">Loading</p>
  </div>
</div>

<!-- =============================================================================
     07) CUSTOM CURSOR
============================================================================= -->

<!-- =============================================================================
     08) MAIN CONTENT
============================================================================= -->
<main id="site-main">
<!-- =============================================================================
     08A) PROFILE MENU MOUNT
============================================================================= -->
<div id="profile-menu-mount"
     data-include="profile-private-menu"
     data-profile-surface="private"
     data-profile-menu-state="empty"
     aria-hidden="false"></div>

<!-- =============================================================================
     08B) PROFILE PAGE SHELL
============================================================================= -->
<div id="profile-shell-mount"
     data-include="profile-private-shell"
     data-profile-state="empty"
     data-profile-visibility="private"
     aria-hidden="false"></div>

</main>

<!-- =============================================================================
     09) PROFILE FOOTER MOUNT
============================================================================= -->
<div id="footer-mount"
     data-include="profile-private-footer"
     data-profile-surface="private"
     data-profile-footer-state="empty"
     aria-hidden="false"></div>

<!-- =============================================================================
     10) COUNTRY OVERLAY MOUNT
============================================================================= -->
<div id="country-overlay-mount" data-include="country-overlay"></div>

<!-- =============================================================================
     10A) COOKIE CONSENT MOUNT
============================================================================= -->
<div id="cookie-consent-mount"
     data-include="cookie-consent"
     data-consent-state="pending"
     data-consent-surface="banner"
     data-consent-settings="available"
     aria-hidden="true"></div>

============================================================================= -->
