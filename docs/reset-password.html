<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =============================================================================
       01) BASIC META
  ============================================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Neuroartan</title>
  <meta name="description" content="Reset your Neuroartan account password.">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="canonical" href="https://neuroartan.com/reset-password.html">
  <link rel="icon" type="image/svg+xml" href="https://studio.neuroartan.com/registry/icons/public/assets/layers/website/app/favicon/favicon.svg">

  <!-- =============================================================================
       02) GLOBAL STYLES
  ============================================================================ -->
  <link rel="stylesheet" href="/assets/css/core/00-orchestrator/core.css">
</head>

<body class="site-body password-reset-page" data-password-reset-page>
  <!-- =============================================================================
       03) PASSWORD RESET SURFACE
  ============================================================================ -->
  <main class="password-reset-page__shell" aria-labelledby="password-reset-title">
    <header class="password-reset-page__header">
      <img class="password-reset-page__brand ui-icon-theme-aware" src="/registry/icons/public/assets/core/identity/password/password.svg" alt="" aria-hidden="true">
      <h1 class="password-reset-page__title" id="password-reset-title">Reset password</h1>
      <p class="password-reset-page__copy">Enter a new password for your Neuroartan account.</p>
    </header>

    <form class="password-reset-page__form" data-password-reset-form novalidate>
      <label class="password-reset-page__field">
        <span class="password-reset-page__label">New password</span>
        <input class="ui-field" type="password" name="password" autocomplete="new-password" required>
      </label>

      <label class="password-reset-page__field">
        <span class="password-reset-page__label">Confirm password</span>
        <input class="ui-field" type="password" name="password_confirm" autocomplete="new-password" required>
      </label>

      <p class="password-reset-page__status" data-password-reset-status aria-live="polite"></p>

      <div class="password-reset-page__actions">
        <button class="ui-button ui-button--secondary" type="submit">Update password</button>
      </div>
    </form>
  </main>

  <!-- =============================================================================
       04) CORE SCRIPT
  ============================================================================ -->
  <script type="module" src="/assets/js/core/00-orchestrator/core.js"></script>
</body>
</html>
