<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" sizes="16x16" href="https://studio.neuroartan.com/registry/icons/public/assets/layers/website/app/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://studio.neuroartan.com/registry/icons/public/assets/layers/website/app/favicon/favicon-32x32.png">
  <link rel="icon" type="image/svg+xml" href="https://studio.neuroartan.com/registry/icons/public/assets/layers/website/app/favicon/favicon.svg">

  <link rel="stylesheet" href="/assets/css/core/00-orchestrator/core.css"/>
  <link rel="stylesheet" href="/control-center/dsc/themes/themes.css"/>
  <link rel="stylesheet" href="/studio/ui/styles/studio-shell.css"/>

  <title>Control Center Studio</title>
</head>

<body>

<main class="studio-runtime">

  <aside class="studio-sidebar">
    <div class="studio-sidebar-brand">Control Center</div>

    <nav class="studio-sidebar-nav">
      <button class="studio-nav-button is-active">Overview</button>
      <button class="studio-nav-button">Tokens</button>
      <button class="studio-nav-button">Registry</button>
      <button class="studio-nav-button">Themes</button>
      <button class="studio-nav-button">Icons</button>
    </nav>
  </aside>

  <section class="studio-workspace">

    <header class="studio-topbar">
      <div class="studio-topbar-title">Design OS Runtime</div>
      <button class="studio-action-button">Create Asset</button>
    </header>

    <div class="studio-grid">

      <div class="studio-panel">
        <div class="studio-panel-label">Token Runtime</div>
      </div>

      <div class="studio-panel">
        <div class="studio-panel-label">Registry Graph</div>
      </div>

      <div class="studio-panel">
        <div class="studio-panel-label">Theme Engine</div>
      </div>

      <div class="studio-panel">
        <div class="studio-panel-label">Propagation Status</div>
      </div>

    </div>

  </section>

</main>

<script type="module" src="/studio/ui/scripts/studio-runtime.js"></script>

</body>
</html>
