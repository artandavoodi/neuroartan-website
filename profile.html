<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy Profile Access · Neuroartan</title>
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="description" content="Legacy noindex profile access surface retained temporarily during the Neuroartan platform restructuring.">
  <link rel="canonical" href="https://neuroartan.com/">
  <link rel="stylesheet" href="assets/css/core/style.css">
  <link rel="stylesheet" href="assets/css/system/auth.css">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js" defer></script>
  <script src="assets/js/system/firebase-config.js" defer></script>
  <script src="assets/js/system/auth.js" defer></script>
</head>
<body class="profile-page">
  <main class="profile-shell">
    <p class="profile-label" id="profile-label">Legacy Profile Access</p>
    <img id="profile-avatar-image" src="assets/icons/brand/logos/neuroartan/logo-plain.svg" alt="Neuroartan" />
    <h1 class="profile-name" id="profile-name">Loading...</h1>
    <p class="profile-email" id="profile-email">Loading...</p>
    <p class="profile-copy" id="profile-copy">This noindex legacy profile surface is being retained temporarily while Neuroartan restructures the public website, Office layer, ICOS layer, and Investor layer into sovereign platform architecture.</p>

    <div class="profile-actions" data-auth-state="user" hidden>
      <button class="profile-button" type="button" onclick="logout()">Logout</button>
    </div>

    <div class="profile-actions" data-auth-state="guest" hidden>
      <button class="profile-button" type="button" onclick="loginWithGoogle()">Continue with Google</button>
    </div>

    <noscript>
      <p class="profile-copy">JavaScript is required for Firebase-authenticated profile state and logout handling.</p>
    </noscript>
  </main>
</body>
</html>
